            graphics.fillStyle(0x9B6B2A, 1);
            graphics.fillRect(13, 5, 1, 11);
            // 横桟
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(0, 11, 15, 2);
            graphics.generateTexture('table_r', 16, 16);
            graphics.clear();

            // テーブルアイコン（インベントリ用・全体像 16x16）
            // テーブル全幅（32px）を16pxに圧縮したアイコン
            // 天板
            graphics.fillStyle(0x9B6B2A, 1);
            graphics.fillRect(0, 0, 16, 3);
            graphics.fillStyle(0xB87D3A, 1);
            graphics.fillRect(0, 1, 16, 2);
            graphics.fillStyle(0xCE9348, 1);
            graphics.fillRect(1, 1, 14, 1);  // ハイライト線
            // 天板の左端エッジ
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(0, 0, 1, 3);
            // 天板の右端エッジ
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(15, 0, 1, 3);
            // 天板の下エッジ
            graphics.fillStyle(0x6A4010, 1);
            graphics.fillRect(0, 3, 16, 1);
            // 左脚
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(1, 4, 2, 10);
            graphics.fillStyle(0x5A3800, 1);
            graphics.fillRect(1, 4, 1, 10);  // 脚の影
            graphics.fillStyle(0x9B6B2A, 1);
            graphics.fillRect(2, 4, 1, 10);  // 脚のハイライト
            // 右脚
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(13, 4, 2, 10);
            graphics.fillStyle(0x5A3800, 1);
            graphics.fillRect(13, 4, 1, 10); // 脚の影
            graphics.fillStyle(0x9B6B2A, 1);
            graphics.fillRect(14, 4, 1, 10); // 脚のハイライト
            // 横桟（貫き）
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(1, 9, 14, 2);
            graphics.generateTexture('table_icon', 16, 16);
            graphics.clear();

            // イス（16x16）
            // 背もたれ
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(2, 0, 12, 2);   // 背もたれ横棒
            graphics.fillRect(3, 2, 2, 5);    // 背もたれ左支柱
            graphics.fillRect(11, 2, 2, 5);   // 背もたれ右支柱
            graphics.fillStyle(0x9B6B2A, 1);
            graphics.fillRect(3, 0, 10, 1);   // ハイライト
            // 座面
            graphics.fillStyle(0x9B6B2A, 1);
            graphics.fillRect(1, 6, 14, 4);   // 座面本体
            graphics.fillStyle(0xB87D3A, 1);
            graphics.fillRect(2, 6, 12, 2);   // 座面上面
            graphics.fillStyle(0xCE9348, 1);
            graphics.fillRect(3, 6, 10, 1);   // ハイライト
            graphics.fillStyle(0x6A4010, 1);
            graphics.fillRect(1, 9, 14, 1);   // 座面下エッジ
            // 前脚2本
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(2, 10, 3, 6);
            graphics.fillRect(11, 10, 3, 6);
            graphics.fillStyle(0x5A3800, 1);
            graphics.fillRect(2, 10, 1, 6);
            graphics.fillRect(11, 10, 1, 6);
            // 横桟
            graphics.fillStyle(0x7A5020, 1);
            graphics.fillRect(2, 13, 12, 1);
            graphics.generateTexture('chair', 16, 16);
            graphics.clear();

            // ハイライト（黄色の枠線: 16x16）
            graphics.lineStyle(1, 0xffff00, 1);
            graphics.strokeRect(0, 0, 16, 16);
            graphics.generateTexture('highlight', 16, 16);
            graphics.clear();

            // ゴーストブロック（半透明の白、設置プレビュー用）
            graphics.fillStyle(0xffffff, 0.4);
            graphics.fillRect(0, 0, 16, 16);
            graphics.lineStyle(1, 0xffffff, 0.8);
            graphics.strokeRect(0, 0, 16, 16);
            graphics.generateTexture('ghost_block', 16, 16);
            graphics.clear();

            // UIボタン（半透明の丸）
            graphics.fillStyle(0x000000, 0.4);
            graphics.fillCircle(40, 40, 40);
            
            // ボタンのアイコン(三角や文字)を簡単に追加
            graphics.fillStyle(0xffffff, 0.8);
            graphics.generateTexture('button', 80, 80);
            graphics.clear();

            // ※ 毛玉宇宙人テクスチャは alien.png スプライトシートから読み込み（preload で登録済み）
            // ※ alien.png を差し替えることで見た目を変更できます（フレームサイズ 24x24 × 3フレーム）

            // スライム・材木・ハートテクスチャ（外部PNGから読み込み）
            // ※ 各PNGファイルを差し替えることで見た目を変更できます
            this.load.image('slime',       'slime.png');
            this.load.image('lumber',      'lumber.png');
            this.load.image('heart_full',  'heart_full.png');
            this.load.image('heart_empty', 'heart_empty.png');
            this.load.image('door_closed_b', 'door_closed_b.png');
            this.load.image('door_closed_m', 'door_closed_m.png');
            this.load.image('door_closed_t', 'door_closed_t.png');
            this.load.image('door_open_b',   'door_open_b.png');
            this.load.image('door_open_m',   'door_open_m.png');
            this.load.image('door_open_t',   'door_open_t.png');
            this.load.image('ladder',        'ladder.png');

            // ── ローディング進捗イベント ──
            this.load.on('progress', (value) => {
                const bar = document.getElementById('ld-bar');
                const st  = document.getElementById('ld-status');
                if (bar) bar.style.width = (value * 100) + '%';
                if (st)  st.textContent  = 'アセット読み込み中... ' + Math.floor(value * 100) + '%';
            });
            this.load.on('complete', () => {
                const bar = document.getElementById('ld-bar');
                const st  = document.getElementById('ld-status');
                if (bar) bar.style.width = '100%';
                if (st)  st.textContent  = 'ワールドを準備中...';
            });
            // ファイル読み込みエラー時もロードを止めないようにする
            this.load.on('loaderror', (fileObj) => {
                console.warn('[Loader] ファイル読み込みエラー（スキップ）:', fileObj.key, fileObj.src);
            });
        }

        function create() {
            // フォールバック: create()内でエラーが起きてもローディング画面を強制的に消す
            setTimeout(() => {
                const _ld = document.getElementById('loading-screen');
                if (_ld && _ld.style.display !== 'none') {
                    console.warn('[Fallback] ローディング画面を強制フェードアウトします');
                    _ld.classList.add('fade-out');
                    setTimeout(() => { _ld.style.display = 'none'; }, 700);
                }
            }, 15000); // 15秒後に強制解除

            // ワールドのサイズ（ゲームの世界の広さ）
            const worldWidth = 6000;
            const worldHeight = 2856; // 地下縦幅を3/4に縮小 (旧3552: 地下2784px → 2088px)
            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

            // 背景はワールド座標に配置し、毎フレーム手動でカメラビューに追従させる
            const sw = this.scale.width, sh = this.scale.height;
            bgSkyNight = this.add.tileSprite(0, 0, sw, sh, 'bg_sky_night')
                .setOrigin(0, 0).setDepth(-106).setAlpha(0);
            bgSkyEvening = this.add.tileSprite(0, 0, sw, sh, 'bg_sky_evening')
                .setOrigin(0, 0).setDepth(-105).setAlpha(0);
            bgSkyDay = this.add.tileSprite(0, 0, sw, sh, 'bg_sky_day')
                .setOrigin(0, 0).setDepth(-104).setAlpha(1);
            bgMtnNight = this.add.tileSprite(0, 0, sw, sh, 'bg_mtn_night')
                .setOrigin(0, 0).setDepth(-103).setAlpha(0);
            bgMtnEvening = this.add.tileSprite(0, 0, sw, sh, 'bg_mtn_evening')
                .setOrigin(0, 0).setDepth(-102).setAlpha(0);
            bgMtnDay = this.add.tileSprite(0, 0, sw, sh, 'bg_mtn_day')
                .setOrigin(0, 0).setDepth(-101).setAlpha(1);
            // 地中背景（WORLD_GROUND_Y より下の領域に表示）
            bgUnderground = this.add.tileSprite(0, 0, sw, sh, 'bg_underground')
                .setOrigin(0, 0).setDepth(-107).setAlpha(1);

            platforms = this.physics.add.staticGroup();

            // platforms.create を自動 blockMap 登録でラップ
            // → 全ての platforms.create() 呼び出しが自動で blockMap に登録される
            {
                const _origCreate = platforms.create.bind(platforms);
                platforms.create = function(x, y, texture, frame) {
                    const spr = _origCreate(x, y, texture, frame);
                    bkRegister(spr);
                    return spr;
                };
            }

            const blockSize = 16;
            const groundY = 768;

            // セーブデータを確認
            const _savedJson = localStorage.getItem(SAVE_KEY);
            const _saveData = _savedJson ? JSON.parse(_savedJson) : null;

            // ローディング画面のステータスを更新
            {
                const ldBar = document.getElementById('ld-bar');
                const ldSt  = document.getElementById('ld-status');
                if (ldBar) ldBar.style.width = '0%';
                if (ldSt)  ldSt.textContent  = _saveData ? 'データ読み込み中...' : 'ワールド生成中...';
            }

            if (_saveData && _saveData.blocks) {
                // セーブデータからブロックを復元
                for (const b of _saveData.blocks) {
                    const bData = BLOCK_DATA[b.typeId];
                    if (!bData) continue;
                    const newBlock = platforms.create(b.x, b.y, bData.texture, bData.frame);
                    newBlock.setData('typeId', b.typeId);
                    newBlock.setData('hp', b.hp);
                    if (b.typeId === BLOCK_TYPES.VINE) {
                        newBlock.setAlpha(0.85);
                        vineBlocks.push(newBlock);
                    }
                    if (b.typeId === BLOCK_TYPES.LADDER) {
                        newBlock.setAlpha(0.9);
                        vineBlocks.push(newBlock);
                    }
                    if (b.typeId === BLOCK_TYPES.WEED || b.typeId === BLOCK_TYPES.FLOWER ||
                        b.typeId === BLOCK_TYPES.WHEAT_STAGE1 || b.typeId === BLOCK_TYPES.WHEAT_STAGE2 || b.typeId === BLOCK_TYPES.WHEAT) {
                        newBlock.body.enable = false;
                    }
                    if (b.typeId === BLOCK_TYPES.WATER) {
                        newBlock.body.enable = false;
                        newBlock.setAlpha(0.7);
                    }
                    // ドアが開いていた場合はテクスチャと物理を復元
                    if (b.doorOpen && (b.typeId === BLOCK_TYPES.DOOR_B || b.typeId === BLOCK_TYPES.DOOR_M || b.typeId === BLOCK_TYPES.DOOR_T)) {
                        newBlock.setData('doorOpen', true);
                        const openTex = b.typeId === BLOCK_TYPES.DOOR_B ? 'door_open_b' : b.typeId === BLOCK_TYPES.DOOR_M ? 'door_open_m' : 'door_open_t';
                        newBlock.setTexture(openTex);
                        newBlock.body.enable = false;
                    }
                    if (b.typeId === BLOCK_TYPES.GOLD) {
                        newBlock.body.enable = false;
                    }
                    if (b.typeId === BLOCK_TYPES.STAIR) {
                        const flipped = b.stairFlipped || false;
                        newBlock.setFlipX(!flipped);
                        newBlock.body.enable = false;
                        newBlock.setData('stairFlipped', flipped);
                        stairBlocks.push({ block: newBlock, flipped: flipped });
                        stairPosSet.add(bkKey(newBlock.x, newBlock.y));
                    }
                    if (b.typeId === BLOCK_TYPES.SLOPE_R || b.typeId === BLOCK_TYPES.SLOPE_L) {
                        newBlock.body.enable = false;
                        slopeBlocks.push(newBlock);
                    }
                    if (b.typeId === BLOCK_TYPES.HALF_BLOCK) {
                        newBlock.body.enable = false;
                        halfBlocks.push(newBlock);
                        halfBlockPosSet.add(bkKey(newBlock.x, newBlock.y));
                    }
                }
                // インベントリを復元
                if (_saveData.inventory) {
                    for (let i = 0; i < INVENTORY_SIZE; i++) {
                        if (_saveData.inventory[i]) {
                            inventory[i] = { ..._saveData.inventory[i] };
                            // 旧セーブデータのtable_lテクスチャをtable_iconに移行
                            if (inventory[i].type === BLOCK_TYPES.TABLE_L && inventory[i].texture === 'table_l') {
                                inventory[i].texture = 'table_icon';
                                inventory[i].frame = undefined;
                            }
                        }
                    }
                }
                // バッグを復元
                if (_saveData.bag) {
                    for (let i = 0; i < BAG_SIZE; i++) {
                        if (_saveData.bag[i]) {
                            bag[i] = { ..._saveData.bag[i] };
                            // 旧セーブデータのtable_lテクスチャをtable_iconに移行
                            if (bag[i].type === BLOCK_TYPES.TABLE_L && bag[i].texture === 'table_l') {
                                bag[i].texture = 'table_icon';
                                bag[i].frame = undefined;
                            }
                        }
                    }
                }
                activeSlotIndex = _saveData.activeSlot || 0;
                if (_saveData.money !== undefined) {
                    playerMoney = _saveData.money;
                }
                if (_saveData.playerMaxHearts !== undefined) {
                    playerMaxHearts = _saveData.playerMaxHearts;
                }
                if (_saveData.playerHP !== undefined) {
                    playerHP = _saveData.playerHP;
                } else {
                    playerHP = playerMaxHearts * HP_PER_HEART;
                }
                // 苗木を復元
                if (_saveData.saplings) {
                    for (const s of _saveData.saplings) {
                        // 対応するSAPLINGブロックを探してsaplingsに追加
                        const bList = platforms.getChildren();
                        for (let i = 0; i < bList.length; i++) {
                            const blk = bList[i];
                            if (blk.active && blk.getData('typeId') === BLOCK_TYPES.SAPLING
                                && Math.abs(blk.x - s.x) < 4 && Math.abs(blk.y - s.y) < 4) {
                                const progress = Math.min(s.elapsed / SAPLING_GROW_TIME, 1);
                                blk.setScale(0.6 + progress * 0.4);
                                saplings.push({ sprite: blk, elapsed: s.elapsed });
                                break;
                            }
                        }
                    }
                }
                // 小麦を復元
                if (_saveData.wheatCrops) {
                    for (const c of _saveData.wheatCrops) {
                        const bList = platforms.getChildren();
                        for (let i = 0; i < bList.length; i++) {
                            const blk = bList[i];
                            const tid = blk.getData('typeId');
                            if (blk.active && (tid === BLOCK_TYPES.WHEAT_STAGE1 || tid === BLOCK_TYPES.WHEAT_STAGE2)
                                && Math.abs(blk.x - c.x) < 4 && Math.abs(blk.y - c.y) < 4) {
                                wheatCrops.push({ sprite: blk, elapsed: c.elapsed });
                                break;
                            }
                        }
                    }
                }
                // テーブル上アイテムを復元
                if (_saveData.tableItems) {
                    const bList = platforms.getChildren();
                    for (const ti of _saveData.tableItems) {
                        for (let i = 0; i < bList.length; i++) {
                            const blk = bList[i];
                            if (blk.active && blk.getData('typeId') === BLOCK_TYPES.TABLE
                                && Math.abs(blk.x - ti.tx) < 4 && Math.abs(blk.y - ti.ty) < 4) {
                                const bd = BLOCK_DATA[ti.itemType];
                                if (bd) {
                                    const itemSpr = this.add.image(
                                        blk.x, blk.y - 9, bd.texture, bd.frame
                                    ).setDisplaySize(10, 10).setDepth(15);
                                    const itemCnt = ti.itemCount || 1;
                                    const countTxt = this.add.text(
                                        blk.x + 6, blk.y - 14, String(itemCnt), {
                                            fontSize: '9px', color: '#ffffff', fontStyle: 'bold',
                                            stroke: '#000000', strokeThickness: 2
                                        }
                                    ).setOrigin(1, 1).setDepth(16).setScrollFactor(1)
                                     .setVisible(itemCnt > 1);
                                    tableItems.push({
                                        tableBlock: blk,
                                        itemSprite: itemSpr,
                                        countText: countTxt,
                                        itemType: ti.itemType,
                                        itemCount: itemCnt
                                    });
                                }
                                break;
                            }
                        }
                    }
                }
                // チェスト中身を復元
                if (_saveData.chests) {
                    chestContents = {};
                    for (const key in _saveData.chests) {
                        chestContents[key] = _saveData.chests[key].map(it => ({
                            type: it.type, count: it.count, texture: it.texture, frame: it.frame !== undefined ? it.frame : null
                        }));
                        while (chestContents[key].length < CHEST_SIZE) {
                            chestContents[key].push({ type: null, count: 0, texture: null, frame: null });
                        }
                    }
                }
                // 自宅位置を復元
                if (_saveData.homePosition) {
                    homePosition = { x: _saveData.homePosition.x, y: _saveData.homePosition.y };
                }
                // ベッドペアの相互参照を復元
                const allBlocks = platforms.getChildren();
                for (let i = 0; i < allBlocks.length; i++) {
                    const blk = allBlocks[i];
                    if (!blk.active || blk.getData('typeId') !== BLOCK_TYPES.STRAW_BED_L) continue;
                    const rx = blk.x + BLOCK_SIZE;
                    for (let j = 0; j < allBlocks.length; j++) {
                        const rblk = allBlocks[j];
                        if (rblk.active && rblk.getData('typeId') === BLOCK_TYPES.STRAW_BED_R
                            && Math.abs(rblk.x - rx) < 4 && Math.abs(rblk.y - blk.y) < 4) {
                            blk.setData('bedPair', rblk);
                            rblk.setData('bedPair', blk);
                            break;
                        }
                    }
                }
                // テーブル左右ペアの相互参照を復元
                for (let i = 0; i < allBlocks.length; i++) {
                    const blk = allBlocks[i];
                    if (!blk.active || blk.getData('typeId') !== BLOCK_TYPES.TABLE_L) continue;
                    const rx = blk.x + BLOCK_SIZE;
                    for (let j = 0; j < allBlocks.length; j++) {
                        const rblk = allBlocks[j];
                        if (rblk.active && rblk.getData('typeId') === BLOCK_TYPES.TABLE_R
                            && Math.abs(rblk.x - rx) < 4 && Math.abs(rblk.y - blk.y) < 4) {
                            blk.setData('tablePair', rblk);
                            rblk.setData('tablePair', blk);
                            break;
                        }
                    }
                }
                // ドアの3部品（B/M/T）相互参照を復元
                for (let i = 0; i < allBlocks.length; i++) {
                    const blk = allBlocks[i];
                    if (!blk.active || blk.getData('typeId') !== BLOCK_TYPES.DOOR_B) continue;
                    let midBlk = null, topBlk = null;
                    for (let j = 0; j < allBlocks.length; j++) {
                        const b2 = allBlocks[j];
                        if (!b2.active) continue;
                        if (b2.getData('typeId') === BLOCK_TYPES.DOOR_M
                            && Math.abs(b2.x - blk.x) < 4 && Math.abs(b2.y - (blk.y - BLOCK_SIZE)) < 4) midBlk = b2;
                        if (b2.getData('typeId') === BLOCK_TYPES.DOOR_T
                            && Math.abs(b2.x - blk.x) < 4 && Math.abs(b2.y - (blk.y - 2 * BLOCK_SIZE)) < 4) topBlk = b2;
                    }
                    if (midBlk && topBlk) {
                        const dp = [blk, midBlk, topBlk];
                        blk.setData('doorParts', dp);
                        midBlk.setData('doorParts', dp);
                        topBlk.setData('doorParts', dp);
                    }
                }
                // 商人を復元
                if (_saveData.merchants) {
                    for (const sm of _saveData.merchants) {
                        const mc = spawnMerchant(this, sm.x, sm.y);
                        mc.setData('spawnX', sm.spawnX);
                        if (sm.shopItems) mc.setData('shopItems', sm.shopItems);
                    }
                }
                // うさぎを復元
                if (_saveData.rabbits) {
                    for (const sr of _saveData.rabbits) {
                        spawnRabbit(this, sr.x, sr.y, sr.tamed, sr.friendship, sr.colorIndex);
                    }
                }
                // 犬を復元
                if (_saveData.dogs) {
                    for (const sd of _saveData.dogs) {
                        spawnDog(this, sd.x, sd.y, sd.tamed, sd.colorIndex);
                    }
                }
            } else {
                // 地下グリッドサイズ
                const cols = Math.floor(worldWidth / blockSize);
                const rows = Math.floor((worldHeight - groundY) / blockSize);

                // === 空洞生成（セルラーオートマトン） ===
                // 初期ランダムマップ: 1=壁, 0=空洞
                let caveMap = [];
                for (let r = 0; r < rows; r++) {
                    caveMap[r] = [];
                    for (let c = 0; c < cols; c++) {
                        if (r === 0) {
                            caveMap[r][c] = 1; // 地表は必ず壁
                        } else {
                            // 深さに応じて空洞率を変化（浅い所は少なめ、中層が多め）
                            const depthRatio = r / rows;
                            let caveChance = 0.38;
                            if (depthRatio < 0.15) caveChance = 0.30; // 浅い層は空洞少なめ
                            else if (depthRatio > 0.85) caveChance = 0.32; // 最深部も少なめ
                            caveMap[r][c] = Math.random() < caveChance ? 0 : 1;
                        }
                    }
                }

                // セルラーオートマトンで4回スムージング
                for (let iter = 0; iter < 4; iter++) {
                    const newMap = [];
                    for (let r = 0; r < rows; r++) {
                        newMap[r] = [];
                        for (let c = 0; c < cols; c++) {
                            if (r === 0) { newMap[r][c] = 1; continue; }
                            // 周囲8マスの壁の数をカウント
                            let walls = 0;
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    if (dr === 0 && dc === 0) continue;
                                    const nr = r + dr;
                                    const nc = c + dc;
                                    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
                                        walls++; // 範囲外は壁扱い
                                    } else {
                                        walls += caveMap[nr][nc];
                                    }
                                }
                            }
                            // 壁が5個以上なら壁、そうでなければ空洞
                            newMap[r][c] = walls >= 5 ? 1 : 0;
                        }
                    }
                    caveMap = newMap;
                }

                // ワーム型トンネルを追加（長い通路を掘る）
                const numWorms = 3 + Math.floor(Math.random() * 3);
                for (let w = 0; w < numWorms; w++) {
                    let wr = 2 + Math.floor(Math.random() * (rows - 4));
                    let wc = Math.floor(Math.random() * cols);
                    let angle = Math.random() * Math.PI * 2;
                    const wormLen = 20 + Math.floor(Math.random() * 30);
                    for (let s = 0; s < wormLen; s++) {
                        const radius = 1 + Math.floor(Math.random() * 2);
                        for (let dr = -radius; dr <= radius; dr++) {
                            for (let dc = -radius; dc <= radius; dc++) {
                                const nr = Math.floor(wr + dr);
                                const nc = Math.floor(wc + dc);
                                if (nr > 0 && nr < rows && nc >= 0 && nc < cols) {
                                    caveMap[nr][nc] = 0;
                                }
                            }
                        }
                        angle += (Math.random() - 0.5) * 0.8;
                        wr += Math.sin(angle) * 1.2;
                        wc += Math.cos(angle) * 1.2;
                        if (wr < 1 || wr >= rows - 1 || wc < 0 || wc >= cols) break;
                    }
                }

                // === 空洞の床を検出して宝箱候補を探す ===
                const chestCandidates = [];
                for (let r = 2; r < rows - 1; r++) {
                    for (let c = 1; c < cols - 1; c++) {
                        // 空洞マスで、真下が壁（床がある場所）
                        if (caveMap[r][c] === 0 && caveMap[r + 1][c] === 1) {
                            chestCandidates.push({ r, c });
                        }
                    }
                }

                // === 鉄鉱脈の密集ゾーンを生成 ===
                const ironVeinMap = [];
                for (let r = 0; r < rows; r++) {
                    ironVeinMap[r] = [];
                    for (let c = 0; c < cols; c++) ironVeinMap[r][c] = false;
                }
                const veinCount = 2 + Math.floor(Math.random() * 3); // 2〜4箇所
                for (let v = 0; v < veinCount; v++) {
                    // 深さ5以上の壁ブロックを中心に選ぶ
                    const vr = 5 + Math.floor(Math.random() * (rows - 8));
                    const vc = 2 + Math.floor(Math.random() * (cols - 4));
                    if (caveMap[vr][vc] === 0) continue; // 空洞なら skip
                    // 中心から不規則に8〜12個広げる
                    const oreCount = 8 + Math.floor(Math.random() * 5);
                    let placed = 0;
                    const queue = [{ r: vr, c: vc }];
                    const visited = new Set();
                    visited.add(vr + ',' + vc);
                    while (queue.length > 0 && placed < oreCount) {
                        const idx = Math.floor(Math.random() * queue.length);
                        const pos = queue.splice(idx, 1)[0];
                        if (caveMap[pos.r][pos.c] === 1) {
                            ironVeinMap[pos.r][pos.c] = true;
                            placed++;
                        }
                        // 隣接4方向をキューに追加
                        for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                            const nr = pos.r + dr, nc = pos.c + dc;
                            const key = nr + ',' + nc;
                            if (nr >= 1 && nr < rows && nc >= 0 && nc < cols && !visited.has(key)) {
                                visited.add(key);
                                queue.push({ r: nr, c: nc });
                            }
                        }
                    }
                }

                // === ブロック配置 ===
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const bx = c * blockSize + blockSize / 2;
                        const by = groundY + r * blockSize + blockSize / 2;

                        // 空洞は何も置かない
                        if (caveMap[r][c] === 0) continue;

                        let typeId;
                        if (r === 0) {
                            typeId = BLOCK_TYPES.GRASS;
                        } else if (ironVeinMap[r][c]) {
                            // 鉄鉱脈ゾーン
                            typeId = BLOCK_TYPES.IRON;
                        } else {
                            const depth = r;
                            if (depth >= 2 && Math.random() < 0.3 + (depth * 0.05)) {
                                const roll = Math.random();
                                if (depth >= 15 && roll < 0.008) {
                                    typeId = BLOCK_TYPES.RUBY;
                                } else if (depth >= 3 && roll < 0.04) {
                                    typeId = BLOCK_TYPES.IRON;
                                } else {
                                    typeId = BLOCK_TYPES.STONE;
                                }
                            } else {
                                typeId = BLOCK_TYPES.DIRT;
                            }
                        }

                        const bData = BLOCK_DATA[typeId];
                        const newBlock = platforms.create(bx, by, bData.texture, bData.frame);
                        newBlock.setData('typeId', typeId);
                        newBlock.setData('hp', bData.hp);
                    }
                }

                // === 空洞内に宝箱を配置（候補から低確率で選出）===
                const shuffled = chestCandidates.sort(() => Math.random() - 0.5);
                const chestCount = Math.min(shuffled.length, 3 + Math.floor(Math.random() * 3));
                for (let i = 0; i < chestCount; i++) {
                    const pos = shuffled[i];
                    const bx = pos.c * blockSize + blockSize / 2;
                    const by = groundY + pos.r * blockSize + blockSize / 2;
                    const bData = BLOCK_DATA[BLOCK_TYPES.CHEST];
                    const chest = platforms.create(bx, by, bData.texture, bData.frame);
                    chest.setData('typeId', BLOCK_TYPES.CHEST);
                    chest.setData('hp', bData.hp);
                }

                // === 空洞内に蔦を生成（天井から垂れ下がる）===
                for (let c = 0; c < cols; c++) {
                    for (let r = 2; r < rows - 2; r++) {
                        // 天井を検出: 壁マスのすぐ下が空洞
                        if (caveMap[r][c] === 1 && caveMap[r + 1][c] === 0) {
                            if (Math.random() < 0.12) { // 12%の確率で蔦を生やす
                                // 下方向に蔦を伸ばす（2〜6ブロック）
                                const vineLen = 2 + Math.floor(Math.random() * 5);
                                for (let v = 1; v <= vineLen; v++) {
                                    const vr = r + v;
                                    if (vr >= rows || caveMap[vr][c] !== 0) break;
                                    const vx = c * blockSize + blockSize / 2;
                                    const vy = groundY + vr * blockSize + blockSize / 2;
                                    const vData = BLOCK_DATA[BLOCK_TYPES.VINE];
                                    const vine = platforms.create(vx, vy, vData.texture, vData.frame);
                                    vine.setData('typeId', BLOCK_TYPES.VINE);
                                    vine.setData('hp', vData.hp);
                                    vine.setAlpha(0.85);
                                    vineBlocks.push(vine);
                                }
                            }
                        }
                    }
                }

                // === 空洞内に小さな地下木を低頻度で生成 ===
                for (const pos of chestCandidates) {
                    if (Math.random() > 0.03) continue; // 3%の確率
                    const tx = pos.c * blockSize + blockSize / 2;
                    const ty = groundY + pos.r * blockSize + blockSize / 2;
                    // 幹: 1〜2ブロック
                    const tHeight = 1 + Math.floor(Math.random() * 2);
                    let canPlace = true;
                    for (let h = 1; h <= tHeight + 1; h++) {
                        const cr = pos.r - h;
                        if (cr < 0 || caveMap[cr][pos.c] !== 0) { canPlace = false; break; }
                    }
                    if (!canPlace) continue;
                    for (let h = 1; h <= tHeight; h++) {
                        const wd = BLOCK_DATA[BLOCK_TYPES.WOOD];
                        const trunk = platforms.create(tx, ty - h * blockSize, wd.texture, wd.frame);
                        trunk.setData('typeId', BLOCK_TYPES.WOOD);
                        trunk.setData('hp', wd.hp);
                    }
                    // 葉: 小さめ（3x2）
                    const topTy = ty - tHeight * blockSize;
                    const smallLeaf = [[-1,-1],[0,-1],[1,-1],[-1,0],[0,0],[1,0]];
                    for (const [dx, dy] of smallLeaf) {
                        const lx = tx + dx * blockSize;
                        const ly = topTy + dy * blockSize;
                        if (dx === 0 && dy === 0) continue; // 幹と重なる
                        const nc = pos.c + dx;
                        const nr = pos.r - tHeight + dy;
                        if (nc < 0 || nc >= cols || nr < 0 || caveMap[nr][nc] !== 0) continue;
                        const ld = BLOCK_DATA[BLOCK_TYPES.LEAF];
                        const leaf = platforms.create(lx, ly, ld.texture, ld.frame);
                        leaf.setData('typeId', BLOCK_TYPES.LEAF);
                        leaf.setData('hp', ld.hp);
                    }
                }

                // === 空洞内に金塊を配置（拾えるアイテム）===
                for (const pos of chestCandidates) {
                    if (Math.random() > 0.06) continue; // 6%の確率
                    const gx = pos.c * blockSize + blockSize / 2;
                    const gy = groundY + pos.r * blockSize + blockSize / 2;
                    let exists = false;
                    platforms.getChildren().forEach(blk => {
                        if (blk.active && Math.abs(blk.x - gx) < 4 && Math.abs(blk.y - gy) < 4) exists = true;
                    });
                    if (exists) continue;
                    const goldData = BLOCK_DATA[BLOCK_TYPES.GOLD];
                    const goldBlock = platforms.create(gx, gy, goldData.texture, goldData.frame);
                    goldBlock.setData('typeId', BLOCK_TYPES.GOLD);
                    goldBlock.setData('hp', goldData.hp);
                    goldBlock.body.enable = false;
                }

                // === 空洞内に骨ブロックを低頻度で配置 ===
                for (const pos of chestCandidates) {
                    if (Math.random() > 0.02) continue; // 2%の確率
                    const bonex = pos.c * blockSize + blockSize / 2;
                    const boney = groundY + pos.r * blockSize + blockSize / 2;
                    const boneData = BLOCK_DATA[BLOCK_TYPES.BONE];
                    const boneBlock = platforms.create(bonex, boney, boneData.texture, boneData.frame);
                    boneBlock.setData('typeId', BLOCK_TYPES.BONE);
                    boneBlock.setData('hp', boneData.hp);
                    boneBlock.body.enable = false; // 非衝突（拾える）
                }

                // === 空洞内に犬を低頻度でスポーン ===
                const dogCaves = chestCandidates.filter(() => Math.random() < 0.008);
                for (const pos of dogCaves.slice(0, 2)) { // 最大2匹
                    const dgx = pos.c * blockSize + blockSize / 2;
                    const dgy = groundY + pos.r * blockSize + blockSize / 2 - 16;
                    spawnDog(this, dgx, dgy);
                }

                // === 地上に小さい池を生成（底と左右を土で囲む）===
                const pondCount = 2 + Math.floor(Math.random() * 3); // 2〜4個
                const pondPositions = [];
                // ヘルパー: 指定位置のブロックを除去
                function removeBlockAt(px, py) {
                    platforms.getChildren().forEach(blk => {
                        if (blk.active && Math.abs(blk.x - px) < 4 && Math.abs(blk.y - py) < 4) {
                            bkUnregister(blk);
                            blk.disableBody(true, true);
                        }
                    });
                }
                // ヘルパー: 指定位置にブロックがあるか
                function hasBlockAt(px, py) {
                    let found = false;
                    platforms.getChildren().forEach(blk => {
                        if (blk.active && Math.abs(blk.x - px) < 4 && Math.abs(blk.y - py) < 4) found = true;
                    });
                    return found;
                }
                // ヘルパー: 水ブロックを配置
                function placeWater(scene, px, py) {
                    const wData = BLOCK_DATA[BLOCK_TYPES.WATER];
                    const w = platforms.create(px, py, wData.texture, wData.frame);
                    w.setData('typeId', BLOCK_TYPES.WATER);
                    w.setData('hp', wData.hp);
                    w.body.enable = false;
                    w.setAlpha(0.7);
                    return w;
                }
                // ヘルパー: 土ブロックを確実に配置（なければ追加）
                function ensureSolidAt(px, py) {
                    let found = false;
                    platforms.getChildren().forEach(blk => {
                        if (blk.active && Math.abs(blk.x - px) < 4 && Math.abs(blk.y - py) < 4) {
                            const tid = blk.getData('typeId');
                            if (tid !== BLOCK_TYPES.WATER) found = true;
                        }
                    });
                    if (!found) {
                        const dData = BLOCK_DATA[BLOCK_TYPES.DIRT];
                        const d = platforms.create(px, py, dData.texture, dData.frame);
                        d.setData('typeId', BLOCK_TYPES.DIRT);
                        d.setData('hp', dData.hp);
                    }
                }

                for (let p = 0; p < pondCount; p++) {
                    const pc = 5 + Math.floor(Math.random() * (cols - 10));
                    if (pondPositions.some(pp => Math.abs(pp - pc) < 12)) continue;
                    pondPositions.push(pc);
                    const pondW = 3 + Math.floor(Math.random() * 4); // 幅3〜6
                    const pondDepth = 2 + Math.floor(Math.random() * 2); // 深さ2〜3

                    // 1) 池の底と左右壁を確保
                    for (let dc = -1; dc <= pondW; dc++) {
                        const cc = pc + dc;
                        if (cc < 0 || cc >= cols) continue;
                        const gx = cc * blockSize + blockSize / 2;
                        // 底面: pondDepth+1の深さに土を確保
                        const bottomY = groundY + (pondDepth + 1) * blockSize + blockSize / 2;
                        ensureSolidAt(gx, bottomY);
                        // 左右の壁
                        if (dc === -1 || dc === pondW) {
                            for (let d = 0; d <= pondDepth; d++) {
                                const wallY = groundY + d * blockSize + blockSize / 2;
                                ensureSolidAt(gx, wallY);
                            }
                        }
                    }

                    // 2) 池の内部を掘って水で埋める
                    for (let dc = 0; dc < pondW; dc++) {
                        const cc = pc + dc;
                        if (cc < 0 || cc >= cols) continue;
                        const gx = cc * blockSize + blockSize / 2;
                        // 中央ほど深く
                        const distFromEdge = Math.min(dc, pondW - 1 - dc);
                        const localDepth = distFromEdge === 0 ? Math.max(1, pondDepth - 1) : pondDepth;
                        for (let d = 0; d <= localDepth; d++) {
                            const wy = groundY + d * blockSize + blockSize / 2;
                            removeBlockAt(gx, wy);
                            placeWater(null, gx, wy);
                        }
                        // localDepthの下に底を確保
                        const btmY = groundY + (localDepth + 1) * blockSize + blockSize / 2;
                        ensureSolidAt(gx, btmY);
                    }
                }

                // === 地下に小さい池を生成（床の窪みに水を溜める）===
                for (const pos of chestCandidates) {
                    if (Math.random() > 0.015) continue;
                    const pw = 2 + Math.floor(Math.random() * 3); // 幅2〜4
                    // 床が確実にあるか（pos.r+1が壁）チェック
                    let canPlace = true;
                    for (let dc = 0; dc < pw; dc++) {
                        const cc = pos.c + dc;
                        if (cc >= cols || caveMap[pos.r][cc] !== 0) { canPlace = false; break; }
                        if (pos.r + 1 >= rows || caveMap[pos.r + 1][cc] !== 1) { canPlace = false; break; }
                    }
                    if (!canPlace) continue;
                    // 左右壁を確保
                    const leftC = pos.c - 1;
                    const rightC = pos.c + pw;
                    if (leftC >= 0) ensureSolidAt(leftC * blockSize + blockSize / 2, groundY + pos.r * blockSize + blockSize / 2);
                    if (rightC < cols) ensureSolidAt(rightC * blockSize + blockSize / 2, groundY + pos.r * blockSize + blockSize / 2);
                    for (let dc = 0; dc < pw; dc++) {
                        const cc = pos.c + dc;
                        const wx = cc * blockSize + blockSize / 2;
                        const wy = groundY + pos.r * blockSize + blockSize / 2;
                        if (hasBlockAt(wx, wy)) continue;
                        placeWater(null, wx, wy);
                    }
                }

                // 地上に木を生成
                // テラリア風: 草ブロックの上にランダムで幹と葉を配置
                for (let x = 0; x < worldWidth; x += blockSize) {
                    // 約15%の確率で木を配置、ただし前の木と近すぎないようにする
                    if (Math.random() > 0.15) continue;
                    // 幹の高さ: 3～6ブロック
                    const trunkHeight = 3 + Math.floor(Math.random() * 4);
                    const baseX = x + blockSize / 2;
                    const baseY = groundY - blockSize / 2; // 草ブロックのすぐ上

                    // 池の上には木を生成しない
                    let onWater = false;
                    platforms.getChildren().forEach(b => {
                        if (b.active && Math.abs(b.x - baseX) < 4 && Math.abs(b.y - (groundY + blockSize / 2)) < 4
                            && b.getData('typeId') === BLOCK_TYPES.WATER) onWater = true;
                    });
                    if (onWater) continue;

                    // 幹を配置
                    for (let h = 1; h <= trunkHeight; h++) {
                        const bData = BLOCK_DATA[BLOCK_TYPES.WOOD];
                        const trunk = platforms.create(baseX, baseY - h * blockSize, bData.texture, bData.frame);
                        trunk.setData('typeId', BLOCK_TYPES.WOOD);
                        trunk.setData('hp', bData.hp);
                    }

                    // 葉を配置（幹の上部に十字＋角形の樹冠）
                    const topY = baseY - trunkHeight * blockSize;
                    const leafPositions = [
                        // 最上段（3ブロック幅）
                        [-1, -2], [0, -2], [1, -2],
                        // 上段（5ブロック幅）
                        [-2, -1], [-1, -1], [0, -1], [1, -1], [2, -1],
                        // 中段（5ブロック幅）
                        [-2,  0], [-1,  0], [0,  0], [1,  0], [2,  0],
                        // 下段（3ブロック幅）
                        [-1,  1], [0,  1], [1,  1]
                    ];
                    for (const [dx, dy] of leafPositions) {
                        const lx = baseX + dx * blockSize;
                        const ly = topY + dy * blockSize;
                        // ワールド外には配置しない
                        if (lx < 0 || lx >= worldWidth || ly < 0) continue;
                        // 既に別ブロックがある位置はスキップ
                        // （幹・先行配置のりんごなど、あらゆる blockMap 衝突を汎用的に防ぐ）
                        if (bkGetAt(lx, ly)) continue;
                        const bData = BLOCK_DATA[BLOCK_TYPES.LEAF];
                        const leaf = platforms.create(lx, ly, bData.texture, bData.frame);
                        leaf.setData('typeId', BLOCK_TYPES.LEAF);
                        leaf.setData('hp', bData.hp);

                        // 下段の葉に20%の確率でりんごを配置
                        // りんご先置き後に別の葉が同位置に来ないよう、apple位置も空きチェック
                        if (dy >= 0 && dx !== 0 && Math.random() < 0.20) {
                            const ay = ly + blockSize;
                            if (!bkGetAt(lx, ay)) {
                                const aData = BLOCK_DATA[BLOCK_TYPES.APPLE];
                                const apple = platforms.create(lx, ay, aData.texture, aData.frame);
                                apple.setData('typeId', BLOCK_TYPES.APPLE);
                                apple.setData('hp', aData.hp);
                            }
                        }
                    }

                    // 次の木と重ならないよう、3～5ブロック分スキップ
                    x += (3 + Math.floor(Math.random() * 3)) * blockSize;
                }
            }

                // === 地表に雑草・花を生成 ===
                for (let x = 0; x < worldWidth; x += blockSize) {
                    const roll = Math.random();
                    if (roll > 0.25) continue; // 25%の確率で何か生やす
                    const baseX = x + blockSize / 2;
                    const baseY = groundY - blockSize / 2; // 草ブロックのすぐ上
                    // 既に木の幹がある場所、または下が水の場所はスキップ
                    let occupied = false;
                    platforms.getChildren().forEach(b => {
                        if (!b.active) return;
                        if (Math.abs(b.x - baseX) < 4 && Math.abs(b.y - baseY) < 4) occupied = true;
                        // 下のブロックが水ならスキップ
                        if (Math.abs(b.x - baseX) < 4 && Math.abs(b.y - (groundY + blockSize / 2)) < 4
                            && b.getData('typeId') === BLOCK_TYPES.WATER) occupied = true;
                    });
                    if (occupied) continue;
                    const isFlower = Math.random() < 0.3; // 30%が花、70%が雑草
                    const wType = isFlower ? BLOCK_TYPES.FLOWER : BLOCK_TYPES.WEED;
                    const wData = BLOCK_DATA[wType];
                    const wBlock = platforms.create(baseX, baseY, wData.texture, wData.frame);
                    wBlock.setData('typeId', wType);
                    wBlock.setData('hp', wData.hp);
                    wBlock.body.enable = false; // 当たり判定なし（通り抜け可能）
                }

            // ============================================================
            // === 地上の小さな家・廃墟を世界生成時に配置 ===
            // ============================================================
            try {
            {
                const _scene = this;

                // 指定X地点の地表の一番上のブロックY座標を返す
                function hGetSurfY(wx) {
                    const gx = Math.round(wx / blockSize) * blockSize;
                    for (let sy = groundY - blockSize * 10; sy <= groundY + blockSize * 2; sy += blockSize) {
                        if (bkGetAt(gx, sy)) return sy;
                    }
                    return groundY;
                }

                // 通常ブロックを1個配置するヘルパー（HALF_BLOCK特別処理含む）
                function hPlaceBlock(bx, by, typeId) {
                    if (bkGetAt(bx, by)) return null;
                    const bd = BLOCK_DATA[typeId];
                    if (!bd || bd.depth === -1) return null;
                    const nb = platforms.create(bx, by, bd.texture, bd.frame);
                    nb.refreshBody();
                    nb.setData('typeId', typeId);
                    nb.setData('hp', bd.hp);
                    if (typeId === BLOCK_TYPES.HALF_BLOCK) {
                        nb.body.enable = false;
                        halfBlocks.push(nb);
                        halfBlockPosSet.add(bkKey(nb.x, nb.y));
                    }
                    return nb;
                }

                // 光源（松明・ランタン）を配置するヘルパー
                function hPlaceLight(bx, by, typeId) {
                    const bd = BLOCK_DATA[typeId];
                    if (!bd) return;
                    const img = _scene.add.image(bx, by, bd.texture, bd.frame);
                    img.setDepth(20);
                    torches.push({ x: bx, y: by, img, type: typeId });
                }

                // ドア3段を配置するヘルパー
                function hPlaceDoor(doorX, doorBottomY) {
                    const dbData = BLOCK_DATA[BLOCK_TYPES.DOOR_B];
                    const dmData = BLOCK_DATA[BLOCK_TYPES.DOOR_M];
                    const dtData = BLOCK_DATA[BLOCK_TYPES.DOOR_T];
                    if (!dbData || !dmData || !dtData) return;
                    if (bkGetAt(doorX, doorBottomY) || bkGetAt(doorX, doorBottomY - blockSize) || bkGetAt(doorX, doorBottomY - blockSize * 2)) return;
                    const dbBlock = platforms.create(doorX, doorBottomY,             dbData.texture, dbData.frame);
                    const dmBlock = platforms.create(doorX, doorBottomY - blockSize, dmData.texture, dmData.frame);
                    const dtBlock = platforms.create(doorX, doorBottomY - blockSize * 2, dtData.texture, dtData.frame);
                    [dbBlock, dmBlock, dtBlock].forEach((b, i) => {
                        b.refreshBody();
                        b.setData('typeId', [BLOCK_TYPES.DOOR_B, BLOCK_TYPES.DOOR_M, BLOCK_TYPES.DOOR_T][i]);
                        b.setData('hp', [dbData, dmData, dtData][i].hp);
                        b.setData('doorOpen', false);
                        b.setData('doorParts', [dbBlock, dmBlock, dtBlock]);
                    });
                }

                // テーブルを配置するヘルパー（左→右自動）
                function hPlaceTable(tlX, tlY) {
                    if (bkGetAt(tlX, tlY) || bkGetAt(tlX + blockSize, tlY)) return;
                    const tlData = BLOCK_DATA[BLOCK_TYPES.TABLE_L];
                    const trData = BLOCK_DATA[BLOCK_TYPES.TABLE_R];
                    if (!tlData || !trData) return;
                    const tlBlock = platforms.create(tlX,              tlY, tlData.texture, tlData.frame);
                    const trBlock = platforms.create(tlX + blockSize, tlY, trData.texture, trData.frame);
                    tlBlock.refreshBody(); tlBlock.setData('typeId', BLOCK_TYPES.TABLE_L); tlBlock.setData('hp', tlData.hp); tlBlock.setData('tablePair', trBlock);
                    trBlock.refreshBody(); trBlock.setData('typeId', BLOCK_TYPES.TABLE_R); trBlock.setData('hp', trData.hp); trBlock.setData('tablePair', tlBlock);
                }

                // 壁紙を1枚置くヘルパー（wallMap登録）
                function hPlaceWall(bx, by, wallType, alpha) {
                    if (wallMap.has(wallKey(bx, by))) return;
                    const wData = WALL_DATA[wallType];
                    if (!wData) return;
                    const spr = _scene.add.image(bx, by, wData.texture);
                    spr.setDepth(-2).setAlpha(alpha !== undefined ? alpha : 0.88);
                    wallMap.set(wallKey(bx, by), { type: wallType, sprite: spr });
                }

                // ────────────────────────────────────────
                // 小さな家を配置する本体
                // centerX: 家の中心X, surfY: 地面ブロックのY座標, ruined: 廃墟かどうか
                // ────────────────────────────────────────
                function placeSmallHouse(centerX, surfY, ruined) {
                    const W  = 7;  // 幅（ブロック数）
                    const IH = 4;  // 壁の高さ（ドア3段 + 上段1）
                    // ドアは左端(col 0)に配置し、外壁の代わりにする
                    // col 0 rows 1-3 = DOOR_B/M/T、row 4 = LUMBER（ドア上の壁）
                    // col W-1 = 右の外壁（全行 LUMBER）

                    const x0 = Math.round(centerX / blockSize) * blockSize - 3 * blockSize;
                    const floorY = surfY - blockSize;

                    function skip(p) { return ruined && Math.random() < p; }
                    function gx(col) { return x0 + col * blockSize; }
                    function gy(row) { return floorY - row * blockSize; }

                    // ── 床 (row 0) ──
                    for (let i = 0; i < W; i++) {
                        if (!skip(0.08)) hPlaceBlock(gx(i), gy(0), BLOCK_TYPES.STONE_BRICK);
                    }

                    // ── 左端：ドア枠(rows 1-3) + ドア上壁(row 4) ──
                    // ドア枠（LUMBER 1本 = 幅1ブロック）は col -1 と col 1 に壁なし
                    // ドアはcol 0に3段配置（外壁の代わり）
                    const hasDoor = !ruined || Math.random() > 0.50;
                    if (hasDoor) {
                        // DOOR_B/M/T を直接置く（ゲームの自動設置ロジックは使わず手動）
                        const dbData = BLOCK_DATA[BLOCK_TYPES.DOOR_B];
                        const dmData = BLOCK_DATA[BLOCK_TYPES.DOOR_M];
                        const dtData = BLOCK_DATA[BLOCK_TYPES.DOOR_T];
                        if (dbData && dmData && dtData) {
                            // 廃墟でも一部のドアパーツが欠損することがある
                            const db = (!ruined || Math.random() > 0.3) ? platforms.create(gx(0), gy(1), dbData.texture, dbData.frame) : null;
                            const dm = (!ruined || Math.random() > 0.3) ? platforms.create(gx(0), gy(2), dmData.texture, dmData.frame) : null;
                            const dt = (!ruined || Math.random() > 0.3) ? platforms.create(gx(0), gy(3), dtData.texture, dtData.frame) : null;
                            const doorParts = [db, dm, dt].filter(Boolean);
                            [db, dm, dt].forEach((b, i) => {
                                if (!b) return;
                                b.refreshBody();
                                b.setData('typeId', [BLOCK_TYPES.DOOR_B, BLOCK_TYPES.DOOR_M, BLOCK_TYPES.DOOR_T][i]);
                                b.setData('hp', [dbData, dmData, dtData][i].hp);
                                b.setData('doorOpen', false);
                                b.setData('doorParts', doorParts);
                            });
                        }
                    }
                    // ドア上の壁（row IH = row 4）
                    if (!skip(0.35)) hPlaceBlock(gx(0), gy(IH), BLOCK_TYPES.LUMBER);

                    // ── 右外壁 (col W-1, rows 1 to IH) ──
                    for (let r = 1; r <= IH; r++) {
                        if (!skip(0.35)) hPlaceBlock(gx(W-1), gy(r), BLOCK_TYPES.LUMBER);
                    }

                    // ── 天井 (row IH+1) ──
                    for (let i = 0; i < W; i++) {
                        if (!skip(0.20)) hPlaceBlock(gx(i), gy(IH + 1), BLOCK_TYPES.LUMBER);
                    }

                    // ── 屋根 (row IH+2, オーバーハング付き) ──
                    if (!ruined || Math.random() > 0.45) {
                        for (let i = -1; i <= W; i++) {
                            if (skip(0.22)) continue;
                            hPlaceBlock(x0 + i * blockSize, gy(IH + 2), BLOCK_TYPES.HALF_BLOCK);
                        }
                    }

                    // ── 内部の壁紙（WALL_WOOD）──
                    // 内側 col 1〜W-2、row 1〜IH に壁紙を張る
                    for (let r = 1; r <= IH; r++) {
                        for (let c = 1; c <= W - 2; c++) {
                            if (ruined) {
                                // 廃墟：タイルごとにランダムにはがれる
                                // はがれやすさは上ほど高い（重力でめくれるイメージ）
                                const peelChance = 0.30 + (r / IH) * 0.25;
                                if (Math.random() < peelChance) continue;
                                // 残ったタイルも少し暗め・半透明にして古さを表現
                                hPlaceWall(gx(c), gy(r), BLOCK_TYPES.WALL_WOOD, 0.55);
                            } else {
                                hPlaceWall(gx(c), gy(r), BLOCK_TYPES.WALL_WOOD, 0.88);
                            }
                        }
                    }

                    // ── 内装・家具 (廃墟は60%の確率でスキップ) ──
                    if (!ruined || Math.random() > 0.55) {
                        // テーブル (col 3-4, row 1) ←ドアが左端なので奥側に配置
                        if (!skip(0.30)) hPlaceTable(gx(3), gy(1));
                        // イス (col 2, row 1)
                        if (!skip(0.35)) hPlaceBlock(gx(2), gy(1), BLOCK_TYPES.CHAIR);
                        // 収納チェスト (col 5, row 1) ←右奥に配置
                        if (!skip(0.45)) hPlaceBlock(gx(5), gy(1), BLOCK_TYPES.STORAGE_CHEST);
                        // 松明 (右内壁 col W-2, row 3)
                        if (!skip(0.35)) hPlaceLight(gx(W-2), gy(3), BLOCK_TYPES.TORCH);
                    }
                }

                // ── 配置する場所を被らないよう選ぶ ──
                const _housePosX = [];
                function tryPickHouseX() {
                    for (let att = 0; att < 60; att++) {
                        const x = 350 + Math.random() * (worldWidth - 700);
                        if (_housePosX.every(px => Math.abs(px - x) > 380)) {
                            _housePosX.push(x);
                            return x;
                        }
                    }
                    return null;
                }

                // 通常の家を3～4棟
                const _normalHouseCount = 3 + Math.floor(Math.random() * 2);
                for (let i = 0; i < _normalHouseCount; i++) {
                    const hx = tryPickHouseX();
                    if (hx !== null) placeSmallHouse(hx, hGetSurfY(hx), false);
                }

                // 廃墟を3～4棟
                const _ruinCount = 3 + Math.floor(Math.random() * 2);
                for (let i = 0; i < _ruinCount; i++) {
                    const hx = tryPickHouseX();
                    if (hx !== null) placeSmallHouse(hx, hGetSurfY(hx), true);
                }
            }
            } catch(e) {
                console.warn('[HouseGen] 家生成エラーをスキップ:', e);
            }
            // ============================================================

            // プレイヤーアニメーションの作成（各レイヤー用）
            const layerKeys = ['player_body', 'player_hair', 'player_outfit'];
            for (const lk of layerKeys) {
                this.anims.create({
                    key: lk + '_idle',
                    frames: [{ key: lk, frame: 0 }],
                    frameRate: 10
                });
                this.anims.create({
                    key: lk + '_walk',
                    frames: this.anims.generateFrameNumbers(lk, { start: 1, end: 2 }),
                    frameRate: 8,
                    repeat: -1
                });
                this.anims.create({
                    key: lk + '_jump',
                    frames: [{ key: lk, frame: 3 }],
                    frameRate: 10
                });
                this.anims.create({
                    key: lk + '_swing',
                    frames: this.anims.generateFrameNumbers(lk, { start: 4, end: 5 }),
                    frameRate: 10,
                    repeat: -1
                });
            }
            // 旧 player テクスチャのアニメも互換用に残す
            this.anims.create({ key: 'idle', frames: [{ key: 'player', frame: 0 }], frameRate: 10 });
            this.anims.create({ key: 'walk', frames: this.anims.generateFrameNumbers('player', { start: 1, end: 2 }), frameRate: 8, repeat: -1 });
            this.anims.create({ key: 'jump', frames: [{ key: 'player', frame: 3 }], frameRate: 10 });
            this.anims.create({ key: 'swing', frames: this.anims.generateFrameNumbers('player', { start: 4, end: 5 }), frameRate: 10, repeat: -1 });

            // 木などの障害物がない安全なスポーン地点を検索する
            function findSafeSpawnX(centerX) {
                // チェックするX列オフセット（プレイヤー体幅をカバー）
                const colOffsets = [-blockSize, 0, blockSize];
                // 地表より上6ブロック分を確認（木の最大幹高さ6に対応）
                const checkRowCount = 6;
                for (let d = 0; d <= 80; d++) {
                    const candidates = d === 0
                        ? [centerX]
                        : [centerX - d * blockSize, centerX + d * blockSize];
                    for (const cx of candidates) {
                        if (cx < blockSize * 3 || cx >= worldWidth - blockSize * 3) continue;
                        let safe = true;
                        outer:
                        for (const col of colOffsets) {
                            for (let h = 1; h <= checkRowCount; h++) {
                                // 地表ブロック(row=0)はy=groundY+blockSize/2に存在する
                                // その1段上: groundY+blockSize/2 - 1*blockSize = groundY - blockSize/2
                                const by = groundY + blockSize / 2 - h * blockSize;
                                const blk = bkGetAt(cx + col, by);
                                if (blk && blk.body && blk.body.enable) {
                                    safe = false;
                                    break outer;
                                }
                            }
                        }
                        if (safe) return cx;
                    }
                }
                return centerX; // フォールバック（見つからない場合）
            }

            // プレイヤーの配置（物理用 - 透明にする）
            const _safeSpawnX = _saveData ? (worldWidth / 2) : findSafeSpawnX(worldWidth / 2);
            player = this.physics.add.sprite(_safeSpawnX, groundY - 100, 'player');
            player.setAlpha(0); // 物理ボディ用なので非表示
            player.setDepth(10);
            player.body.setSize(28, 48);   // 28px幅: 2ブロック(32px)の隙間で確実に落下
            player.body.setOffset(18, 24); // 64×96スプライト中央に配置
            player.setCollideWorldBounds(true);

            // レイヤースプライト作成（見た目用）
            // スケール1.0: 64×96px をそのまま表示（物理ボディは body.setSize(28,48) で 2×3ブロック固定）
            playerBodySprite = this.add.sprite(0, 0, 'player_body', 0).setDepth(11).setScale(1.0);
            playerOutfitSprite = this.add.sprite(0, 0, currentOutfitKey, 0).setDepth(12).setScale(1.0);
            playerHairSprite = this.add.sprite(0, 0, 'player_hair', 0).setDepth(13).setScale(1.0);

            // セーブデータからプレイヤー位置を復元
            if (_saveData) {
                player.setPosition(_saveData.playerX || _safeSpawnX, _saveData.playerY || groundY - 100);
            }

            // 手持ちアイテム表示スプライト
            heldItemSprite = this.add.image(0, 0, 'tileset', 0)
                .setDisplaySize(12, 12).setDepth(14).setVisible(false);

            // プレイヤーとブロックの衝突判定（蔦はすり抜け可能）
            this.physics.add.collider(player, platforms, null, vinePassthrough);

            // うさぎアニメーション
            this.anims.create({
                key: 'rabbit_idle',
                frames: [{ key: 'rabbit', frame: 0 }],
                frameRate: 1
            });
            this.anims.create({
                key: 'rabbit_walk',
                frames: this.anims.generateFrameNumbers('rabbit', { start: 1, end: 2 }),
                frameRate: 6,
                repeat: -1
            });

            // 犬アニメーション
            this.anims.create({
                key: 'dog_idle',
                frames: [{ key: 'dog', frame: 0 }],
                frameRate: 1
            });
            this.anims.create({
                key: 'dog_walk',
                frames: this.anims.generateFrameNumbers('dog', { start: 1, end: 2 }),
                frameRate: 6,
                repeat: -1
            });

            // 鳥アニメーション（5種類）
            for (let bi = 0; bi < 5; bi++) {
                const bk = 'bird' + bi;
                this.anims.create({
                    key: bk + '_perch',
                    frames: [{ key: bk, frame: 0 }],
                    frameRate: 1
                });
                this.anims.create({
                    key: bk + '_perch2',
                    frames: [{ key: bk, frame: 3 }],
                    frameRate: 1
                });
                this.anims.create({
                    key: bk + '_fly',
                    frames: this.anims.generateFrameNumbers(bk, { start: 1, end: 2 }),
                    frameRate: 8,
                    repeat: -1
                });
            }

            // 商人アニメーション
            this.anims.create({
                key: 'merchant_idle',
                frames: [{ key: 'merchant', frame: 0 }],
                frameRate: 1
            });
            this.anims.create({
                key: 'merchant_walk',
                frames: this.anims.generateFrameNumbers('merchant', { start: 1, end: 2 }),
                frameRate: 4,
                repeat: -1
            });

            // 客NPCアニメーション
            this.anims.create({
                key: 'customer_idle',
                frames: [{ key: 'customer', frame: 0 }],
                frameRate: 1
            });
            this.anims.create({
                key: 'customer_walk',
                frames: this.anims.generateFrameNumbers('customer', { start: 1, end: 2 }),
                frameRate: 5,
                repeat: -1
            });

            // レンジ アニメーション（renji.png スプライトシート使用）
            // フレーム0=通常, 1=上伸び, 2=下縮み → ふわふわ浮遊ループ
            this.anims.create({
                key: 'renji_float',
                frames: [
                    { key: 'renji', frame: 0 },
                    { key: 'renji', frame: 1 },
                    { key: 'renji', frame: 0 },
                    { key: 'renji', frame: 2 }
                ],
                frameRate: 3,
                repeat: -1
            });

            // 毛玉宇宙人アニメーション（alien.png スプライトシート使用）
            // フレーム0=正円, 1=横伸び, 2=縦伸び → ふわふわ浮遊ループ
            this.anims.create({
                key: 'alien_float',
                frames: [
                    { key: 'alien', frame: 0 },
                    { key: 'alien', frame: 1 },
                    { key: 'alien', frame: 0 },
                    { key: 'alien', frame: 2 }
                ],
                frameRate: 4,
                repeat: -1
            });

            // ─── 安全なスポーンY座標を求めるヘルパー ───────────────────────
            // 指定X地点で「上から走査して最初に見つかる固体ブロック」の1.5ブロック上を返す。
            // 木の幹・山岳地形などに埋まるのを防ぐ。
            function findSafeSurfaceY(worldX) {
                const bx = Math.round(worldX / blockSize) * blockSize;
                // 地表より最大16ブロック上から下方へスキャン
                const scanTop = groundY - blockSize * 16;
                for (let y = scanTop; y <= groundY + blockSize * 2; y += blockSize) {
                    const blk = bkGetAt(bx, y);
                    if (blk && blk.body && blk.body.enable) {
                        return y - blockSize * 1.5; // 固体ブロックの少し上
                    }
                }
                return groundY - blockSize; // フォールバック（地表 1 ブロック上）
            }

            // 安全なスポーン地点を最大 tryMax 回探す（木の真上など木の内部になる場合を避ける）
            function findSafeRabbitPos(margin) {
                margin = margin || 150;
                const tryMax = 20;
                for (let t = 0; t < tryMax; t++) {
                    const rx = margin + Math.floor(Math.random() * (worldWidth - margin * 2) / blockSize) * blockSize;
                    const ry = findSafeSurfaceY(rx);
                    // スポーン地点そのものにブロックがないか再確認（空洞の天井など）
                    const bx = Math.round(rx / blockSize) * blockSize;
                    const bodyY = Math.round((ry + 8) / blockSize) * blockSize; // 体の中心付近
                    const occupied = bkGetAt(bx, bodyY);
                    if (!occupied || !occupied.body || !occupied.body.enable) {
                        return { x: rx, y: ry };
                    }
                }
                // 全試行失敗時はフォールバック
                return { x: worldWidth / 2, y: groundY - blockSize * 2 };
            }
            // ────────────────────────────────────────────────────────────

            // 地上にうさぎを低頻度でスポーン
            const rabbitCount = 1 + Math.floor(Math.random() * 1); // 1匹
            for (let i = 0; i < rabbitCount; i++) {
                const rpos = findSafeRabbitPos(150);
                spawnRabbit(this, rpos.x, rpos.y);
            }

            // 地上に犬を低頻度でスポーン（うさぎと同様）
            const dogSurfaceCount = Math.random() < 0.5 ? 1 : 0; // 50%で1匹
            for (let i = 0; i < dogSurfaceCount; i++) {
                const dpos = findSafeRabbitPos(150);
                spawnDog(this, dpos.x, dpos.y);
            }

            // 鳥をスポーン（3〜5羽）
            const birdCount = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < birdCount; i++) {
                spawnBird(this, worldWidth, groundY);
            }

            // レンジをスポーン（初期リスポーン位置）
            try {
                spawnRenji(this, worldWidth, groundY);
            } catch(e) {
                console.warn('[spawnRenji] エラーをスキップ:', e);
            }

            // 商人をスポーン（セーブから復元されていない場合のみ）
            if (merchants.length === 0) {
                // 地上の商人
                const merchantSurfaceX = 200 + Math.random() * (worldWidth - 400);
                spawnMerchant(this, merchantSurfaceX, groundY - 60);
                // 地下空洞内の商人（空洞があるランダムな場所を探す）
                let caveMerchantSpawned = false;
                const allBlksM = platforms.getChildren();
                for (let attempt = 0; attempt < 50 && !caveMerchantSpawned; attempt++) {
                    const tryX = 100 + Math.random() * (worldWidth - 200);
                    const tryY = groundY + 64 + Math.random() * (worldHeight - groundY - 200);
                    const gx = Math.round(tryX / BLOCK_SIZE) * BLOCK_SIZE + BLOCK_SIZE / 2;
                    const gy = Math.round(tryY / BLOCK_SIZE) * BLOCK_SIZE + BLOCK_SIZE / 2;
                    let hasFloor = false, isFree = true, isAboveFree = true;
                    for (let bi = 0; bi < allBlksM.length; bi++) {
                        const b = allBlksM[bi];
                        if (!b.active) continue;
                        if (Math.abs(b.x - gx) < 20 && Math.abs(b.y - gy) < 20) isFree = false;
                        if (Math.abs(b.x - gx) < 20 && Math.abs(b.y - (gy - BLOCK_SIZE)) < 20) isAboveFree = false;
                        if (Math.abs(b.x - gx) < 20 && Math.abs(b.y - (gy + BLOCK_SIZE)) < 20) hasFloor = true;
                    }
                    if (isFree && isAboveFree && hasFloor) {
                        spawnMerchant(this, gx, gy - 10);
                        caveMerchantSpawned = true;
                    }
                }
            }

            // カメラの設定
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            // プレイヤーに追従（遅延を指定して少し滑らかに）
            this.cameras.main.startFollow(player, true, 0.08, 0.08);
            // 縦方向に小さなデッドゾーンを設ける（ハーフブロック上での微細なY振動がカメラに伝わるのを防ぐ）
            // 横1px（実質デッドゾーンなし）・縦4px（±2px以内の揺れはカメラが反応しない）
            this.cameras.main.setDeadzone(1, 4);

            // ハイライトカーソルとゴースト初期化
            selector = this.add.sprite(0, 0, 'highlight').setVisible(false).setDepth(50);
            ghostSelector  = this.add.sprite(0, 0, 'ghost_block').setVisible(false).setDepth(49);
            ghostSelector2 = this.add.sprite(0, 0, 'ghost_block').setVisible(false).setDepth(49);
            ghostSelector3 = this.add.sprite(0, 0, 'ghost_block').setVisible(false).setDepth(49);

            // 究極のドット絵ライティング（単一Graphics方式 — 継ぎ目完全消去）
            lightGraphics = this.add.graphics()
                .setScrollFactor(0)
                .setDepth(90)
                .setBlendMode(Phaser.BlendModes.MULTIPLY);

            // PC用キーボード入力
            cursors = this.input.keyboard.createCursorKeys();
            wasdKeys = this.input.keyboard.addKeys({
                a: Phaser.Input.Keyboard.KeyCodes.A,
                d: Phaser.Input.Keyboard.KeyCodes.D,
                w: Phaser.Input.Keyboard.KeyCodes.W,
                s: Phaser.Input.Keyboard.KeyCodes.S,
                space: Phaser.Input.Keyboard.KeyCodes.SPACE
            });

            // ESCキーでメニュー開閉
            this.input.keyboard.on('keydown-ESC', () => {
                if (isBagOpen) {
                    playSE('ui_click');
                    closeBag();
                } else if (isHelpOpen) {
                    playSE('ui_click');
                    closeHelpScreen();
                } else if (isCreatureBookOpen) {
                    closeCreatureBook(this);
                } else if (isEncyclopediaOpen) {
                    closeEncyclopedia(this);
                } else if (isFurnacePanelOpen) {
                    playSE('ui_click');
                    closeFurnacePanel();
                } else if (isCookingPanelOpen) {
                    playSE('ui_click');
                    closeCookingPanel();
                } else if (isWorkbenchPanelOpen) {
                    playSE('ui_click');
                    closeWorkbenchPanel();
                } else if (isCraftPanelOpen) {
                    playSE('ui_click');
                    isCraftPanelOpen = false;
                    craftPanel.setX(this.scale.width + 250);
                } else if (isMenuOpen) {
                    playSE('ui_click');
                    isMenuOpen = false;
                    menuPanel.setVisible(false);
                } else {
                    playSE('ui_click');
                    isMenuOpen = true;
                    menuPanel.setVisible(true);
                }
            });

            // Cキーでクラフトメニュー開閉
            this.input.keyboard.on('keydown-C', () => {
                if (isEncyclopediaOpen || isCreatureBookOpen || isWorkbenchPanelOpen || isFurnacePanelOpen || isCookingPanelOpen) return;
                playSE('ui_click');
                isCraftPanelOpen = !isCraftPanelOpen;
                craftPanel.setX(isCraftPanelOpen ? this.scale.width : this.scale.width + 250);
            });

            // Bキーでバッグ開閉
            this.input.keyboard.on('keydown-B', () => {
                if (isEncyclopediaOpen || isCreatureBookOpen || isWorkbenchPanelOpen || isFurnacePanelOpen || isCookingPanelOpen || isHelpOpen) return;
                playSE('ui_click');
                toggleBag(this);
            });

            // ズーム操作（+/-キー）
            this.input.keyboard.on('keydown', (event) => {
                if (event.key === '+' || event.key === '=' || event.key === ';') {
                    applyZoom(this, Math.min(ZOOM_MAX, currentZoom + ZOOM_STEP));
                } else if (event.key === '-') {
                    applyZoom(this, Math.max(ZOOM_MIN, currentZoom - ZOOM_STEP));
                }
            });

            // スマホ用UI作成
            createUI(this);

            // セーブデータから松明・ランタンを復元
            if (_saveData && _saveData.torches) {
                for (const t of _saveData.torches) {
                    const tType = t.type || BLOCK_TYPES.TORCH;
                    const tData = BLOCK_DATA[tType];
                    const torchImg = tData.frame !== undefined
                        ? this.add.image(t.x, t.y, tData.texture, tData.frame)
                        : this.add.image(t.x, t.y, tData.texture);
                    torchImg.setDepth(20);
                    torches.push({ x: t.x, y: t.y, img: torchImg, type: tType });
                }
            }

            // 壁紙を復元
            if (_saveData && _saveData.walls) {
                for (const w of _saveData.walls) {
                    const wData = WALL_DATA[w.type];
                    if (!wData) continue;
                    const wallSpr = this.add.image(w.x, w.y, wData.texture);
                    wallSpr.setDepth(-2).setAlpha(0.88);
                    wallMap.set(wallKey(w.x, w.y), { type: w.type, sprite: wallSpr });
                }
            }

            // 装飾を復元
            if (_saveData && _saveData.decos) {
                for (const d of _saveData.decos) {
                    if (!DECO_DEFS[d.type]) continue;
                    createDeco(this, d.type, d.anchorX, d.anchorY);
                }
            }

            // ウィンドウサイズが変更されたら背景やUIを再配置する
            this.scale.on('resize', (gameSize) => {

                // グリッドは最初から大きめに作っているのでリサイズ処理は不要です
                repositionUI(gameSize.width, gameSize.height);
            });

            // ── ローディング画面をフェードアウトして非表示 ──
            const _ldScreen = document.getElementById('loading-screen');
            if (_ldScreen) {
                _ldScreen.classList.add('fade-out');
                setTimeout(() => { _ldScreen.style.display = 'none'; }, 700);
            }
        }
