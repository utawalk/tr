                            let friendship = rb.getData('friendship') + 1;
                            rb.setData('friendship', friendship);

                            if (friendship >= RABBIT_TAME_THRESHOLD) {
                                // ペット化！
                                rb.setData('tamed', true);
                                // カラー変化を保持しつつ♥アイコンで区別
                                const rbCi = rb.getData('colorIndex');
                                rb.setTint(RABBIT_COLORS[rbCi !== undefined ? rbCi : 0]);
                                const rbHeart = scene.add.text(rb.x, rb.y - 16, '♥', {
                                    fontSize: '11px', color: '#ff88aa', stroke: '#000', strokeThickness: 2
                                }).setOrigin(0.5).setDepth(21);
                                rb.setData('tamedIcon', rbHeart);
                                playSE('rabbit_tamed');
                                const tamedText = scene.add.text(
                                    rb.x, rb.y - 30, 'なかまになった！',
                                    { fontSize: '14px', color: '#ff88aa', stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: tamedText, y: tamedText.y - 40, alpha: 0,
                                    duration: 2000, ease: 'Power2',
                                    onComplete: () => tamedText.destroy()
                                });
                            } else {
                                playSE('feed_rabbit');
                                const heartText = scene.add.text(
                                    rb.x, rb.y - 25, '♥ ' + friendship + '/' + RABBIT_TAME_THRESHOLD,
                                    { fontSize: '12px', color: '#ff6688', stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: heartText, y: heartText.y - 30, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => heartText.destroy()
                                });
                            }
                            return; // 餌やり処理完了
                        }
                    }
                }
            }

            // === 犬への骨やり判定（1回で仲間化）===
            if (validPointer.isDown) {
                const holdingBoneNow = inventory[activeSlotIndex] && inventory[activeSlotIndex].type === BLOCK_TYPES.BONE && inventory[activeSlotIndex].count > 0;
                if (holdingBoneNow) {
                    for (const dg of dogs) {
                        if (!dg.active || dg.getData('tamed')) continue;
                        const dgDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, dg.x, dg.y);
                        const playerDgDist = Phaser.Math.Distance.Between(player.x, player.y, dg.x, dg.y);
                        if (dgDist < 30 && playerDgDist < 60) {
                            // 骨を1つ消費
                            inventory[activeSlotIndex].count--;
                            if (inventory[activeSlotIndex].count <= 0) {
                                inventory[activeSlotIndex] = { type: null, count: 0, texture: null };
                            }
                            updateInventoryUI();

                            // 即座に仲間化！
                            dg.setData('tamed', true);
                            // カラー変化を保持しつつ♥アイコンで区別
                            const dgCi = dg.getData('colorIndex');
                            dg.setTint(DOG_COLORS[dgCi !== undefined ? dgCi : 0]);
                            const dgHeart = scene.add.text(dg.x, dg.y - 22, '♥', {
                                fontSize: '11px', color: '#aaaaff', stroke: '#000', strokeThickness: 2
                            }).setOrigin(0.5).setDepth(21);
                            dg.setData('tamedIcon', dgHeart);
                            playSE('dog_tamed');
                            const tamedText = scene.add.text(
                                dg.x, dg.y - 30, 'なかまになった！',
                                { fontSize: '14px', color: '#88aaff', stroke: '#000', strokeThickness: 3 }
                            ).setOrigin(0.5).setDepth(200);
                            scene.tweens.add({
                                targets: tamedText, y: tamedText.y - 40, alpha: 0,
                                duration: 2000, ease: 'Power2',
                                onComplete: () => tamedText.destroy()
                            });
                            return;
                        }
                    }
                }
            }

            // === りんごを草ブロックに埋めて苗木を植える ===
            if (validPointer.isDown) {
                const holdingApple = inventory[activeSlotIndex] && inventory[activeSlotIndex].type === BLOCK_TYPES.APPLE && inventory[activeSlotIndex].count > 0;
                if (holdingApple) {
                    // クリック位置の草ブロックを探す
                    const bList = platforms.getChildren();
                    for (let i = 0; i < bList.length; i++) {
                        const blk = bList[i];
                        if (!blk.active || blk.getData('typeId') !== BLOCK_TYPES.GRASS) continue;
                        const bnds = blk.getBounds();
                        if (bnds.contains(validPointer._worldPtX, validPointer._worldPtY)) {
                            // 草ブロックの真上に苗木を配置
                            const sapX = blk.x;
                            const sapY = blk.y - BLOCK_SIZE;
                            // 既に何かある場所には植えない
                            let occupied = false;
                            for (let j = 0; j < bList.length; j++) {
                                if (bList[j].active && Math.abs(bList[j].x - sapX) < 16 && Math.abs(bList[j].y - sapY) < 16) {
                                    occupied = true; break;
                                }
                            }
                            if (!occupied) {
                                const sData = BLOCK_DATA[BLOCK_TYPES.SAPLING];
                                const sapling = platforms.create(sapX, sapY, sData.texture, sData.frame);
                                sapling.setData('typeId', BLOCK_TYPES.SAPLING);
                                sapling.setData('hp', sData.hp);
                                sapling.setScale(0.6);
                                saplings.push({ sprite: sapling, elapsed: 0 });
                                // りんごを1つ消費
                                inventory[activeSlotIndex].count--;
                                if (inventory[activeSlotIndex].count <= 0) {
                                    inventory[activeSlotIndex].type = null;
                                    inventory[activeSlotIndex].texture = null;
                                }
                                updateInventoryUI();
                                playSE('place');
                                lastActionTime = scene.time.now; // 採掘クールダウンをリセット
                                // テキスト表示
                                const plantText = scene.add.text(sapX, sapY - 20, '🌱', {
                                    fontSize: '18px'
                                }).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: plantText, y: plantText.y - 30, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => plantText.destroy()
                                });
                                return;
                            }
                        }
                    }
                }
            }

            // === 小麦の種を草ブロック/土ブロックに植える ===
            if (validPointer.isDown) {
                const holdingSeed = inventory[activeSlotIndex] && inventory[activeSlotIndex].type === BLOCK_TYPES.WHEAT_SEED && inventory[activeSlotIndex].count > 0;
                if (holdingSeed) {
                    const bList = platforms.getChildren();
                    for (let i = 0; i < bList.length; i++) {
                        const blk = bList[i];
                        if (!blk.active) continue;
                        const blkType = blk.getData('typeId');
                        if (blkType !== BLOCK_TYPES.GRASS && blkType !== BLOCK_TYPES.DIRT) continue;
                        const bnds = blk.getBounds();
                        if (bnds.contains(validPointer._worldPtX, validPointer._worldPtY)) {
                            const cropX = blk.x;
                            const cropY = blk.y - BLOCK_SIZE;
                            // 既に何かある場所には植えない
                            let occupied = false;
                            for (let j = 0; j < bList.length; j++) {
                                if (bList[j].active && Math.abs(bList[j].x - cropX) < 16 && Math.abs(bList[j].y - cropY) < 16) {
                                    occupied = true; break;
                                }
                            }
                            if (!occupied) {
                                const wData = BLOCK_DATA[BLOCK_TYPES.WHEAT_STAGE1];
                                const wheat = platforms.create(cropX, cropY, wData.texture, wData.frame);
                                wheat.setData('typeId', BLOCK_TYPES.WHEAT_STAGE1);
                                wheat.setData('hp', wData.hp);
                                wheat.body.enable = false; // 当たり判定なし
                                wheatCrops.push({ sprite: wheat, elapsed: 0 });
                                // 種を1つ消費
                                inventory[activeSlotIndex].count--;
                                if (inventory[activeSlotIndex].count <= 0) {
                                    inventory[activeSlotIndex].type = null;
                                    inventory[activeSlotIndex].texture = null;
                                }
                                updateInventoryUI();
                                playSE('place');
                                lastActionTime = scene.time.now;
                                const plantText = scene.add.text(cropX, cropY - 20, '🌱', {
                                    fontSize: '18px'
                                }).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: plantText, y: plantText.y - 30, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => plantText.destroy()
                                });
                                return;
                            }
                        }
                    }
                }
            }

            let targetTorchIndex = -1;
            // クリック/ホバー位置にある松明を探す
            for (let i = 0; i < torches.length; i++) {
                if (Math.abs(torches[i].x - validPointer._worldPtX) <= BLOCK_SIZE/2 && 
                    Math.abs(torches[i].y - validPointer._worldPtY) <= BLOCK_SIZE/2) {
                    targetTorchIndex = i;
                    break;
                }
            }

            // カーソルのスナップ位置（グリッドセル中心）を算出
            const px = validPointer._worldPtX;
            const py = validPointer._worldPtY;
            const snapX = Math.floor(px / BLOCK_SIZE) * BLOCK_SIZE + BLOCK_SIZE / 2;
            const snapY = Math.floor(py / BLOCK_SIZE) * BLOCK_SIZE + BLOCK_SIZE / 2;

            // スナップ位置のブロックを bkGetAt で O(1) 検出
            // → グリッドセル単位で判定するため「隣接セルなのに検出される」問題を根本解決
            targetBlock = bkGetAt(snapX, snapY);

            // 壁紙ターゲット (前景ブロックがない位置の壁を採掘できる)
            const _noFg = !targetBlock && targetTorchIndex === -1;
            const targetWall = _noFg ? wallGetAt(snapX, snapY) : null;
            // 装飾ターゲット（壁より手前・前景ブロックなしの位置）
            const targetDeco = _noFg ? decoGetAt(snapX, snapY) : null;

            // 壁紙・装飾アイテムを持っているときは、壁/装飾の存在を mine トリガーとしない
            // （前景ブロックや松明の上でのみ mine モードになる）
            const _heldSlot = inventory[activeSlotIndex];
            const _holdingWallOrDeco = _heldSlot && _heldSlot.count > 0 && _heldSlot.type !== null &&
                (WALL_ITEMS.has(_heldSlot.type) || DECO_ITEMS.has(_heldSlot.type));

            let actionType = 'none';

            if (isPlacementMode) {
                actionType = 'place';
            } else {
                if (validPointer.rightButtonDown()) {
                    actionType = 'place';
                } else {
                    // 壁紙・装飾持ち中は targetWall / targetDeco があっても mine にしない
                    const _bgMineTarget = !_holdingWallOrDeco && (targetDeco || targetWall);
                    if (!validPointer.isDown) {
                        if (targetBlock || targetTorchIndex !== -1 || _bgMineTarget) actionType = 'mine';
                        else actionType = 'place';
                    } else {
                        if (targetBlock || targetTorchIndex !== -1 || _bgMineTarget) actionType = 'mine';
                    }
                }
            }

            // りんご保持中に草ブロックをクリック → 採掘せず苗木植え付け用なのでスキップ
            if (actionType === 'mine' && targetBlock && targetBlock.getData('typeId') === BLOCK_TYPES.GRASS) {
                const heldNow = inventory[activeSlotIndex];
                if (heldNow && heldNow.type === BLOCK_TYPES.APPLE && heldNow.count > 0) {
                    return;
                }
            }
            // 小麦の種保持中に草/土ブロックをクリック → 採掘せず種植え用なのでスキップ
            if (actionType === 'mine' && targetBlock) {
                const tId = targetBlock.getData('typeId');
                if (tId === BLOCK_TYPES.GRASS || tId === BLOCK_TYPES.DIRT) {
                    const heldNow = inventory[activeSlotIndex];
                    if (heldNow && heldNow.type === BLOCK_TYPES.WHEAT_SEED && heldNow.count > 0) {
                        return;
                    }
                }
            }

            // 水ブロックは採掘不可
            if (actionType === 'mine' && targetBlock && targetBlock.getData('typeId') === BLOCK_TYPES.WATER) {
                targetBlock = null;
            }

            // 長押し状態管理: ポインターが離れたときに短クリック判定
            if (longPressTarget !== null) {
                const ptrDown = validPointer.isDown || validPointer.leftButtonDown();
                if (!ptrDown) {
                    // ポインターが離れた → 短クリックか確認して発火
                    const _heldMs = scene.time.now - longPressPointerDownTime;
                    if (_heldMs < SHORT_CLICK_THRESHOLD) {
                        _fireInteract(scene, longPressTarget);
                    }
                    if (longPressGfx) { longPressGfx.destroy(); longPressGfx = null; }
                    longPressTarget = null;
                    longPressPointerDownTime = 0;
                    longPressLastHitSnd = 0;
                } else if (longPressTarget !== targetBlock) {
                    // 対象ブロックが変わった → リセット
                    if (longPressGfx) { longPressGfx.destroy(); longPressGfx = null; }
                    longPressTarget = null;
                    longPressPointerDownTime = 0;
                    longPressLastHitSnd = 0;
                }
            }

            // ===== 装飾採掘（前景ブロックなし・松明なし・壁なし or 壁より優先）=====
            if (actionType === 'mine' && targetDeco && !targetBlock && targetTorchIndex === -1) {
                const def = DECO_DEFS[targetDeco.type];
                // セレクタを装飾サイズに合わせて表示
                selector.setPosition(targetDeco.sprite.x, targetDeco.sprite.y)
                    .setDisplaySize(def.w * BLOCK_SIZE, def.h * BLOCK_SIZE)
                    .setVisible(true);

                if (validPointer.isDown || validPointer.leftButtonDown()) {
                    isMining = true;
                    if (scene.time.now - lastActionTime > 200) {
                        lastActionTime = scene.time.now;
                        addInventoryItem(targetDeco.type, 1, def.texture, undefined);
                        removeDeco(targetDeco);
                        selector.setVisible(false);
                        playSE('destroy');
                        const ft = scene.add.text(snapX, snapY - 20, def.name + ' +1', {
                            fontSize: '13px', color: '#FFD080', stroke: '#000', strokeThickness: 3
                        }).setOrigin(0.5).setDepth(200);
                        scene.tweens.add({ targets: ft, y: ft.y - 35, alpha: 0, duration: 1200, ease: 'Power2', onComplete: () => ft.destroy() });
                    }
                }
                return;
            }

            // ===== 壁紙採掘（前景ブロックなし・松明なし・壁あり）=====
            if (actionType === 'mine' && targetWall && !targetBlock && targetTorchIndex === -1) {
                selector.setPosition(targetWall.sprite.x, targetWall.sprite.y);
                selector.setVisible(true);
                if (validPointer.isDown || validPointer.leftButtonDown()) {
                    isMining = true;
                    const mineCooldown = 200;
                    if (scene.time.now - lastActionTime > mineCooldown) {
                        lastActionTime = scene.time.now;
                        const wData = WALL_DATA[targetWall.type];
                        addInventoryItem(targetWall.type, 1, wData.texture, undefined);
                        targetWall.sprite.destroy();
                        wallMap.delete(wallKey(snapX, snapY));
                        selector.setVisible(false);
                        playSE('destroy');
                        // フロートテキスト
                        const ft = scene.add.text(snapX, snapY - 20, wData.name + ' +1', {
                            fontSize: '13px', color: '#D4A050', stroke: '#000', strokeThickness: 3
                        }).setOrigin(0.5).setDepth(200);
                        scene.tweens.add({ targets: ft, y: ft.y - 35, alpha: 0, duration: 1200, ease: 'Power2', onComplete: () => ft.destroy() });
                    }
                }
                return;
            }

            if (actionType === 'mine' && (targetBlock || targetTorchIndex !== -1)) {
                const targetX = targetBlock ? targetBlock.x : torches[targetTorchIndex].x;
                const targetY = targetBlock ? targetBlock.y : torches[targetTorchIndex].y;
                selector.setPosition(targetX, targetY);
                selector.setVisible(true);

                if (validPointer.isDown || validPointer.leftButtonDown()) {
                    isMining = true;
                    // インタラクティブブロックへの長押し追跡: クールダウン外で押下時刻を記録
                    if (targetBlock) {
                        const _lpTid = targetBlock.getData('typeId');
                        if (LONG_PRESS_BREAK_TYPES.has(_lpTid) && longPressTarget !== targetBlock) {
                            if (longPressGfx) { longPressGfx.destroy(); longPressGfx = null; }
                            longPressTarget = targetBlock;
                            longPressPointerDownTime = scene.time.now;
                            longPressGfx = scene.add.graphics().setDepth(202);
                            longPressLastHitSnd = 0;
                        }
                    }
                    // ピッケル装備判定
                    const heldItem = inventory[activeSlotIndex];
                    const hasIronPickaxe = heldItem && heldItem.type === BLOCK_TYPES.IRON_PICKAXE && heldItem.count > 0;
                    const hasStonePickaxe = heldItem && heldItem.type === BLOCK_TYPES.STONE_PICKAXE && heldItem.count > 0;
                    const hasPickaxe = hasIronPickaxe || hasStonePickaxe;
                    const mineCooldown = hasIronPickaxe ? 83 : hasStonePickaxe ? 125 : 250;
                    if (scene.time.now - lastActionTime > mineCooldown) {
                        lastActionTime = scene.time.now;

                        // 松明・ランタンを壊す処理
                        if (!targetBlock && targetTorchIndex !== -1) {
                            const tObj = torches[targetTorchIndex];
                            tObj.img.destroy();
                            torches.splice(targetTorchIndex, 1);
                            const dropType = tObj.type || BLOCK_TYPES.TORCH;
                            const dropData = BLOCK_DATA[dropType];
                            addInventoryItem(dropType, 1, dropData.texture, dropData.frame);
                            selector.setVisible(false);
                            return; // 掘り終わったら抜ける
                        }

                        // 通常のブロックを壊す処理
                        if (targetBlock) {
                            const typeId = targetBlock.getData('typeId');
                            const bData = BLOCK_DATA[typeId];

                            // === りんごの拾い処理 ===
                            if (typeId === BLOCK_TYPES.APPLE) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 40 || dy > 56) return;
                                playSE('pickup_apple');
                                const aData = BLOCK_DATA[BLOCK_TYPES.APPLE];
                                addInventoryItem(BLOCK_TYPES.APPLE, 1, aData.texture, aData.frame);
                                bkUnregister(targetBlock);
                                targetBlock.disableBody(true, true);
                                selector.setVisible(false);
                                // フロートテキスト
                                const ft = scene.add.text(
                                    targetBlock.x, targetBlock.y - 20, 'りんご +1',
                                    { fontSize: '14px', color: '#FF6666', stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: ft, y: ft.y - 40, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => ft.destroy()
                                });
                                return;
                            }

                            // === 小麦の収穫処理 ===
                            if (typeId === BLOCK_TYPES.WHEAT) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 40 || dy > 56) return;
                                playSE('pickup_apple');
                                const wData = BLOCK_DATA[BLOCK_TYPES.WHEAT];
                                addInventoryItem(BLOCK_TYPES.WHEAT, 1, wData.texture, wData.frame);
                                // 収穫時に追加で種を0〜1個返す
                                if (Math.random() < 0.5) {
                                    const seedData = BLOCK_DATA[BLOCK_TYPES.WHEAT_SEED];
                                    addInventoryItem(BLOCK_TYPES.WHEAT_SEED, 1, seedData.texture, seedData.frame);
                                }
                                bkUnregister(targetBlock);
                                targetBlock.disableBody(true, true);
                                selector.setVisible(false);
                                const ft = scene.add.text(
                                    targetBlock.x, targetBlock.y - 20, '小麦 +1',
                                    { fontSize: '14px', color: '#DDAA33', stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: ft, y: ft.y - 40, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => ft.destroy()
                                });
                                return;
                            }

                            // === 骨の拾い処理 ===
                            if (typeId === BLOCK_TYPES.BONE) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 40 || dy > 56) return;
                                playSE('pickup_apple');
                                const boneData = BLOCK_DATA[BLOCK_TYPES.BONE];
                                addInventoryItem(BLOCK_TYPES.BONE, 1, boneData.texture, boneData.frame);
                                bkUnregister(targetBlock);
                                targetBlock.disableBody(true, true);
                                selector.setVisible(false);
                                const ft = scene.add.text(
                                    targetBlock.x, targetBlock.y - 20, '骨 +1',
                                    { fontSize: '14px', color: '#F0E8D8', stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: ft, y: ft.y - 40, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => ft.destroy()
                                });
                                return;
                            }

                            // === 金塊の拾い処理 ===
                            if (typeId === BLOCK_TYPES.GOLD) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 40 || dy > 56) return;
                                playSE('pickup_apple');
                                const goldData = BLOCK_DATA[BLOCK_TYPES.GOLD];
                                addInventoryItem(BLOCK_TYPES.GOLD, 1, goldData.texture, goldData.frame);
                                bkUnregister(targetBlock);
                                targetBlock.disableBody(true, true);
                                selector.setVisible(false);
                                const ft = scene.add.text(
                                    targetBlock.x, targetBlock.y - 20, '金塊 +1',
                                    { fontSize: '14px', color: '#FFD700', stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: ft, y: ft.y - 40, alpha: 0,
                                    duration: 1500, ease: 'Power2',
                                    onComplete: () => ft.destroy()
                                });
                                return;
                            }

                            // === 長押し破壊チェック（インタラクティブブロック）===
                            // 短クリック（<450ms でリリース）: リセット時に _fireInteract で発火
                            // バー表示中（450ms〜1800ms）: UI操作ブロック＋打撃音
                            // 長押し完了（1800ms〜）: skipInteractive=true にして通常破壊
                            let skipInteractive = false;
                            if (LONG_PRESS_BREAK_TYPES.has(typeId)) {
                                const _lpDx = Math.abs(player.x - targetBlock.x);
                                const _lpDy = Math.abs(player.y - targetBlock.y);
                                if (_lpDx > 80 || _lpDy > 112) return; // 遠すぎる

                                const _elapsed = scene.time.now - longPressPointerDownTime;

                                if (_elapsed >= LONG_PRESS_DURATION) {
                                    // ──── 長押し完了: 破壊 ────
                                    playBreakSound();
                                    longPressLastHitSnd = 0;
                                    if (longPressGfx) { longPressGfx.destroy(); longPressGfx = null; }
                                    longPressTarget = null;
                                    longPressPointerDownTime = 0;
                                    skipInteractive = true;
                                } else if (_elapsed >= SHORT_CLICK_THRESHOLD) {
                                    // ──── バー表示フェーズ: UI操作をブロック ────
                                    const _prog = Math.min(_elapsed / LONG_PRESS_DURATION, 1);
                                    if (longPressGfx && longPressTarget && longPressTarget.active) {
                                        const _bx = longPressTarget.x, _by = longPressTarget.y;
                                        const _bw = 24, _bh = 4;
                                        longPressGfx.clear();
                                        longPressGfx.fillStyle(0x000000, 0.75);
                                        longPressGfx.fillRect(_bx - _bw/2 - 1, _by - 22, _bw + 2, _bh + 2);
                                        const _r = 0xff;
                                        const _g = Math.floor(0x88 * (1 - _prog));
                                        longPressGfx.fillStyle((_r << 16) | (_g << 8) | 0x00, 1);
                                        longPressGfx.fillRect(_bx - _bw/2, _by - 21, Math.floor(_bw * _prog), _bh);
                                        longPressGfx.lineStyle(1, 0xffffff, 0.8);
                                        longPressGfx.strokeRect(_bx - _bw/2 - 1, _by - 22, _bw + 2, _bh + 2);
                                    }
                                    // 後半ほど打撃音が速くなる（緊張感）
                                    const _hitInterval = Math.max(120, 320 - Math.floor(_prog * 180));
                                    if (scene.time.now - longPressLastHitSnd > _hitInterval) {
                                        playHitSound();
                                        longPressLastHitSnd = scene.time.now;
                                    }
                                    return; // UI操作をブロック
                                } else {
                                    // ──── 短クリック待機中: まだ何もしない ────
                                    return;
                                }
                            }

                            // === 作業台クリック処理 ===
                            if (!skipInteractive && typeId === BLOCK_TYPES.WORKBENCH) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;
                                openWorkbenchPanel(scene);
                                return;
                            }

                            // === 石窯クリック処理 ===
                            if (!skipInteractive && typeId === BLOCK_TYPES.FURNACE) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;
                                openFurnacePanel(scene, targetBlock);
                                return;
                            }

                            // === 調理台クリック処理 ===
                            if (!skipInteractive && typeId === BLOCK_TYPES.COOKING_TABLE) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;
                                openCookingPanel(scene, targetBlock);
                                return;
                            }

                            // === 収納チェストクリック処理 ===
                            if (!skipInteractive && typeId === BLOCK_TYPES.STORAGE_CHEST) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;
                                if (isChestOpen && openChestBlock === targetBlock) {
                                    closeStorageChest();
                                } else {
                                    openStorageChest(scene, targetBlock);
                                }
                                return;
                            }

                            // === 開店看板クリック処理 ===
                            if (!skipInteractive && (typeId === BLOCK_TYPES.SIGN_OPEN || typeId === BLOCK_TYPES.SIGN_CLOSE)) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;
                                showSignToggleConfirm(scene, targetBlock);
                                return;
                            }

                            // === ドアクリック処理（開閉トグル） ===
                            if (!skipInteractive && (typeId === BLOCK_TYPES.DOOR_B || typeId === BLOCK_TYPES.DOOR_M || typeId === BLOCK_TYPES.DOOR_T)) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 96) return;
                                const parts = targetBlock.getData('doorParts');
                                if (!parts) return;
                                const isOpen = parts[0].getData('doorOpen');
                                const newOpen = !isOpen;
                                const openTextures   = ['door_open_b',   'door_open_m',   'door_open_t'];
                                const closedTextures = ['door_closed_b', 'door_closed_m', 'door_closed_t'];
                                const textures = newOpen ? openTextures : closedTextures;
                                for (let pi = 0; pi < 3; pi++) {
                                    const part = parts[pi];
                                    if (!part || !part.active) continue;
                                    part.setTexture(textures[pi]);
                                    part.setData('doorOpen', newOpen);
                                    if (newOpen) {
                                        part.body.enable = false;
                                    } else {
                                        part.body.enable = true;
                                        part.refreshBody();
                                    }
                                }
                                playSE(newOpen ? 'ui_click' : 'place_wood');
                                return;
                            }

                            // === ベッドクリック処理 ===
                            if (!skipInteractive && (typeId === BLOCK_TYPES.STRAW_BED_L || typeId === BLOCK_TYPES.STRAW_BED_R)) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;
                                // 左半分の座標を基準にする
                                const bedLBlock = typeId === BLOCK_TYPES.STRAW_BED_L ? targetBlock : targetBlock.getData('bedPair');
                                if (bedLBlock) {
                                    showBedConfirm(scene, bedLBlock);
                                }
                                return;
                            }

                            // === テーブルクリック処理 ===
                            if (!skipInteractive && typeId === BLOCK_TYPES.TABLE) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 56 || dy > 72) return;

                                const existing = tableItems.find(ti => ti.tableBlock === targetBlock);
                                const heldItem = inventory[activeSlotIndex];
                                const holding = heldItem && heldItem.type !== null && heldItem.count > 0;
                                if (existing && holding && existing.itemType === heldItem.type) {
                                    // 同じ種類 → スタック追加
                                    existing.itemCount += heldItem.count;
                                    heldItem.count = 0; heldItem.type = null; heldItem.texture = null;
                                    updateTableItemCountText(existing);
                                    updateInventoryUI();
                                    playSE('place');
                                } else if (existing) {
                                    // 別種 or 手ぶら → 全回収
                                    const bd = BLOCK_DATA[existing.itemType];
                                    addInventoryItem(existing.itemType, existing.itemCount, bd.texture, bd.frame);
                                    if (existing.itemSprite) existing.itemSprite.destroy();
                                    if (existing.countText) existing.countText.destroy();
                                    tableItems.splice(tableItems.indexOf(existing), 1);
                                    playSE('pickup');
                                } else if (holding) {
                                    // 空テーブル → スタック丸ごと置く
                                    const bData = BLOCK_DATA[heldItem.type];
                                    if (bData) {
                                        const itemSpr = scene.add.image(
                                            targetBlock.x, targetBlock.y - 9,
                                            bData.texture, bData.frame
                                        ).setDisplaySize(10, 10).setDepth(15);
                                        const countTxt = scene.add.text(
                                            targetBlock.x + 6, targetBlock.y - 14,
                                            String(heldItem.count), {
                                                fontSize: '9px', color: '#ffffff', fontStyle: 'bold',
                                                stroke: '#000000', strokeThickness: 2
                                            }
                                        ).setOrigin(1, 1).setDepth(16).setScrollFactor(1)
                                         .setVisible(heldItem.count > 1);
                                        tableItems.push({
                                            tableBlock: targetBlock,
                                            itemSprite: itemSpr,
                                            countText: countTxt,
                                            itemType: heldItem.type,
                                            itemCount: heldItem.count
                                        });
                                        heldItem.count = 0; heldItem.type = null; heldItem.texture = null;
                                        updateInventoryUI();
                                        playSE('place');
                                    }
                                }
                                return;
                            }

                            // === 宝箱の隣接判定 ===
                            if (typeId === BLOCK_TYPES.CHEST) {
                                const dx = Math.abs(player.x - targetBlock.x);
                                const dy = Math.abs(player.y - targetBlock.y);
                                if (dx > 40 || dy > 56) return; // 隣接ブロックにいない場合は操作不可
                            }

                            // === 宝箱の開封処理 ===
                            if (typeId === BLOCK_TYPES.CHEST) {
                                // 宝箱のテクスチャを「開」に切替
                                targetBlock.setFrame(BLOCK_DATA[BLOCK_TYPES.CHEST_OPEN].frame);
                                targetBlock.setData('typeId', BLOCK_TYPES.CHEST_OPEN);
                                selector.setVisible(false);

                                // ランダム報酬を決定
                                playSE('chest_open');
                                const loot = rollChestLoot();
                                if (loot.isMoney) {
                                    addMoney(loot.count);
                                } else {
                                    const lootData = BLOCK_DATA[loot.id];
                                    addInventoryItem(loot.id, loot.count, lootData.texture, lootData.frame);
                                }

                                // フロートテキストで報酬を表示
                                const floatText = scene.add.text(
                                    targetBlock.x, targetBlock.y - 20,
                                    loot.name,
                                    { fontSize: '14px', fontFamily: 'Arial', color: '#FFD700',
                                      stroke: '#000', strokeThickness: 3, align: 'center' }
                                ).setOrigin(0.5).setDepth(200);

                                // テキストを上にフロートさせて消す
                                scene.tweens.add({
                                    targets: floatText,
                                    y: floatText.y - 40,
                                    alpha: 0,
                                    duration: 1500,
                                    ease: 'Power2',
                                    onComplete: () => floatText.destroy()
                                });

                                // 1秒後に宝箱を消滅
                                scene.time.delayedCall(1000, () => {
                                    if (targetBlock && targetBlock.active) {
                                        bkUnregister(targetBlock);
                                        targetBlock.disableBody(true, true);
                                    }
                                });
                                return; // 宝箱処理完了で抜ける
                            }

                            // === ピッケル必須ブロックの判定 ===
                            if (PICKAXE_REQUIRED.has(typeId) && !hasPickaxe) {
                                playSE('ui_error');
                                // 「ピッケルが必要」のフロートテキスト
                                const needText = scene.add.text(
                                    targetBlock.x, targetBlock.y - 20,
                                    'Pickaxe required!',
                                    { fontSize: '12px', color: '#ff6666',
                                      stroke: '#000', strokeThickness: 3 }
                                ).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: needText,
                                    y: needText.y - 30, alpha: 0,
                                    duration: 1200,
                                    onComplete: () => needText.destroy()
                                });
                                return;
                            }

                            // === 通常ブロックのダメージ処理 ===
                            let currentHp = targetBlock.getData('hp');
                            const dmg = hasIronPickaxe ? 3 : hasStonePickaxe ? 2 : 1;
                            currentHp -= dmg;

                            // 採掘SE: ブロック種別で音を分ける
                            if (typeId === BLOCK_TYPES.IRON) {
                                playSE('mine_iron');
                            } else if (typeId === BLOCK_TYPES.GOLD) {
                                playSE('mine_gold');
                            } else if (typeId === BLOCK_TYPES.WOOD) {
                                playSE('mine_wood');
                            } else if (typeId === BLOCK_TYPES.LEAF) {
                                playSE('mine_leaf');
                            } else if (typeId === BLOCK_TYPES.STONE || typeId === BLOCK_TYPES.STONE_BRICK) {
                                playSE('mine_stone');
                            } else {
                                playSE('mine_dirt');
                            }

                            if (currentHp <= 0) {
                                // ひびオーバーレイがあれば削除
                                const crackSprite = targetBlock.getData('crackSprite');
                                if (crackSprite) crackSprite.destroy();

                                bkUnregister(targetBlock);
                                targetBlock.disableBody(true, true);
                                playSE('destroy');
                                selector.setVisible(false);

                                // 成長中の小麦を壊した場合はwheatCropsから除去
                                const wheatIdx = wheatCrops.findIndex(c => c.sprite === targetBlock);
                                if (wheatIdx !== -1) wheatCrops.splice(wheatIdx, 1);

                                // 蔦・梯子を壊した場合はvineBlocksから除去
                                const vIdx = vineBlocks.indexOf(targetBlock);
                                if (vIdx !== -1) vineBlocks.splice(vIdx, 1);

                                // 階段を壊した場合はstairBlocksから除去
                                const sIdx = stairBlocks.findIndex(sb => sb.block === targetBlock);
                                if (sIdx !== -1) {
                                    stairPosSet.delete(bkKey(targetBlock.x, targetBlock.y));
                                    stairBlocks.splice(sIdx, 1);
                                }
                                // スロープを壊した場合はslopeBlocksから除去
                                const slIdx = slopeBlocks.indexOf(targetBlock);
                                if (slIdx !== -1) slopeBlocks.splice(slIdx, 1);
                                // ハーフブロックを壊した場合はhalfBlocksから除去
                                const hbIdx = halfBlocks.indexOf(targetBlock);
                                if (hbIdx !== -1) {
                                    halfBlockPosSet.delete(bkKey(targetBlock.x, targetBlock.y));
                                    halfBlocks.splice(hbIdx, 1);
                                }

                                // ドアの一部を壊したら全部品を破壊
                                if (typeId === BLOCK_TYPES.DOOR_B || typeId === BLOCK_TYPES.DOOR_M || typeId === BLOCK_TYPES.DOOR_T) {
                                    const parts = targetBlock.getData('doorParts');
                                    if (parts) {
                                        for (const p of parts) {
                                            if (p && p.active && p !== targetBlock) {
                                                const pCrack = p.getData('crackSprite');
                                                if (pCrack) pCrack.destroy();
                                                bkUnregister(p);
                                                p.disableBody(true, true);
                                            }
                                        }
                                    }
                                }

                                // ベッド片方を壊したらもう片方も破壊
                                if (typeId === BLOCK_TYPES.STRAW_BED_L || typeId === BLOCK_TYPES.STRAW_BED_R) {
                                    const pair = targetBlock.getData('bedPair');
                                    if (pair && pair.active) {
                                        const pairCrack = pair.getData('crackSprite');
                                        if (pairCrack) pairCrack.destroy();
                                        bkUnregister(pair);
                                        pair.disableBody(true, true);
                                    }
                                    // 自宅がこのベッドだった場合、自宅解除
                                    if (homePosition) {
                                        const bx = typeId === BLOCK_TYPES.STRAW_BED_L ? targetBlock.x : (pair ? pair.x : targetBlock.x);
                                        if (Math.abs(homePosition.x - bx) < 8 && Math.abs(homePosition.y - (targetBlock.y - 16)) < 8) {
                                            homePosition = null;
                                        }
                                    }
                                }

                                // テーブル片方を壊したらもう片方も破壊
                                if (typeId === BLOCK_TYPES.TABLE_L || typeId === BLOCK_TYPES.TABLE_R) {
                                    const pair = targetBlock.getData('tablePair');
                                    if (pair && pair.active) {
                                        const pairCrack = pair.getData('crackSprite');
                                        if (pairCrack) pairCrack.destroy();
                                        bkUnregister(pair);
                                        pair.disableBody(true, true);
                                    }
                                }

                                // 収納チェストを壊した場合は中身をすべて回収
                                if (typeId === BLOCK_TYPES.STORAGE_CHEST) {
                                    if (isChestOpen && openChestBlock === targetBlock) closeStorageChest();
                                    const key = getChestKey(targetBlock);
                                    const cItems = chestContents[key];
                                    if (cItems) {
                                        for (const ci of cItems) {
                                            if (ci.type !== null && ci.count > 0) {
                                                const cbd = BLOCK_DATA[ci.type];
                                                if (cbd) addInventoryItem(ci.type, ci.count, cbd.texture, cbd.frame);
                                            }
                                        }
                                        delete chestContents[key];
                                    }
                                }

                                // テーブル上アイテムがあれば回収
                                const tIdx = tableItems.findIndex(ti => ti.tableBlock === targetBlock);
                                if (tIdx !== -1) {
                                    const ti = tableItems[tIdx];
                                    const tid = BLOCK_DATA[ti.itemType];
                                    addInventoryItem(ti.itemType, ti.itemCount, tid.texture, tid.frame);
                                    if (ti.itemSprite) ti.itemSprite.destroy();
                                    if (ti.countText) ti.countText.destroy();
                                    tableItems.splice(tIdx, 1);
                                }

                                let dropId = bData.id;
                                let dropTexture = bData.texture;
                                let dropFrame = bData.frame;
                                if (dropId === BLOCK_TYPES.GRASS) {
                                    dropId = BLOCK_TYPES.DIRT;
                                    dropTexture = BLOCK_DATA[BLOCK_TYPES.DIRT].texture;
                                    dropFrame = BLOCK_DATA[BLOCK_TYPES.DIRT].frame;
                                }
                                // ベッド右半分はドロップなし（左半分でまとめて1個ドロップ）
                                if (dropId === BLOCK_TYPES.STRAW_BED_R) {
                                    dropId = BLOCK_TYPES.STRAW_BED_L;
                                    dropTexture = BLOCK_DATA[BLOCK_TYPES.STRAW_BED_L].texture;
                                    dropFrame = BLOCK_DATA[BLOCK_TYPES.STRAW_BED_L].frame;
                                }
                                // テーブル右半分はドロップなし（左半分でまとめて1個ドロップ）
                                if (dropId === BLOCK_TYPES.TABLE_R) {
                                    dropId = BLOCK_TYPES.TABLE_L;
                                    dropTexture = BLOCK_DATA[BLOCK_TYPES.TABLE_L].texture;
                                    dropFrame = BLOCK_DATA[BLOCK_TYPES.TABLE_L].frame;
                                }
                                // ドア中段・上段はドア下段としてドロップ（1個にまとめる）
                                if (dropId === BLOCK_TYPES.DOOR_M || dropId === BLOCK_TYPES.DOOR_T) {
                                    dropId = BLOCK_TYPES.DOOR_B;
                                    dropTexture = BLOCK_DATA[BLOCK_TYPES.DOOR_B].texture;
                                    dropFrame = BLOCK_DATA[BLOCK_TYPES.DOOR_B].frame;
                                }

                                // CLOSE看板はOPEN看板としてドロップ
                                if (dropId === BLOCK_TYPES.SIGN_CLOSE) {
                                    dropId = BLOCK_TYPES.SIGN_OPEN;
                                    dropTexture = BLOCK_DATA[BLOCK_TYPES.SIGN_OPEN].texture;
                                    dropFrame = BLOCK_DATA[BLOCK_TYPES.SIGN_OPEN].frame;
                                }

                                // 雑草を刈ると追加で25%の確率で小麦の種もドロップ
                                if (dropId === BLOCK_TYPES.WEED && Math.random() < 0.25) {
                                    const seedData = BLOCK_DATA[BLOCK_TYPES.WHEAT_SEED];
                                    addInventoryItem(BLOCK_TYPES.WHEAT_SEED, 1, seedData.texture, seedData.frame);
                                }

                                // 成長中の小麦を壊したら種を返す（成熟小麦は収穫ハンドラで処理）
                                if (dropId === BLOCK_TYPES.WHEAT_STAGE1 || dropId === BLOCK_TYPES.WHEAT_STAGE2) {
                                    const seedData = BLOCK_DATA[BLOCK_TYPES.WHEAT_SEED];
                                    addInventoryItem(BLOCK_TYPES.WHEAT_SEED, 1, seedData.texture, seedData.frame);
                                } else {
                                addInventoryItem(dropId, 1, dropTexture, dropFrame);
                                }

                                // 隣接する水の流動を即座にトリガー
                                lastWaterFlowTime = 0;

                                // 破壊したブロックの真上にある雑草・花・小麦を消す
                                const aboveX = targetBlock.x;
                                const aboveY = targetBlock.y - BLOCK_SIZE;
                                platforms.getChildren().forEach(blk => {
                                    if (!blk.active) return;
                                    if (Math.abs(blk.x - aboveX) < 4 && Math.abs(blk.y - aboveY) < 4) {
                                        const tid = blk.getData('typeId');
                                        if (tid === BLOCK_TYPES.WEED || tid === BLOCK_TYPES.FLOWER ||
                                            tid === BLOCK_TYPES.WHEAT_STAGE1 || tid === BLOCK_TYPES.WHEAT_STAGE2 ||
                                            tid === BLOCK_TYPES.WHEAT || tid === BLOCK_TYPES.SAPLING) {
                                            const cs = blk.getData('crackSprite');
                                            if (cs) cs.destroy();
                                            // 小麦は wheatCrops から除去
                                            const wi = wheatCrops.findIndex(c => c.sprite === blk);
                                            if (wi !== -1) wheatCrops.splice(wi, 1);
                                            bkUnregister(blk);
                                            blk.disableBody(true, true);
                                        }
                                    }
                                });
                            } else {
                                targetBlock.setData('hp', currentHp);

                                // ひび割れオーバーレイを表示/更新
                                const damageStage = bData.hp - currentHp;
                                const crackFrame = Math.min(damageStage - 1, 1);
                                
                                let crackSprite = targetBlock.getData('crackSprite');
                                if (!crackSprite) {
                                    crackSprite = scene.add.sprite(targetBlock.x, targetBlock.y, 'crack', crackFrame);
                                    crackSprite.setDepth(10);
                                    targetBlock.setData('crackSprite', crackSprite);
                                } else {
                                    crackSprite.setFrame(crackFrame);
                                }
                            }
                        }
                    }
                }
            } else if (actionType === 'place') {
                const activeItem = inventory[activeSlotIndex];

                // ツールアイテムは設置不可
                if (activeItem.type !== null && TOOL_ITEMS.has(activeItem.type)) return;

                if (activeItem.count <= 0) {
                    ghostSelector.setVisible(false);
                    return;
                }

                const gridX = Math.floor(validPointer._worldPtX / BLOCK_SIZE) * BLOCK_SIZE + (BLOCK_SIZE / 2);
                const gridY = Math.floor(validPointer._worldPtY / BLOCK_SIZE) * BLOCK_SIZE + (BLOCK_SIZE / 2);

                // ===== 装飾アイテムの設置処理 =====
                if (activeItem.type !== null && DECO_ITEMS.has(activeItem.type)) {
                    const def = DECO_DEFS[activeItem.type];
                    // アンカー: カーソルのグリッドセル（左上）
                    // ゴーストプレビュー（装飾サイズに拡大）
                    const ghostCx = gridX + (def.w - 1) * BLOCK_SIZE / 2;
                    const ghostCy = gridY + (def.h - 1) * BLOCK_SIZE / 2;
                    ghostSelector.setPosition(ghostCx, ghostCy);
                    ghostSelector.setTexture(def.texture);
                    ghostSelector.setDisplaySize(def.w * BLOCK_SIZE, def.h * BLOCK_SIZE);
                    ghostSelector.setAlpha(0.6);
                    ghostSelector.setVisible(true);

                    // 設置可否チェック: 全セルが前景ブロックなし & 他の装飾なし
                    let decoCanPlace = true;
                    for (let dx = 0; dx < def.w && decoCanPlace; dx++) {
                        for (let dy = 0; dy < def.h && decoCanPlace; dy++) {
                            const cx = gridX + dx * BLOCK_SIZE;
                            const cy = gridY + dy * BLOCK_SIZE;
                            if (bkGetAt(cx, cy)) decoCanPlace = false;
                            if (decoOccupied.has(wallKey(cx, cy))) decoCanPlace = false;
                        }
                    }
                    // サポート判定（アンカー周囲にブロック・壁・装飾があるか）
                    if (decoCanPlace) {
                        const hasBkS = !!(bkGetAt(gridX, gridY - BLOCK_SIZE) || bkGetAt(gridX, gridY + def.h * BLOCK_SIZE) ||
                                         bkGetAt(gridX - BLOCK_SIZE, gridY) || bkGetAt(gridX + def.w * BLOCK_SIZE, gridY));
                        const hasWlS = !!(wallGetAt(gridX, gridY - BLOCK_SIZE) || wallGetAt(gridX, gridY + def.h * BLOCK_SIZE) ||
                                         wallGetAt(gridX - BLOCK_SIZE, gridY) || wallGetAt(gridX + def.w * BLOCK_SIZE, gridY));
                        const hasDcS = !!(decoGetAt(gridX, gridY - BLOCK_SIZE) || decoGetAt(gridX, gridY + def.h * BLOCK_SIZE) ||
                                         decoGetAt(gridX - BLOCK_SIZE, gridY) || decoGetAt(gridX + def.w * BLOCK_SIZE, gridY));
                        if (!hasBkS && !hasWlS && !hasDcS) decoCanPlace = false;
                    }

                    if (!decoCanPlace) ghostSelector.setTint(0xff4444);
                    else ghostSelector.clearTint();

                    let wantsToPlace = false;
                    if (isPlacementMode && validPointer.isDown) wantsToPlace = true;
                    else if (validPointer.rightButtonDown()) wantsToPlace = true;

                    if (wantsToPlace && decoCanPlace) {
                        if (scene.time.now - lastActionTime > 200) {
                            lastActionTime = scene.time.now;
                            createDeco(scene, activeItem.type, gridX, gridY);
                            ghostSelector.setVisible(false);
                            activeItem.count--;
                            if (activeItem.count <= 0) { activeItem.type = null; activeItem.texture = null; }
                            updateInventoryUI();
                            playSE('place_wood');
                        }
                    }
                    return;
                }

                // ===== 壁紙アイテムの設置処理 =====
                if (activeItem.type !== null && WALL_ITEMS.has(activeItem.type)) {
                    // ゴーストプレビュー (壁なので少し暗め)
                    ghostSelector.setPosition(gridX, gridY);
                    ghostSelector.setTexture(activeItem.texture);
                    ghostSelector.clearTint();
                    ghostSelector.setAlpha(0.55);
                    ghostSelector.setVisible(true);

                    // 既に壁がある場所には設置不可
                    const existingWall = wallGetAt(gridX, gridY);
                    let wallCanPlace = !existingWall;

                    // 隣接ブロックまたは隣接壁が必要（サポート判定）
                    if (wallCanPlace) {
                        const hasBkSupport = !!(bkGetAt(gridX, gridY + BLOCK_SIZE) || bkGetAt(gridX, gridY - BLOCK_SIZE) ||
                                               bkGetAt(gridX - BLOCK_SIZE, gridY) || bkGetAt(gridX + BLOCK_SIZE, gridY));
                        const hasWlSupport = !!(wallGetAt(gridX, gridY + BLOCK_SIZE) || wallGetAt(gridX, gridY - BLOCK_SIZE) ||
                                               wallGetAt(gridX - BLOCK_SIZE, gridY) || wallGetAt(gridX + BLOCK_SIZE, gridY));
                        if (!hasBkSupport && !hasWlSupport) wallCanPlace = false;
                    }

                    if (!wallCanPlace) ghostSelector.setTint(0xff4444);
                    else ghostSelector.clearTint();

                    let wantsToPlace = false;
                    if (isPlacementMode && validPointer.isDown) wantsToPlace = true;
                    else if (validPointer.rightButtonDown()) wantsToPlace = true;

                    if (wantsToPlace && wallCanPlace) {
                        if (scene.time.now - lastActionTime > 150) {
                            lastActionTime = scene.time.now;
                            const wData = WALL_DATA[activeItem.type];
                            // 壁スプライト: 物理なし、深度 -2 (背景より手前・ブロックより奥)
                            const wallSpr = scene.add.image(gridX, gridY, wData.texture);
                            wallSpr.setDepth(-2).setAlpha(0.88);
                            wallMap.set(wallKey(gridX, gridY), { type: activeItem.type, sprite: wallSpr });
                            ghostSelector.setVisible(false);
                            activeItem.count--;
                            if (activeItem.count <= 0) { activeItem.type = null; activeItem.texture = null; }
                            updateInventoryUI();
                            playSE('place');
                        }
                    }
                    return; // 壁紙処理完了 → 通常ブロック処理をスキップ
                }

                // ベッド（2ブロック幅）のプレビュー
                if (activeItem.type === BLOCK_TYPES.STRAW_BED_L) {
                    const bedR = BLOCK_DATA[BLOCK_TYPES.STRAW_BED_R];
                    ghostSelector.setPosition(gridX, gridY)
                        .setTexture(activeItem.texture).setFrame(activeItem.frame)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                    ghostSelector2.setPosition(gridX + BLOCK_SIZE, gridY)
                        .setTexture(bedR.texture).setFrame(bedR.frame)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                }
                // テーブル（2ブロック幅）のプレビュー
                else if (activeItem.type === BLOCK_TYPES.TABLE_L) {
                    const tblR = BLOCK_DATA[BLOCK_TYPES.TABLE_R];
                    ghostSelector.setPosition(gridX, gridY)
                        .setTexture(activeItem.texture).setFrame(activeItem.frame)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                    ghostSelector2.setPosition(gridX + BLOCK_SIZE, gridY)
                        .setTexture(tblR.texture).setFrame(tblR.frame)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                }
                // ドア（3ブロック高）のプレビュー
                else if (activeItem.type === BLOCK_TYPES.DOOR_B) {
                    const doorMData = BLOCK_DATA[BLOCK_TYPES.DOOR_M];
                    const doorTData = BLOCK_DATA[BLOCK_TYPES.DOOR_T];
                    ghostSelector.setPosition(gridX, gridY)
                        .setTexture(activeItem.texture)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                    ghostSelector2.setPosition(gridX, gridY - BLOCK_SIZE)
                        .setTexture(doorMData.texture)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                    ghostSelector3.setPosition(gridX, gridY - 2 * BLOCK_SIZE)
                        .setTexture(doorTData.texture)
                        .setDisplaySize(BLOCK_SIZE, BLOCK_SIZE).setAlpha(0.6).setVisible(true);
                }
                // 通常ブロック
                else {
                    ghostSelector.setPosition(gridX, gridY);
                    ghostSelector.setTexture(activeItem.texture);
                    if (activeItem.frame !== undefined) ghostSelector.setFrame(activeItem.frame);
                    // 階段は設置者の向きに応じてプレビューを反転（右向き→/ 左向き→\）
                    ghostSelector.setFlipX(activeItem.type === BLOCK_TYPES.STAIR ? !player.flipX : false);
                    ghostSelector.setAlpha(0.6);
                    ghostSelector.setVisible(true);
                }

                let canPlace = true;
                const isTorch = activeItem.type === BLOCK_TYPES.TORCH;
                const isHangingLamp = activeItem.type === BLOCK_TYPES.HANGING_LAMP;
                const isLightItem = isTorch || isHangingLamp;

                // 支えブロック判定: blockMapを使ったO(1)グリッド検索（上下左右いずれかに既存ブロックがあるか）
                let hasSupport = !!(
                    bkGetAt(gridX, gridY + BLOCK_SIZE) ||  // 下
                    bkGetAt(gridX, gridY - BLOCK_SIZE) ||  // 上
                    bkGetAt(gridX - BLOCK_SIZE, gridY) ||  // 左
                    bkGetAt(gridX + BLOCK_SIZE, gridY)     // 右
                );
                // 階段は斜め隣のブロックも支えとして認識（斜め階段を連続設置可能にする）
                if (!hasSupport && activeItem.type === BLOCK_TYPES.STAIR) {
                    hasSupport = !!(
                        bkGetAt(gridX - BLOCK_SIZE, gridY - BLOCK_SIZE) ||  // 左上
                        bkGetAt(gridX + BLOCK_SIZE, gridY - BLOCK_SIZE) ||  // 右上
                        bkGetAt(gridX - BLOCK_SIZE, gridY + BLOCK_SIZE) ||  // 左下
                        bkGetAt(gridX + BLOCK_SIZE, gridY + BLOCK_SIZE)     // 右下
                    );
                }
                if (!hasSupport) canPlace = false;

                if (!isLightItem) {
                    // 通常の物理ブロックは同じグリッドに既存ブロックがあれば設置不可
                    if (canPlace && bkGetAt(gridX, gridY)) canPlace = false;
                    if (canPlace) {
                        const ghostBounds = new Phaser.Geom.Rectangle(gridX - BLOCK_SIZE/2, gridY - BLOCK_SIZE/2, BLOCK_SIZE, BLOCK_SIZE);
                        // getBounds()はスプライト全体(64×96px)を返すため物理ボディ実寸で判定する
                        const playerBounds = new Phaser.Geom.Rectangle(
                            player.body.x, player.body.y,
                            player.body.width, player.body.height
                        );
                        if (Phaser.Geom.Intersects.RectangleToRectangle(ghostBounds, playerBounds)) {
                            canPlace = false;
                        }
                    }
                } else {
                    // 松明・ランタンは既存の光源位置には重複して置けない
                    const existingTorch = torches.find(t => Math.abs(t.x - gridX) < BLOCK_SIZE / 2 && Math.abs(t.y - gridY) < BLOCK_SIZE / 2);
                    if (existingTorch) canPlace = false;
                    // 吊り下げランタンは真上に天井ブロックが必要
                    if (isHangingLamp && !bkGetAt(gridX, gridY - BLOCK_SIZE)) canPlace = false;
                }

                // ドアは上2ブロックも空いている必要がある
                if (canPlace && activeItem.type === BLOCK_TYPES.DOOR_B) {
                    const midY = gridY - BLOCK_SIZE;
                    const topY = gridY - 2 * BLOCK_SIZE;
                    if (bkGetAt(gridX, midY) || bkGetAt(gridX, topY)) canPlace = false;
                    if (canPlace) {
                        const pBounds = new Phaser.Geom.Rectangle(player.body.x, player.body.y, player.body.width, player.body.height);
                        for (const gy of [gridY, midY, topY]) {
                            const db = new Phaser.Geom.Rectangle(gridX - BLOCK_SIZE/2, gy - BLOCK_SIZE/2, BLOCK_SIZE, BLOCK_SIZE);
                            if (Phaser.Geom.Intersects.RectangleToRectangle(db, pBounds)) { canPlace = false; break; }
                        }
                    }
                }

                // ベッドは右隣も空いている必要がある
                if (canPlace && activeItem.type === BLOCK_TYPES.STRAW_BED_L) {
                    const rightX = gridX + BLOCK_SIZE;
                    if (bkGetAt(rightX, gridY)) canPlace = false;
                    if (canPlace) {
                        const rightBounds = new Phaser.Geom.Rectangle(rightX - BLOCK_SIZE/2, gridY - BLOCK_SIZE/2, BLOCK_SIZE, BLOCK_SIZE);
                        const pBounds = new Phaser.Geom.Rectangle(
                            player.body.x, player.body.y,
                            player.body.width, player.body.height
                        );
                        if (Phaser.Geom.Intersects.RectangleToRectangle(rightBounds, pBounds)) canPlace = false;
                    }
                }

                if (!canPlace) {
                    ghostSelector.setTint(0xff0000);
                    ghostSelector2.setTint(0xff0000);
                    ghostSelector3.setTint(0xff0000);
                } else {
                    ghostSelector.clearTint();
                    ghostSelector2.clearTint();
                    ghostSelector3.clearTint();
                }

                let wantsToPlace = false;
                if (isPlacementMode && validPointer.isDown) wantsToPlace = true;
                else if (validPointer.rightButtonDown()) wantsToPlace = true;

                if (wantsToPlace && canPlace) {
                    if (scene.time.now - lastActionTime > 200) {
                        lastActionTime = scene.time.now;

                        // 看板の場合: OPEN/CLOSE選択パネルを表示
                        if (activeItem.type === BLOCK_TYPES.SIGN_OPEN || activeItem.type === BLOCK_TYPES.SIGN_CLOSE) {
                            const _gx = gridX, _gy = gridY;
                            showSignPlaceChooser(scene, (chosenType) => {
                                const bd = BLOCK_DATA[chosenType];
                                const nb = platforms.create(_gx, _gy, bd.texture, bd.frame);
                                nb.refreshBody();
                                nb.setData('typeId', chosenType);
                                nb.setData('hp', bd.hp);
                                playSE('place_wood');
                                activeItem.count--;
                                if (activeItem.count <= 0) { activeItem.type = null; activeItem.texture = null; }
                                updateInventoryUI();
                            });
                            return;
                        }

                        const bData = BLOCK_DATA[activeItem.type];
                        if (isLightItem) {
                            // 松明・ランタンの配置（画像としてのみ追加）
                            const lightImg = activeItem.frame !== undefined
                                ? scene.add.image(gridX, gridY, activeItem.texture, activeItem.frame)
                                : scene.add.image(gridX, gridY, activeItem.texture);
                            lightImg.setDepth(20); // キャラクターより奥、背景の手前
                            torches.push({ x: gridX, y: gridY, img: lightImg, type: activeItem.type });
                            playSE('place_torch');
                        } else {
                            // 物理ブロックの配置
                            const newBlock = platforms.create(gridX, gridY, activeItem.texture, activeItem.frame);
                            newBlock.refreshBody();
                            newBlock.setData('typeId', activeItem.type);
                            newBlock.setData('hp', bData.hp);
                            // 蔦の場合はvineBlocksに登録
                            if (activeItem.type === BLOCK_TYPES.VINE) {
                                newBlock.setAlpha(0.85);
                                vineBlocks.push(newBlock);
                            }
                            // 梯子の場合もvineBlocksに登録（同じ登り降りロジックを使用）
                            if (activeItem.type === BLOCK_TYPES.LADDER) {
                                newBlock.setAlpha(0.9);
                                vineBlocks.push(newBlock);
                            }
                            // ドアを置いたら中段・上段も自動設置
                            if (activeItem.type === BLOCK_TYPES.DOOR_B) {
                                const midData = BLOCK_DATA[BLOCK_TYPES.DOOR_M];
                                const topData = BLOCK_DATA[BLOCK_TYPES.DOOR_T];
                                const midBlock = platforms.create(gridX, gridY - BLOCK_SIZE, midData.texture, midData.frame);
                                midBlock.refreshBody();
                                midBlock.setData('typeId', BLOCK_TYPES.DOOR_M);
                                midBlock.setData('hp', midData.hp);
                                midBlock.setData('doorOpen', false);
                                const topBlock = platforms.create(gridX, gridY - 2 * BLOCK_SIZE, topData.texture, topData.frame);
                                topBlock.refreshBody();
                                topBlock.setData('typeId', BLOCK_TYPES.DOOR_T);
                                topBlock.setData('hp', topData.hp);
                                topBlock.setData('doorOpen', false);
                                newBlock.setData('doorOpen', false);
                                const doorParts = [newBlock, midBlock, topBlock];
                                newBlock.setData('doorParts', doorParts);
                                midBlock.setData('doorParts', doorParts);
                                topBlock.setData('doorParts', doorParts);
                            }

                            // 階段を置いたら物理を無効化し、向きを記録してstairBlocksに追加
                            if (activeItem.type === BLOCK_TYPES.STAIR) {
                                // 右向き(flipX=true)→"/" 左向き(flipX=false)→"\"
                                const stairFlipped = player.flipX;
                                newBlock.setFlipX(!stairFlipped);
                                newBlock.refreshBody();
                                newBlock.body.enable = false;
                                newBlock.setData('stairFlipped', stairFlipped);
                                stairBlocks.push({ block: newBlock, flipped: stairFlipped });
                                stairPosSet.add(bkKey(newBlock.x, newBlock.y));
                            }
                            // スロープを置いたら物理を無効化し、slopeBlocksに追加
                            if (activeItem.type === BLOCK_TYPES.SLOPE_R || activeItem.type === BLOCK_TYPES.SLOPE_L) {
                                newBlock.refreshBody();
                                newBlock.body.enable = false;
                                slopeBlocks.push(newBlock);
                            }
                            // ハーフブロックを置いたら物理を無効化し、halfBlocksに追加
                            if (activeItem.type === BLOCK_TYPES.HALF_BLOCK) {
                                newBlock.refreshBody();
                                newBlock.body.enable = false;
                                halfBlocks.push(newBlock);
                                halfBlockPosSet.add(bkKey(newBlock.x, newBlock.y));
                            }

                            // ベッド左半分を置いたら右半分も自動設置
                            if (activeItem.type === BLOCK_TYPES.STRAW_BED_L) {
                                const bedR = BLOCK_DATA[BLOCK_TYPES.STRAW_BED_R];
                                const rightBlock = platforms.create(gridX + BLOCK_SIZE, gridY, bedR.texture, bedR.frame);
                                rightBlock.refreshBody();
                                rightBlock.setData('typeId', BLOCK_TYPES.STRAW_BED_R);
                                rightBlock.setData('hp', bedR.hp);
                                // 左右ペアを相互参照
                                newBlock.setData('bedPair', rightBlock);
                                rightBlock.setData('bedPair', newBlock);
                                // 初めてのベッド→自動的に自宅設定
                                if (!homePosition) {
                                    homePosition = { x: gridX, y: gridY - 16 };
                                    const homeText = scene.add.text(gridX + 8, gridY - 20, '自宅に設定!', {
                                        fontSize: '13px', color: '#66ff66', stroke: '#000', strokeThickness: 3
                                    }).setOrigin(0.5).setDepth(200);
                                    scene.tweens.add({ targets: homeText, y: homeText.y - 40, alpha: 0, duration: 1500, onComplete: () => homeText.destroy() });
                                    // レンジを自宅に移動させる
                                    if (renji) {
                                        renjiTargetX = homePosition.x + 48;
                                        renjiTargetY = homePosition.y - 20;
                                    }
                                }
                            }
                            // テーブル左半分を置いたら右半分も自動設置
                            if (activeItem.type === BLOCK_TYPES.TABLE_L) {
                                const tblR = BLOCK_DATA[BLOCK_TYPES.TABLE_R];
                                const rightBlock = platforms.create(gridX + BLOCK_SIZE, gridY, tblR.texture, tblR.frame);
                                rightBlock.refreshBody();
                                rightBlock.setData('typeId', BLOCK_TYPES.TABLE_R);
                                rightBlock.setData('hp', tblR.hp);
                                // 左右ペアを相互参照
                                newBlock.setData('tablePair', rightBlock);
                                rightBlock.setData('tablePair', newBlock);
                            }
                            // ブロック種類別の設置SE
                            const t = activeItem.type;
                            if (t === BLOCK_TYPES.WOOD || t === BLOCK_TYPES.WORKBENCH) playSE('place_wood');
                            else if (t === BLOCK_TYPES.TABLE || t === BLOCK_TYPES.STORAGE_CHEST || t === BLOCK_TYPES.TABLE_L || t === BLOCK_TYPES.CHAIR) playSE('place_table');
                            else if (t === BLOCK_TYPES.STRAW_BED_L) playSE('place_wood');
                            else if (t === BLOCK_TYPES.DOOR_B) playSE('place_wood');
                            else if (t === BLOCK_TYPES.STAIR) playSE('place_wood');
                            else if (t === BLOCK_TYPES.STONE || t === BLOCK_TYPES.STONE_BRICK || t === BLOCK_TYPES.FURNACE) playSE('place_stone');
                            else playSE('place');
                        }
                        
                        ghostSelector.setVisible(false);
                        ghostSelector2.setVisible(false);
                        ghostSelector3.setVisible(false);

                        activeItem.count--;
                        if (activeItem.count <= 0) {
                            activeItem.type = null;
                            activeItem.texture = null;
                        }
                        updateInventoryUI();
                    }
                }
            }
        }
    </script>
</body>
</html>
