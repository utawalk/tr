<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2D Sandbox Prototype</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 空をイメージした背景色 */
            background-color: #87CEEB;
            /* スマホでスワイプしたときにデフォルトのブラウザの動作（リロードや戻るなど）を防ぐ */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
        }

        /* ===== ローディング画面 ===== */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #0d0d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: 'Courier New', monospace;
            transition: opacity 0.6s ease;
        }
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .ld-title {
            color: #ffd700;
            font-size: clamp(20px, 5vw, 36px);
            font-weight: bold;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #8B4513;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .ld-subtitle {
            color: #e8e8e8;
            font-size: clamp(10px, 2.5vw, 14px);
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        /* ピクセル風スピナー: 8つのドットが順に点灯 */
        .ld-spinner {
            width: 56px;
            height: 56px;
            position: relative;
            margin-bottom: 28px;
        }
        .ld-spinner span {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            background: #ffd700;
            animation: ldDot 1.0s linear infinite;
            opacity: 0.15;
        }
        .ld-spinner span:nth-child(1)  { top:  0;   left: 23px; animation-delay: 0.00s; }
        .ld-spinner span:nth-child(2)  { top:  8px; left: 40px; animation-delay: 0.125s; }
        .ld-spinner span:nth-child(3)  { top: 23px; left: 46px; animation-delay: 0.25s; }
        .ld-spinner span:nth-child(4)  { top: 38px; left: 40px; animation-delay: 0.375s; }
        .ld-spinner span:nth-child(5)  { top: 46px; left: 23px; animation-delay: 0.5s; }
        .ld-spinner span:nth-child(6)  { top: 38px; left:  6px; animation-delay: 0.625s; }
        .ld-spinner span:nth-child(7)  { top: 23px; left:  0;   animation-delay: 0.75s; }
        .ld-spinner span:nth-child(8)  { top:  8px; left:  6px; animation-delay: 0.875s; }
        @keyframes ldDot {
            0%, 100% { opacity: 0.15; transform: scale(0.8); }
            12.5%    { opacity: 1.0;  transform: scale(1.2); }
            25%      { opacity: 0.4;  transform: scale(1.0); }
        }
        .ld-bar-wrap {
            width: min(300px, 70vw);
            height: 16px;
            background: #222;
            border: 2px solid #555;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .ld-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c47f00, #ffd700, #fffacc);
            transition: width 0.25s ease;
            border-radius: 1px;
        }
        .ld-status {
            color: #d4d4d4;
            font-size: clamp(11px, 2.5vw, 14px);
            letter-spacing: 2px;
            min-height: 20px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
        }
        /* ピクセル装飾ブロック */
        .ld-blocks {
            display: flex;
            gap: 6px;
            margin-top: 32px;
        }
        .ld-block {
            width: 18px;
            height: 18px;
            border-radius: 2px;
            border-bottom: 3px solid rgba(0,0,0,0.4);
            animation: ldBlockFloat 1.4s ease-in-out infinite;
        }
        @keyframes ldBlockFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-screen">
        <div class="ld-title">⛏ 2D SANDBOX</div>
        <div class="ld-subtitle">LOADING WORLD...</div>
        <div class="ld-spinner">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>
        <div class="ld-bar-wrap">
            <div class="ld-bar-fill" id="ld-bar"></div>
        </div>
        <div class="ld-status" id="ld-status">読み込み中...</div>
        <div class="ld-blocks">
            <div class="ld-block" style="background:#5d8a3c; animation-delay:0s;    animation-duration:1.4s"></div>
            <div class="ld-block" style="background:#8b6914; animation-delay:0.18s; animation-duration:1.4s"></div>
            <div class="ld-block" style="background:#6b6b6b; animation-delay:0.36s; animation-duration:1.4s"></div>
            <div class="ld-block" style="background:#d4a017; animation-delay:0.54s; animation-duration:1.4s"></div>
            <div class="ld-block" style="background:#4e88c7; animation-delay:0.72s; animation-duration:1.4s"></div>
        </div>
    </div>
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
        // ブラウザのCtrl+ホイールズームを無効化（ゲーム内ズームに使う）
        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.metaKey) e.preventDefault();
        }, { passive: false });

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 800 },
                    debug: false
                }
            },
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            pixelArt: true, // ドット絵ゲームにおいてテクスチャのぼやけやタイルの隙間(シーム)を防ぐ
            roundPixels: true, // 座標を自動的に整数化し、サブピクセルによる線の表示を防ぐ
            input: {
                // マルチタッチ（移動しながらジャンプなど）を有効化
                activePointers: 3
            },
            disableContextMenu: true, // 右クリックメニューを無効化
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        // =============================================
        // === 効果音システム (Web Audio API Oscillator) ===
        // =============================================
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // iOS/Android対応: 初回操作でAudioContextを有効化
        document.addEventListener('pointerdown', initAudio, { once: false });
        document.addEventListener('keydown', initAudio, { once: false });

        // 音の定義: 各SEのパラメータ
        const SE_DEFS = {
            jump:       { type: 'square',   freq: 300, endFreq: 500, duration: 0.1,  vol: 0.12 },
            land:       { type: 'triangle', freq: 150, endFreq: 80,  duration: 0.08, vol: 0.10 },
            mine_dirt:  { type: 'sawtooth', freq: 120, endFreq: 80,  duration: 0.06, vol: 0.08 },
            mine_stone: { type: 'square',   freq: 400, endFreq: 200, duration: 0.08, vol: 0.10 },
            mine_gold:  { type: 'sine',     freq: 600, endFreq: 900, duration: 0.15, vol: 0.12 },
            mine_iron:  { type: 'square',   freq: 500, endFreq: 300, duration: 0.10, vol: 0.11 },
            mine_wood:  { type: 'triangle', freq: 250, endFreq: 150, duration: 0.08, vol: 0.10 },
            mine_leaf:  { type: 'sine',     freq: 350, endFreq: 200, duration: 0.05, vol: 0.06 },
            pickup_apple: { type: 'sine',   freq: 500, endFreq: 800, duration: 0.12, vol: 0.12 },
            feed_rabbit:  { type: 'sine',   freq: 400, endFreq: 700, duration: 0.2,  vol: 0.10 },
            rabbit_tamed: { type: 'sine',   freq: 500, endFreq: 1000, duration: 0.4, vol: 0.15 },
            dog_bark:     { type: 'square', freq: 300, endFreq: 450, duration: 0.12, vol: 0.10 },
            dog_tamed:    { type: 'sine',   freq: 450, endFreq: 900, duration: 0.5,  vol: 0.15 },
            furnace_done: { type: 'sine',   freq: 600, endFreq: 900, duration: 0.3,  vol: 0.12 },
            chest_open: { type: 'sine',     freq: 400, endFreq: 800, duration: 0.3,  vol: 0.15 },
            place:      { type: 'triangle', freq: 200, endFreq: 350, duration: 0.10, vol: 0.13 },
            place_wood: { type: 'triangle', freq: 180, endFreq: 280, duration: 0.10, vol: 0.13 },
            place_stone:{ type: 'square',   freq: 250, endFreq: 350, duration: 0.08, vol: 0.12 },
            place_table:{ type: 'triangle', freq: 220, endFreq: 380, duration: 0.12, vol: 0.13 },
            place_torch:{ type: 'sine',     freq: 300, endFreq: 500, duration: 0.10, vol: 0.10 },
            pickup:     { type: 'sine',     freq: 400, endFreq: 600, duration: 0.08, vol: 0.10 },
            destroy:    { type: 'sawtooth', freq: 200, endFreq: 60,  duration: 0.12, vol: 0.10 },
            ui_click:   { type: 'sine',     freq: 500, endFreq: 600, duration: 0.05, vol: 0.08 },
            ui_error:   { type: 'square',   freq: 200, endFreq: 100, duration: 0.2,  vol: 0.12 },
            ui_success: { type: 'sine',     freq: 500, endFreq: 700, duration: 0.15, vol: 0.10 },
            player_hurt:{ type: 'square',   freq: 250, endFreq: 80,  duration: 0.25, vol: 0.15 },
            eat:        { type: 'sine',     freq: 200, endFreq: 400, duration: 0.15, vol: 0.12 },
            slime_hit:  { type: 'sawtooth', freq: 180, endFreq: 60,  duration: 0.15, vol: 0.12 },
            slime_die:  { type: 'sine',     freq: 300, endFreq: 80,  duration: 0.3,  vol: 0.14 }
        };

        function playSE(soundName) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const def = SE_DEFS[soundName];
            if (!def) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = def.type;
            osc.frequency.setValueAtTime(def.freq, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(def.endFreq, audioCtx.currentTime + def.duration);
            gain.gain.setValueAtTime(def.vol, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + def.duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + def.duration + 0.01);
        }

        let player;
        let platforms;
        let cursors;
        let wasdKeys;
        let bgSkyDay, bgSkyEvening, bgSkyNight; // 空レイヤー（パララックス・昼夕夜）
        let bgMtnDay, bgMtnEvening, bgMtnNight; // 山レイヤー（パララックス・昼夕夜）
        let bgUnderground = null;               // 地中背景レイヤー
        const WORLD_GROUND_Y = 768;             // 地面の境界Y座標（地上↔地中の切り替え基準）
        let wasOnGround = false; // 着地SE用: 前フレームの接地状態
        let fallStartY = 0;    // 落下開始Y座標（落下ダメージ計算用）
        let isFalling = false; // 落下中フラグ

        // 体力システム
        const HP_PER_HEART = 4;          // ハート1個あたりのHP
        let playerMaxHearts = 1;          // 最大ハート数（初期1個、今後増加可能）
        let playerHP = HP_PER_HEART * 1;  // 現在HP
        let heartSprites = [];            // ハートUI用スプライト配列
        let hpDamageOverlay = null;       // ダメージ時の画面フラッシュ

        // 照明システム用 (単一Graphicsオブジェクト方式 — 継ぎ目なし)
        let lightGraphics = null;
        const LIGHT_TILE_SIZE = 16;
        const GRID_COLS = Math.ceil(2500 / LIGHT_TILE_SIZE);
        const GRID_ROWS = Math.ceil(1500 / LIGHT_TILE_SIZE);
        let torches = []; // 設置済み松明リスト
        let vineBlocks = []; // 蔦ブロックリスト（高速衝突判定用）
        let stairBlocks = []; // 階段ブロックリスト（スロープ補正用、物理なし）
        let slopeBlocks = []; // スロープブロックリスト（SLOPE_R / SLOPE_L、物理なし）
        let halfBlocks  = []; // ハーフブロックリスト（物理なし・手動スナップ）
        let stairPosSet   = new Set(); // 階段ブロック位置のセット（O(1)近接検索用）
        let halfBlockPosSet = new Set(); // ハーフブロック位置のセット（O(1)近接検索用）
        let wasOnSlope = false; // 前フレームでスロープ上にいたか（衝突パススルー用）
        let lightStableY = 0;  // スナップ後のプレイヤーY座標キャッシュ（ライト計算用）
                               // ライト計算はスナップより前に実行されるため前フレームの値を使う
        let saplings = []; // 苗木リスト { sprite, plantedAt, growStage }
        let wheatCrops = []; // 小麦リスト { sprite, elapsed }
        let tableItems = []; // テーブル上アイテム { tableBlock, itemSprite, itemType, itemCount }
        let homePosition = null; // 自宅リスポーン地点 { x, y }
        let bedConfirmPanel = null; // ベッド確認ダイアログ
        let playerMoney = 0; // 所持金
        let moneyText = null; // 所持金表示用テキスト
        let coordText = null; // 座標表示用テキスト
        let zoomText  = null; // ズーム率表示テキスト
        let minimapCanvas = null;   // ミニマップ用HTMLキャンバス
        let minimapTexture = null;  // ミニマップPhaserテクスチャ
        let minimapImage = null;    // ミニマップ表示用Phaserイメージ
        let minimapPlayerDot = null; // ミニマップ上のプレイヤー位置マーカー
        let minimapViewRect = null;  // ミニマップ上のカメラ範囲表示
        let minimapBorder = null;   // ミニマップ枠線
        let lastMinimapUpdate = 0;  // 最後にミニマップを更新した時刻
        let signPlacePanel = null; // 看板設置選択パネル
        let signConfirmPanel = null; // 看板切替確認パネル

        // スマホ用ボタンと状態
        let leftButton, rightButton, jumpButton;
        let isLeftPressed = false;
        let isRightPressed = false;
        let isJumpPressed = false;

        let selector; // 採掘ハイライト用
        let ghostSelector;  // 設置ゴースト用
        let ghostSelector2; // 複数ブロック設置プレビュー用（2つ目）
        let ghostSelector3; // 複数ブロック設置プレビュー用（3つ目）
        let heldItemSprite = null; // プレイヤーの手元アイテム表示
        let playerBodySprite = null;   // プレイヤーレイヤー: 素体
        let playerHairSprite = null;   // プレイヤーレイヤー: 髪
        let playerOutfitSprite = null; // プレイヤーレイヤー: 服
        let currentOutfitKey = 'player_outfit'; // 現在装備中の服テクスチャキー
        let isMining = false;      // 採掘中フラグ
        let miningAnimTime = 0;    // 採掘アニメーション用タイマー
        let longPressTarget = null;         // 長押し対象ブロック
        let longPressPointerDownTime = 0;  // ポインターONになった実際の時刻（クールダウン外で記録）
        let longPressGfx = null;           // 長押しプログレスバー（Graphics）
        let longPressLastHitSnd = 0;       // 長押し中の打撃音を鳴らした最後の時刻

        // ── 長押し破壊サウンド ──────────────────────────────────────────
        // 長押し打撃音: 木を叩くような低い「コン」という音
        function playHitSound() {
            initAudio();
            const ctx = audioCtx; if (!ctx || ctx.state !== 'running') return;
            const now = ctx.currentTime;
            // ノイズ バースト（木質感）
            const bufLen = ctx.sampleRate * 0.06;
            const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 3);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            // 低域バンドパスでウッディな音に
            const bpf = ctx.createBiquadFilter();
            bpf.type = 'bandpass'; bpf.frequency.value = 280; bpf.Q.value = 0.8;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.55, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            src.connect(bpf); bpf.connect(gain); gain.connect(ctx.destination);
            src.start(now); src.stop(now + 0.06);
        }
        // 破壊完了音: 木材が割れる「バキッ」という音
        function playBreakSound() {
            initAudio();
            const ctx = audioCtx; if (!ctx || ctx.state !== 'running') return;
            const now = ctx.currentTime;
            const dur = 0.25;
            const bufLen = ctx.sampleRate * dur;
            const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) {
                const env = Math.pow(1 - i / bufLen, 1.8);
                data[i] = (Math.random() * 2 - 1) * env;
            }
            const src = ctx.createBufferSource();
            src.buffer = buf;
            // より広い帯域で「バキ」感
            const hpf = ctx.createBiquadFilter();
            hpf.type = 'highpass'; hpf.frequency.value = 120;
            const lpf = ctx.createBiquadFilter();
            lpf.type = 'lowpass'; lpf.frequency.value = 1800;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(1.0, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
            src.connect(hpf); hpf.connect(lpf); lpf.connect(gain); gain.connect(ctx.destination);
            src.start(now); src.stop(now + dur);
        }
        // ────────────────────────────────────────────────────────────────
        let rabbits = []; // うさぎリスト
        const RABBIT_TAME_THRESHOLD = 3; // 友好度がこの値でペット化

        // うさぎの5色バリエーション（白ベーススプライトにtintを乗せる）
        const RABBIT_COLORS = [
            0xffffff, // ① 白（デフォルト）
            0xbbbbbb, // ② グレー
            0xcc8855, // ③ 茶色
            0x444444, // ④ 黒
            0xffd966, // ⑤ クリーム/イエロー
        ];
        const RABBIT_COLOR_NAMES = ['白', 'グレー', '茶', '黒', 'クリーム'];

        // 犬の5色バリエーション（茶色ベーススプライトにtintを乗せる）
        const DOG_COLORS = [
            0xffffff, // ① ナチュラル（元の茶色）
            0xffee88, // ② ゴールデン
            0xaaaaaa, // ③ グレー
            0x333333, // ④ ダーク/黒
            0xffd0b0, // ⑤ クリーム
        ];
        const DOG_COLOR_NAMES = ['茶', 'ゴールデン', 'グレー', '黒', 'クリーム'];
        let dogs = []; // 犬リスト
        let birds = []; // 鳥リスト
        let merchants = []; // 商人NPCリスト
        let shopPanel = null; // 商人ショップUI
        let isShopOpen = false;
        let customers = []; // 客NPCリスト
        let slimes = [];    // スライムリスト
        let renji = null;   // レンジNPC
        let renjiDialog = null; // レンジ会話パネル
        let renjiTargetX = null; // レンジの移動目標X
        let renjiTargetY = null; // レンジの移動目標Y
        let customerSpawnTimer = 0; // 客スポーンタイマー
        let prevTimeOfDay = 0; // 前フレームの時刻（朝判定用）
        let currentZoom = 1.0; // カメラズーム倍率
        const ZOOM_MIN = 0.5;
        const ZOOM_MAX = 1.5;
        const ZOOM_STEP = 0.1;
        // ズーム関連変数
        let customerBuyPanel = null; // 客購入確認パネル
        let rabbitShopPanel = null;  // うさぎ店番メニューパネル
        let modeButton; // スマホ用モード切替ボタン
        let isPlacementMode = false; // モード管理フラグ
        const BLOCK_SIZE = 16;
        const SAVE_KEY = 'tr_save_v2'; // v2: ブロックサイズ16px対応

        // ===== ブロック高速検索マップ (O(1)位置引き) =====
        // key: "gx|gy" (グリッド座標), value: Phaser.GameObjects.Sprite
        let blockMap = new Map();
        function bkKey(wx, wy) {
            return (Math.round(wx / BLOCK_SIZE)) + '|' + (Math.round(wy / BLOCK_SIZE));
        }
        function bkRegister(spr) {
            if (spr && spr.active) blockMap.set(bkKey(spr.x, spr.y), spr);
        }
        function bkUnregister(spr) {
            if (!spr) return;
            const k = bkKey(spr.x, spr.y);
            if (blockMap.get(k) === spr) blockMap.delete(k);
        }
        // ワールド座標からブロックを取得（存在しないor非activeならnull）
        function bkGetAt(wx, wy) {
            const s = blockMap.get(bkKey(wx, wy));
            return (s && s.active) ? s : null;
        }
        // 水ブロック移動時: マップも更新
        function bkMoveBlock(spr, newX, newY) {
            bkUnregister(spr);
            spr.setPosition(newX, newY);
            bkRegister(spr);
        }
        let menuButton, menuButtonText;
        let menuPanel;
        let isMenuOpen = false;
        let encyclopediaOverlay = null;
        let isEncyclopediaOpen = false;
        let creatureBookOverlay = null;
        let isCreatureBookOpen = false;

        const BLOCK_TYPES = {
            EMPTY: 0,
            GRASS: 1,

        // 壁紙マップ (O(1)位置引き)
        let wallMap = new Map(); // key "gx|gy" -> { type, sprite }
        function wallKey(wx, wy) {
            return Math.round(wx / BLOCK_SIZE) + '|' + Math.round(wy / BLOCK_SIZE);
        }

            const w = wallMap.get(wallKey(wx, wy));

        // ===== 装飾システム (窓・ポスター・棚・絵画) =====

            [BLOCK_TYPES.DECO_WINDOW]:  { w:2, h:2, texture:'deco_window',  name:'窓',      depth:-1 },

        // decoMap: アンカー位置 "gx|gy" → { type, sprite, anchorX, anchorY, cells:[{x,y},...] }
        // decoOccupied: 各占有セル "gx|gy" → アンカーキー文字列
        let decoMap      = new Map();
        let decoOccupied = new Map();

        // 任意のセル座標からその場所を占有している装飾を取得
        function decoGetAt(wx, wy) {
            const anchorKey = decoOccupied.get(wallKey(wx, wy));
            if (!anchorKey) return null;
            const d = decoMap.get(anchorKey);
            return (d && d.sprite && d.sprite.active) ? d : null;
        }
        // 装飾を生成して登録するヘルパー
        function createDeco(scene, type, gridX, gridY) {
            const def = DECO_DEFS[type];
            const cells = [];
            for (let dx = 0; dx < def.w; dx++)
                for (let dy = 0; dy < def.h; dy++)
                    cells.push({ x: gridX + dx * BLOCK_SIZE, y: gridY + dy * BLOCK_SIZE });

            // スプライト中心 = アンカー左上から (w-1)/2 * BS 右・(h-1)/2 * BS 下
            const sprX = gridX + (def.w - 1) * BLOCK_SIZE / 2;
            const sprY = gridY + (def.h - 1) * BLOCK_SIZE / 2;
            const spr  = scene.add.image(sprX, sprY, def.texture)
                .setOrigin(0.5, 0.5)
                .setDisplaySize(def.w * BLOCK_SIZE, def.h * BLOCK_SIZE)
                .setDepth(def.depth);

            const entry = { type, sprite: spr, anchorX: gridX, anchorY: gridY, cells };
            const aKey  = wallKey(gridX, gridY);
            decoMap.set(aKey, entry);
            for (const c of cells) decoOccupied.set(wallKey(c.x, c.y), aKey);
            return entry;
        }
        // 装飾を削除して登録解除するヘルパー
        function removeDeco(entry) {
            const aKey = wallKey(entry.anchorX, entry.anchorY);

            for (const c of entry.cells) decoOccupied.delete(wallKey(c.x, c.y));
            decoMap.delete(aKey);

        function isNearStair(bx, by) {
            const BS = BLOCK_SIZE;
            // 自身 + 8方向をチェック（横1・縦1ブロック以内）
            for (let dx = -BS; dx <= BS; dx += BS) {
                for (let dy = -BS; dy <= BS; dy += BS) {
                    if (stairPosSet.has(bkKey(bx + dx, by + dy))) return true;
                }
            }
            // 上方向への追加チェック（このブロックから2〜3ブロック下に階段がある場合）
            // スロープ補正でプレイヤーが持ち上げられる際、
            // 天井ブロックとの「押し下げ ↔ 押し上げ」ループを防ぐ
            for (let dx = -BS; dx <= BS; dx += BS) {
                if (stairPosSet.has(bkKey(bx + dx, by + 2 * BS))) return true;
                if (stairPosSet.has(bkKey(bx + dx, by + 3 * BS))) return true;
            }
            return false;
        }

        // ハーフブロック近接判定: ブロック座標がハーフブロックの近傍にあるか
        // プレイヤー体幅(28px)がハーフブロック幅(16px)を超えるため、隣接ブロックとX方向に重なって
        // 毎フレーム衝突分離が発生し、カメラ揺れ（ガタつき）の原因になる。この判定で衝突をスキップする。
        // ※ dy を 0 以上のみにすることで、ハーフブロックの真下の地面ブロックをスキップしないようにする
        //   （dy=-BS を含めると「ハーフブロックの1ブロック下」の地面が誤ってスキップされ、
        //    降りた瞬間に地面をすり抜けるバグが発生する）
        function isNearHalfBlock(bx, by) {
            const BS = BLOCK_SIZE;
            for (let dx = -BS; dx <= BS; dx += BS) {
                // dy=0: ハーフブロックと同列のブロック（プレイヤー体幅超過による横衝突をスキップ）
                // dy=+BS: ハーフブロックの1ブロック上のブロック（スナップで乗り上げる際の衝突をスキップ）
                for (let dy = 0; dy <= BS; dy += BS) {
                    if (halfBlockPosSet.has(bkKey(bx + dx, by + dy))) return true;
                }
            }
            // 2ブロック上への追加チェック（ハーフブロックのスナップで持ち上げられた際の天井衝突を防ぐ）
            for (let dx = -BS; dx <= BS; dx += BS) {
                if (halfBlockPosSet.has(bkKey(bx + dx, by + 2 * BS))) return true;
            }
            return false;
        }

        // 蔦すり抜け判定（全エンティティ共通 — colliderコールバック）
        function vinePassthrough(entity, block) {
            if (!block || !block.active || !block.data) return true;
            // body.enable=false のブロック（階段・金鉱石など）は衝突処理をスキップ
            // Phaser の staticGroup は body.enable=false でも processCallback が呼ばれる場合があるため明示的に除外
            if (block.body && !block.body.enable) return false;
            // スロープ上のプレイヤーが階段近傍のブロックに衝突するのを防ぐ
            // これにより連続した階段ブロックを登る際、隣接する地形ブロックに押し戻されなくなる
            if (entity === player && wasOnSlope && isNearStair(block.x, block.y)) return false;
            // ハーフブロック上のプレイヤーがハーフブロック近傍のブロックに衝突するのを防ぐ
            // プレイヤー体幅 > ハーフブロック幅 のため毎フレーム衝突分離が発生しガタつきの原因になる
            if (entity === player && wasOnSlope && isNearHalfBlock(block.x, block.y)) return false;
            const tid = block.getData('typeId');
            return tid !== BLOCK_TYPES.VINE && tid !== BLOCK_TYPES.WATER && tid !== BLOCK_TYPES.LADDER;
        }

        // === 水流シミュレーション ===
        let lastWaterFlowTime = 0;
        const WATER_FLOW_INTERVAL = 200; // ms

        function updateWaterFlow(scene, time) {
            if (time - lastWaterFlowTime < WATER_FLOW_INTERVAL) return;
            lastWaterFlowTime = time;

            const bs = 16;

            // ===== blockMap を利用した高速水流シミュレーション =====
            // solidMap の全体構築を廃止し、blockMap で O(1) ルックアップ。
            // 水ブロックのみ列挙するローカル waterMap は維持。

            const waterMap = new Map(); // key "kx,ky" -> sprite
            for (const [mapKey, spr] of blockMap) {
                if (!spr.active) continue;
                if (spr.getData('typeId') === BLOCK_TYPES.WATER) {
                    const kx = Math.round(spr.x / bs);
                    const ky = Math.round(spr.y / bs);
                    waterMap.set(kx + ',' + ky, spr);
                }
            }

            // ブロック位置判定ヘルパー（blockMap利用）
            function isSolid(kx, ky) {
                const s = bkGetAt(kx * bs, ky * bs);
                return s !== null && s.getData('typeId') !== BLOCK_TYPES.WATER;
            }
            function isWater(kx, ky) {
                const wk = kx + ',' + ky;
                return waterMap.has(wk);
            }

            const processed = new Set();

            // 水ブロックを下から上に処理
            const waterList = [...waterMap.entries()].map(([k, blk]) => {
                const [kx, ky] = k.split(',').map(Number);
                return { kx, ky, key: k, blk };
            });
            waterList.sort((a, b) => b.ky - a.ky);

            for (const { kx, ky, key, blk } of waterList) {
                if (processed.has(key)) continue;

                // 1) 真下が空 → 落下（水を移動）
                if (!isSolid(kx, ky + 1) && !isWater(kx, ky + 1) && !processed.has(kx + ',' + (ky + 1))) {
                    const newY = blk.y + bs;
                    if (newY < 3552 - bs) {
                        const belowKey = kx + ',' + (ky + 1);
                        waterMap.delete(key);
                        bkMoveBlock(blk, blk.x, newY); // blockMap も更新
                        waterMap.set(belowKey, blk);
                        processed.add(belowKey);
                        continue;
                    }
                }

                // 2) 真下が固体or水 → 横に広がれるか
                if (isSolid(kx, ky + 1) || isWater(kx, ky + 1)) {
                    const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
                    for (const dx of dirs) {
                        const sideKey = (kx + dx) + ',' + ky;
                        if (isSolid(kx + dx, ky) || isWater(kx + dx, ky) || processed.has(sideKey)) continue;
                        const sideBelowOpen = !isSolid(kx + dx, ky + 1) && !isWater(kx + dx, ky + 1);
                        const hasWaterAbove = isWater(kx, ky - 1);
                        if (sideBelowOpen || hasWaterAbove) {
                            const newX = blk.x + dx * bs;
                            if (newX < bs / 2 || newX > 6000 - bs / 2) continue;
                            waterMap.delete(key);
                            bkMoveBlock(blk, newX, blk.y); // blockMap も更新
                            waterMap.set(sideKey, blk);
                            processed.add(sideKey);
                            break;
                        }
                    }
                }
            }
        }

        function rollChestLoot() {
            const totalWeight = CHEST_LOOT_TABLE.reduce((s, e) => s + e.weight, 0);
            let roll = Math.random() * totalWeight;
            for (const entry of CHEST_LOOT_TABLE) {
                roll -= entry.weight;
                if (roll <= 0) return entry;
            }
            return CHEST_LOOT_TABLE[0];
        }

        const RECIPES = [
            { resultId: BLOCK_TYPES.STONE_PICKAXE, resultCount: 1, materials: [{ id: BLOCK_TYPES.WOOD, count: 1 }, { id: BLOCK_TYPES.STONE, count: 1 }], name: '石ピッケル' },
