        const MAX_CUSTOMERS = 3;

        // === 朝の雑草・花リスポーン ===
        function spawnMorningWeeds(scene) {
            const blockSize = 16;
            const groundY = 768;
            const baseY = groundY - blockSize / 2; // 草ブロックの1段上
            let spawned = 0;
            for (let x = 0; x < 6000; x += blockSize) {
                if (Math.random() > 0.06) continue; // 6%の確率
                const bx = x + blockSize / 2;
                // その位置に既にブロックがあるかチェック
                let occupied = false;
                platforms.getChildren().forEach(b => {
                    if (b.active && Math.abs(b.x - bx) < 4 && Math.abs(b.y - baseY) < 4) occupied = true;
                });
                if (occupied) continue;
                // 下に草ブロックがあるか確認
                let hasGrass = false;
                platforms.getChildren().forEach(b => {
                    if (b.active && b.getData('typeId') === BLOCK_TYPES.GRASS &&
                        Math.abs(b.x - bx) < 4 && Math.abs(b.y - (baseY + blockSize)) < 4) hasGrass = true;
                });
                if (!hasGrass) continue;
                const isFlower = Math.random() < 0.3;
                const wType = isFlower ? BLOCK_TYPES.FLOWER : BLOCK_TYPES.WEED;
                const wData = BLOCK_DATA[wType];
                const wBlock = platforms.create(bx, baseY, wData.texture, wData.frame);
                wBlock.setData('typeId', wType);
                wBlock.setData('hp', wData.hp);
                wBlock.body.enable = false;
                spawned++;
            }
        }

        // === 朝の草の拡散：上に固体ブロックが何もない土ブロックを草に変換 ===
        function spreadGrass(scene) {
            const allBlocks = platforms.getChildren();
            const toConvert = [];
            for (let i = 0; i < allBlocks.length; i++) {
                const blk = allBlocks[i];
                if (!blk.active) continue;
                if (blk.getData('typeId') !== BLOCK_TYPES.DIRT) continue;
                // 真上のセルを blockMap で O(1) 検索
                const above = bkGetAt(blk.x, blk.y - BLOCK_SIZE);
                // 上が空（null）か、物理ボディ無効の装飾ブロック（雑草・花・苗木など）なら対象
                if (!above || !above.body || !above.body.enable) {
                    toConvert.push(blk);
                }
            }
            if (toConvert.length === 0) return;
            const grassData = BLOCK_DATA[BLOCK_TYPES.GRASS];
            for (const blk of toConvert) {
                blk.setTexture(grassData.texture, grassData.frame);
                blk.setData('typeId', BLOCK_TYPES.GRASS);
                blk.setData('hp', grassData.hp);
                // blockMap の登録を更新（位置は変わらないが念のため）
                bkRegister(blk);
            }
        }

        function updateCustomers(scene, delta) {
            // スポーンタイマー
            customerSpawnTimer += delta;
            if (customerSpawnTimer >= CUSTOMER_SPAWN_INTERVAL) {
                customerSpawnTimer = 0;
                trySpawnCustomer(scene);
            }

            const dt = delta / 1000; // 秒換算

            // 各宇宙人客のAI更新
            for (let i = customers.length - 1; i >= 0; i--) {
                const c = customers[i];
                if (!c.sprite || !c.sprite.active) {
                    if (c.talkBubble) { c.talkBubble.destroy(); c.talkBubble = null; }
                    customers.splice(i, 1);
                    continue;
                }
                c.bobTime = (c.bobTime || 0) + delta;

                if (c.state === 'arriving') {
                    // テーブルが消えたら帰る
                    if (!c.targetTable || !c.targetTable.active || !tableItems.find(t => t.tableBlock === c.targetTable)) {
                        c.state = 'leaving';
                        continue;
                    }
                    // ホバー目標へ向かってふわふわ飛ぶ
                    const tx = c.hoverX + Math.sin(c.bobTime * 0.0018 + c.wobblePhase) * 8; // 横揺れ
                    const ty = c.hoverY;
                    const dx = tx - c.sprite.x;
                    const dy = ty - c.sprite.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const speed = 90; // px/s
                    if (dist > 6) {
                        c.sprite.body.setVelocity((dx / dist) * speed, (dy / dist) * speed);
                    } else {
                        c.sprite.body.setVelocity(0, 0);
                        c.sprite.setPosition(tx, ty);
                        c.state = 'hovering';
                        c.waitTimer = 0;
                    }
                    c.sprite.anims.play('alien_float', true);

                } else if (c.state === 'hovering') {
                    // 上下にふわふわ浮遊しながら待機
                    const bobY = Math.sin(c.bobTime * 0.003) * 4;
                    c.sprite.body.setVelocity(
                        Math.sin(c.bobTime * 0.0015 + c.wobblePhase) * 12,
                        Math.cos(c.bobTime * 0.003) * 14
                    );
                    // テーブルのアイテムがなくなったら帰る
                    const ti = tableItems.find(t => t.tableBlock === c.targetTable);
                    if (!ti) { c.state = 'leaving'; continue; }
                    // 20秒待っても購入なければ帰る
                    c.waitTimer += delta;
                    if (c.waitTimer > 20000) {
                        c.state = 'leaving';
                        customerSpawnTimer = CUSTOMER_SPAWN_INTERVAL * 0.7;
                    }

                    // === うさぎ店番による自動売却 ===
                    const shopRabbit = getShopkeeperRabbitForTable(c.targetTable);
                    if (shopRabbit) {
                        c.autoSellTimer = (c.autoSellTimer || 0) + delta;
                        if (c.autoSellTimer >= 2500) {
                            c.autoSellTimer = 0;
                            doAutoSell(scene, c, shopRabbit);
                        }
                    } else {
                        c.autoSellTimer = 0;
                    }

                    c.sprite.anims.play('alien_float', true);

                } else if (c.state === 'leaving') {
                    // 斜め上にふわふわ上昇して消える
                    c.leaveTimer = (c.leaveTimer || 0) + delta;
                    const lerpT = Math.min(c.leaveTimer / 2000, 1);
                    const vx = (Math.random() < 0.5 ? 1 : -1) * (40 + lerpT * 50);
                    const vy = -(60 + lerpT * 80); // 加速しながら上へ
                    c.sprite.body.setVelocity(
                        Math.sin(c.bobTime * 0.002 + c.wobblePhase) * 30 + (c.leaveDir || (Math.random() < 0.5 ? 1 : -1)) * (40 + lerpT * 50),
                        vy
                    );
                    if (!c.leaveDir) c.leaveDir = (Math.random() < 0.5 ? 1 : -1);
                    // フェードアウト
                    c.sprite.setAlpha(Math.max(0, 1 - lerpT * 0.8));
                    c.sprite.anims.play('alien_float', true);

                    const camTop = scene.cameras.main.scrollY - 80;
                    if (c.sprite.y < camTop || c.leaveTimer > 4000) {
                        if (c.talkBubble) { c.talkBubble.destroy(); c.talkBubble = null; }
                        c.sprite.destroy();
                        customers.splice(i, 1);
                        continue;
                    }
                }

                // 吹き出し制御：hovering 状態のときだけ表示
                if (c.talkBubble) {
                    const showBubble = (c.state === 'hovering');
                    c.talkBubble.setVisible(showBubble);
                    if (showBubble) {
                        const bob = Math.sin(c.bobTime * 0.003) * 3;
                        c.talkBubble.setPosition(c.sprite.x, c.sprite.y - 30 + bob);
                        c.talkBubble.setAlpha(c.sprite.alpha); // 消えかけ中は吹き出しも同期
                    }
                }
            }
        }

        function trySpawnCustomer(scene) {
            if (customers.length >= MAX_CUSTOMERS) return;

            // 開店ゾーン内にアイテムが載っているテーブルを探す
            const candidates = [];
            for (const ti of tableItems) {
                if (!ti.tableBlock || !ti.tableBlock.active) continue;
                if (isInShopZone(ti.tableBlock.x, ti.tableBlock.y)) {
                    const alreadyTargeted = customers.some(c => c.targetTable === ti.tableBlock && c.state !== 'leaving');
                    if (!alreadyTargeted) candidates.push(ti);
                }
            }
            if (candidates.length === 0) return;

            const chosen = candidates[Math.floor(Math.random() * candidates.length)];
            const table = chosen.tableBlock;

            // この客が希望する購入個数（在庫の1〜全部からランダム）
            const maxWant = chosen.itemCount;
            const desiredCount = Math.max(1, Math.floor(Math.random() * maxWant) + 1);

            // 空の上からふわふわ降りてくる: 画面内のランダムX、画面上部の外からスポーン
            const camL = scene.cameras.main.scrollX;
            const camR = camL + scene.scale.width;
            const spawnX = camL + Math.random() * (camR - camL); // 画面内ランダムX
            const spawnY = scene.cameras.main.scrollY - 60;      // 画面上部の外

            // physicsスプライトだが重力を無効にしてふわふわ制御
            const cs = scene.physics.add.sprite(spawnX, spawnY, 'alien', 0);
            cs.setDisplaySize(28, 28);
            cs.body.setAllowGravity(false);
            cs.body.setSize(22, 22);
            cs.setDepth(6);
            cs.anims.play('alien_float', true);

            // ホバー目標: テーブルの少し上
            const hoverX = table.x + (Math.random() < 0.5 ? -18 : 18);
            const hoverY = table.y - 26;

            // 「話したい」吹き出し
            const talkBubble = createTalkBubble(scene);

            customers.push({
                sprite: cs,
                targetTable: table,
                state: 'arriving',     // arriving → hovering → leaving
                hoverX, hoverY,
                desiredCount,          // 希望購入個数
                talkBubble,
                waitTimer: 0,
                leaveTimer: 0,
                bobTime: 0,
                wobblePhase: Math.random() * Math.PI * 2  // 横揺れ初期位相
            });
        }

        function openCustomerBuyPanel(scene, customer) {
            if (customerBuyPanel) { customerBuyPanel.destroy(); customerBuyPanel = null; }

            const ti = tableItems.find(t => t.tableBlock === customer.targetTable);
            if (!ti) return;

            // 希望個数は在庫を超えない（在庫が変動した場合に備えて再クランプ）
            const wantCount = Math.min(customer.desiredCount || 1, ti.itemCount);
            const unitPrice = getItemPrice(ti.itemType);
            const totalPrice = unitPrice * wantCount;

            // 個数に応じたセリフのバリエーション
            const countStr = wantCount === 1 ? '1 個' : wantCount + ' 個';

                `${itemName} を ${countStr} ほしいっ！（${totalPrice} コイン）`,
                `${itemName}、${countStr} ください〜！ ${totalPrice} コインでいい？`,
                `${countStr} の ${itemName} をください！ お代は ${totalPrice} コインね`,

            const yesTxt = scene.add.text(panelW / 2 - 50, 76, '売る', {
                fontSize: '13px', color: '#66ff66', fontStyle: 'bold'
            }).setOrigin(0.5).setScrollFactor(0);

            const noBtn = scene.add.rectangle(panelW / 2 + 50, 76, 76, 28, 0x663333, 0.9)

            const noTxt = scene.add.text(panelW / 2 + 50, 76, 'やめる', {

            }).setOrigin(0.5).setScrollFactor(0);

            yesBtn.on('pointerdown', () => {
                playSE('ui_success');
                addMoney(totalPrice);
                // テーブルのアイテム数を希望個数だけ減らす
                ti.itemCount -= wantCount;
                if (ti.itemCount <= 0) {
                    // 在庫なくなったのでアイテムスプライトごと削除
                    if (ti.itemSprite) ti.itemSprite.destroy();
                    if (ti.countText) ti.countText.destroy();
                    const idx = tableItems.indexOf(ti);
                    if (idx !== -1) tableItems.splice(idx, 1);
                } else {
                    // 残数があるので個数テキストだけ更新
                    updateTableItemCountText(ti);
                }
                // 売上フロートテキスト
                const ft = scene.add.text(customer.sprite.x, customer.sprite.y - 20,
                    '+' + totalPrice + '💰', {
                    fontSize: '14px', color: '#ffdd44', fontStyle: 'bold',
                    stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5).setDepth(200);
                scene.tweens.add({ targets: ft, y: ft.y - 40, alpha: 0, duration: 1500,
                    onComplete: () => ft.destroy() });
                customer.state = 'leaving';
                customerSpawnTimer = CUSTOMER_SPAWN_INTERVAL * 0.7;
                customerBuyPanel.destroy(); customerBuyPanel = null;

        // ズーム適用（デュアルカメラ方式：UI用カメラはズームしない）
        let uiCamera = null;
        function initUiCamera(scene) {
            if (uiCamera) return;
            uiCamera = scene.cameras.add(0, 0, scene.scale.width, scene.scale.height);
            uiCamera.setScroll(0, 0);
            uiCamera.transparent = true;
            // リサイズ対応
            scene.scale.on('resize', (gameSize) => {
                if (uiCamera) uiCamera.setSize(gameSize.width, gameSize.height);
            });
        }

        function applyZoom(scene, newZoom) {
            currentZoom = Math.round(newZoom * 10) / 10;
            initUiCamera(scene);
            scene.cameras.main.setZoom(currentZoom);
            // ライトグリッドはUIカメラ(zoom=1)で描画されるため
            // タイルの位置・サイズ変更は不要（ワールド座標計算のみzoom対応）
            // UI/ワールドのカメラ振り分け
            // まず全オブジェクトのカメラフィルタをリセット
            const allObjects = scene.children.list;
            for (let i = 0; i < allObjects.length; i++) {
                allObjects[i].cameraFilter = 0;
                delete allObjects[i]._zoomAssigned;
            }
            // 等倍以外なら振り分けを実行
            if (currentZoom !== 1.0) {
                assignCameraFilters(scene);
            }
            // ズーム率テキストを更新
            if (zoomText) {
                zoomText.setText(Math.round(currentZoom * 100) + '%');
            }
        }

        function assignCameraFilters(scene) {
            if (!uiCamera) return;
            const mainCam = scene.cameras.main;
            const allObjects = scene.children.list;
            for (let i = 0; i < allObjects.length; i++) {
                const obj = allObjects[i];
                if (obj._zoomAssigned) continue; // 既に振り分け済み
                const sfx = obj.scrollFactorX;
                const sfy = obj.scrollFactorY;
                const isUI = (sfx === 0 && sfy === 0);
                if (isUI) {
                    mainCam.ignore(obj);
                } else {
                    uiCamera.ignore(obj);
                }
                obj._zoomAssigned = true;
            }
        }

        // ===== 物理ボディカリング (カメラ外のブロックの物理演算を無効化) =====
        let _cullFrameCounter = 0;
        // 常に physics を持たないブロック種別（通り抜け・装飾系）
        // カリングで誤って body.enable = true にしないよう除外する
        const NO_PHYSICS_TYPES = new Set([
            BLOCK_TYPES.WEED,
            BLOCK_TYPES.FLOWER,
            BLOCK_TYPES.WATER,
            BLOCK_TYPES.GOLD,
            BLOCK_TYPES.VINE,
            BLOCK_TYPES.WHEAT_SEED,
            BLOCK_TYPES.WHEAT_STAGE1,
            BLOCK_TYPES.WHEAT_STAGE2,
            BLOCK_TYPES.WHEAT,
            BLOCK_TYPES.TORCH,
            BLOCK_TYPES.SLOPE_R,  // スロープは物理なし（手動スナップで斜面を実現）
            BLOCK_TYPES.SLOPE_L,
            BLOCK_TYPES.HALF_BLOCK, // ハーフブロックは物理なし（手動スナップで段差を実現）
        ]);

        function updatePhysicsCulling(scene) {
            _cullFrameCounter++;
            if (_cullFrameCounter % 20 !== 0) return; // 20フレームに1回だけ実行
            const wv = scene.cameras.main.worldView;
            const buf = 96; // 6ブロック分のバッファ (16px × 6)
            const x0 = wv.x - buf, x1 = wv.x + wv.width  + buf;
            const y0 = wv.y - buf, y1 = wv.y + wv.height + buf;
            const allBlks = platforms.getChildren();
            for (let i = 0; i < allBlks.length; i++) {
                const b = allBlks[i];
                if (!b.active || !b.body) continue;
                // 装飾・通り抜けブロックは常に physics を無効のまま保持
                if (NO_PHYSICS_TYPES.has(b.getData('typeId'))) {
                    b.body.enable = false;
                    continue;
                }
                b.body.enable = (b.x >= x0 && b.x <= x1 && b.y >= y0 && b.y <= y1);
            }
        }

        // === インタラクティブブロック操作ディスパッチャー ===
        // 短クリック解放時に呼び出される（長押し判定で分岐した後の操作発火）
        function _fireInteract(scene, block) {
            if (!block || !block.active) return;
            const typeId = block.getData('typeId');
            const dx = Math.abs(player.x - block.x);
            const dy = Math.abs(player.y - block.y);
            if (typeId === BLOCK_TYPES.WORKBENCH) {
                if (dx > 56 || dy > 72) return;
                openWorkbenchPanel(scene);
            } else if (typeId === BLOCK_TYPES.FURNACE) {
                if (dx > 56 || dy > 72) return;
                openFurnacePanel(scene, block);
            } else if (typeId === BLOCK_TYPES.COOKING_TABLE) {
                if (dx > 56 || dy > 72) return;
                openCookingPanel(scene, block);
            } else if (typeId === BLOCK_TYPES.STORAGE_CHEST) {
                if (dx > 56 || dy > 72) return;
                if (isChestOpen && openChestBlock === block) closeStorageChest();
                else openStorageChest(scene, block);
            } else if (typeId === BLOCK_TYPES.SIGN_OPEN || typeId === BLOCK_TYPES.SIGN_CLOSE) {
                if (dx > 56 || dy > 72) return;
                showSignToggleConfirm(scene, block);
            } else if (typeId === BLOCK_TYPES.DOOR_B || typeId === BLOCK_TYPES.DOOR_M || typeId === BLOCK_TYPES.DOOR_T) {
                if (dx > 56 || dy > 96) return;
                const parts = block.getData('doorParts');
                if (!parts) return;
                const isOpen = parts[0].getData('doorOpen');
                const newOpen = !isOpen;
                const openTextures   = ['door_open_b',   'door_open_m',   'door_open_t'];
                const closedTextures = ['door_closed_b', 'door_closed_m', 'door_closed_t'];
                const textures = newOpen ? openTextures : closedTextures;
                for (let pi = 0; pi < 3; pi++) {
                    const part = parts[pi];
                    if (!part || !part.active) continue;
                    part.setTexture(textures[pi]);
                    part.setData('doorOpen', newOpen);
                    if (newOpen) { part.body.enable = false; }
                    else { part.body.enable = true; part.refreshBody(); }
                }
                playSE(newOpen ? 'ui_click' : 'place_wood');
            } else if (typeId === BLOCK_TYPES.STRAW_BED_L || typeId === BLOCK_TYPES.STRAW_BED_R) {
                if (dx > 56 || dy > 72) return;
                const bedLBlock = typeId === BLOCK_TYPES.STRAW_BED_L ? block : block.getData('bedPair');
                if (bedLBlock) showBedConfirm(scene, bedLBlock);
            } else if (typeId === BLOCK_TYPES.TABLE) {
                if (dx > 56 || dy > 72) return;
                const existing = tableItems.find(ti => ti.tableBlock === block);
                const heldItem = inventory[activeSlotIndex];
                const holding = heldItem && heldItem.type !== null && heldItem.count > 0;
                if (existing && holding && existing.itemType === heldItem.type) {
                    // 同じ種類 → スタック追加
                    existing.itemCount += heldItem.count;
                    heldItem.count = 0; heldItem.type = null; heldItem.texture = null;
                    updateTableItemCountText(existing);
                    updateInventoryUI();
                    playSE('place');
                } else if (existing) {
                    // 別種 or 手ぶら → 回収
                    const bd = BLOCK_DATA[existing.itemType];
                    addInventoryItem(existing.itemType, existing.itemCount, bd.texture, bd.frame);
                    if (existing.itemSprite) existing.itemSprite.destroy();
                    if (existing.countText) existing.countText.destroy();
                    tableItems.splice(tableItems.indexOf(existing), 1);
                    playSE('pickup');
                } else if (holding) {
                    // 空テーブル → スタック丸ごと置く
                    const bData = BLOCK_DATA[heldItem.type];
                    if (bData) {
                        const itemSpr = scene.add.image(block.x, block.y - 9, bData.texture, bData.frame)
                            .setDisplaySize(10, 10).setDepth(15);
                        const countTxt = scene.add.text(block.x + 6, block.y - 14, String(heldItem.count), {
                            fontSize: '9px', color: '#ffffff', fontStyle: 'bold',
                            stroke: '#000000', strokeThickness: 2
                        }).setOrigin(1, 1).setDepth(16).setScrollFactor(1)
                          .setVisible(heldItem.count > 1);
                        const entry = { tableBlock: block, itemSprite: itemSpr, countText: countTxt,
                                        itemType: heldItem.type, itemCount: heldItem.count };
                        tableItems.push(entry);
                        heldItem.count = 0; heldItem.type = null; heldItem.texture = null;
                        updateInventoryUI();
                        playSE('place');
                    }
                }
            }
        }

        function update(time, delta) {
            // 図鑑が開いている間はゲーム操作を停止
            if (isHelpOpen) return;
            if (isEncyclopediaOpen || isCreatureBookOpen) { closeWorkbenchPanel(); return; }
            if (renjiDialog) return; // レンジダイアログ中はゲーム操作を停止
            if (isWorkbenchPanelOpen || isFurnacePanelOpen || isCookingPanelOpen) return; // パネル中はゲーム操作を停止

            // カメラ外ブロックの物理ボディを無効化（パフォーマンス最適化）
            updatePhysicsCulling(this);

            // 座標表示を更新
            // Math.round(pos / BLOCK_SIZE): ±8px 以内の微振動で表示が変わらない
            //   Math.floor は境界(16の倍数)でわずかな揺れでも切り替わるが、
            //   Math.round は「±ブロック半分の揺れ」まで安定して同じ値を返す
            //   （0.5刻みにすると通常地面でも 46.5 等が出るため整数丸めを使用）
            if (coordText) {
                const bx = Math.round(player.x / BLOCK_SIZE);
                const by = Math.round(player.y / BLOCK_SIZE);
                coordText.setText('X: ' + bx + '  Y: ' + by);
            }

            // ミニマップ更新
            updateMinimap(this, time);

            // 水中判定: プレイヤー周辺のグリッドを blockMap で O(1) チェック
            let inWater = false;
            {
                const pgx = Math.round(player.x / BLOCK_SIZE);
                const pgy = Math.round(player.y / BLOCK_SIZE);
                for (let dy = -2; dy <= 2; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const s = bkGetAt((pgx + dx) * BLOCK_SIZE, (pgy + dy) * BLOCK_SIZE);
                        if (s && s.getData('typeId') === BLOCK_TYPES.WATER) { inWater = true; break; }
                    }
                    if (inWater) break;
                }
            }
            const speed = inWater ? 140 : 250;

            // パララックス（視差スクロール）効果：横方向のみ背景をゆっくりずらす
            const camScrollX = this.cameras.main.scrollX;
            const camScrollY = this.cameras.main.scrollY;
            // ライティング用: worldViewはズームを考慮した正確なワールド左上座標
            const camX = this.cameras.main.worldView.x;
            const camY = this.cameras.main.worldView.y;
            // 背景をカメラのワールドビューに合わせて配置（ズームに関わらず画面全体を覆う）
            const wv = this.cameras.main.worldView;
            const bgSkyLayers = [bgSkyDay, bgSkyEvening, bgSkyNight];
            const bgMtnLayers = [bgMtnDay, bgMtnEvening, bgMtnNight];

            // ── 地上/地中で背景を切り替え ──
            // skyH: カメラ内で WORLD_GROUND_Y より上に見える高さ（0〜wv.height）
            // ugH : カメラ内で WORLD_GROUND_Y より下に見える高さ（0〜wv.height）
            const skyH = Math.max(0, Math.min(wv.height, WORLD_GROUND_Y - wv.y));
            const ugH  = Math.max(0, wv.height - skyH);

            // 空・山背景: 地面より上の帯にだけ表示
            const allBgLayers = bgSkyLayers.concat(bgMtnLayers);
            allBgLayers.forEach(bg => {
                if (!bg) return;
                if (skyH > 0) {
                    bg.setPosition(wv.x, wv.y);
                    bg.setSize(wv.width, skyH);
                    bg.setVisible(true);
                } else {
                    bg.setVisible(false);
                }
            });

            // 地中背景: 地面より下の帯にだけ表示
            if (bgUnderground) {
                if (ugH > 0) {
                    bgUnderground.setPosition(wv.x, wv.y + skyH);
                    bgUnderground.setSize(wv.width, ugH);
                    bgUnderground.setVisible(true);
                    bgUnderground.tilePositionX = camScrollX * 0.15;
                    bgUnderground.tilePositionY = camScrollY * 0.1;
                } else {
                    bgUnderground.setVisible(false);
                }
            }

            // パララックス: 空はゆっくり、山はやや速く
            bgSkyLayers.forEach(bg => { if (bg) { bg.tilePositionX = camScrollX * 0.08; bg.tilePositionY = camScrollY * 0.05; } });
            bgMtnLayers.forEach(bg => { if (bg) { bg.tilePositionX = camScrollX * 0.3; bg.tilePositionY = camScrollY * 0.15; } });

            // --- 昼夜と照明のシステム (100%確実なグリッドアルファ方式) ---
            const timeOfDay = (Math.sin(time / 40000 - Math.PI / 2) + 1) / 2;

            // === 朝になったら雑草・花を低確率で再生成 ===
            // timeOfDayが0.9を下回った瞬間＝夜明け
            if (prevTimeOfDay >= 0.9 && timeOfDay < 0.9) {
                spawnMorningWeeds(this);
                spreadGrass(this); // 露出した土ブロックを草に変換
            }
            prevTimeOfDay = timeOfDay;

            // timeOfDay: 0=昼のピーク, 0.5=夜のピーク, 0.25/0.75付近=夕方/朝
            // 各背景のアルファ値をクロスフェードで切り替え
            // 空と山の両レイヤーに同じアルファ値を適用
            let aDay = 0, aEvening = 0, aNight = 0;
            if (timeOfDay < 0.2) {
                aDay = 1;
            } else if (timeOfDay < 0.35) {
                const t = (timeOfDay - 0.2) / 0.15;
                aDay = 1 - t; aEvening = t;
            } else if (timeOfDay < 0.5) {
                const t = (timeOfDay - 0.35) / 0.15;
                aEvening = 1 - t; aNight = t;
            } else if (timeOfDay < 0.8) {
                aNight = 1;
            } else if (timeOfDay < 0.9) {
                const t = (timeOfDay - 0.8) / 0.1;
                aEvening = t; aNight = 1 - t;
            } else {
                const t = (timeOfDay - 0.9) / 0.1;
                aDay = t; aEvening = 1 - t;
            }
            bgSkyDay.setAlpha(aDay); bgMtnDay.setAlpha(aDay);
            bgSkyEvening.setAlpha(aEvening); bgMtnEvening.setAlpha(aEvening);
            bgSkyNight.setAlpha(aNight); bgMtnNight.setAlpha(aNight);
            const groundY = 768;
            const depthDarkness = Math.min(1, Math.max(0, (player.y - groundY) / 300));
            // 空の暗さを背景のクロスフェードと同期させる
            let skyDarkness = 0;
            if (timeOfDay < 0.2) {
                skyDarkness = 0;               // 昼: 暗さなし
            } else if (timeOfDay < 0.5) {
                skyDarkness = (timeOfDay - 0.2) / 0.3;  // 昼→夜: 徐々に暗く
            } else if (timeOfDay < 0.8) {
                skyDarkness = 1;               // 夜: 最大暗さ
            } else {
                skyDarkness = 1 - (timeOfDay - 0.8) / 0.2;  // 夜→昼: 徐々に明るく
            }
            // 暗闇の基本アルファ値: 0(昼) ～ 0.95(夜・地下)
            const baseDarkness = Math.min(0.95, skyDarkness * 0.8 + depthDarkness * 0.8);
            
            // 単一Graphicsに全タイルを描画（継ぎ目なし）
            lightGraphics.clear();

            if (baseDarkness <= 0.05) {
                // 昼は完全な白で塗りつぶし（乗算=そのまま透過）
                lightGraphics.fillStyle(0xffffff, 1.0);
                lightGraphics.fillRect(0, 0, this.scale.width, this.scale.height);
            } else {
                const screenW = this.scale.width;
                const screenH = this.scale.height;
                const colsNeeded = Math.ceil(screenW / LIGHT_TILE_SIZE) + 1;
                const rowsNeeded = Math.ceil(screenH / LIGHT_TILE_SIZE) + 1;

                const torchRange = 350;
                const lampRange  = 460; // 吊りランタンは松明より広い
                const maxTorchRange = Math.max(torchRange, lampRange);
                let pLightRange = 150;
                const activeItem = inventory[activeSlotIndex];
                if (activeItem && (activeItem.type === BLOCK_TYPES.TORCH || activeItem.type === BLOCK_TYPES.HANGING_LAMP) && activeItem.count > 0) {
                    pLightRange = torchRange;
                }

                // === スクリーン空間で全て計算（カメラscroll遅延問題を回避） ===
                // ワールド座標→スクリーン座標変換
                // ライト計算はスナップ補正より前に実行されるため、前フレームのスナップ済み座標を使う。
                // wasOnSlope=true（前フレームでスロープ/ハーフブロック上）のときは lightStableY を参照。
                // これにより「物理が動かした位置→スナップ補正後の位置」の1フレームズレが解消される。
                const lightY = (wasOnSlope && lightStableY > 0) ? lightStableY : player.y;
                const playerScreenX = (player.x - camX) * currentZoom;
                const playerScreenY = (lightY - camY) * currentZoom;
                const pScreenRange = pLightRange * currentZoom;
                const tScreenRange = torchRange * currentZoom;
                const lScreenRange = lampRange * currentZoom;
                const maxScrRange  = maxTorchRange * currentZoom;
                const tScreenRange2 = tScreenRange * tScreenRange;
                const lScreenRange2 = lScreenRange * lScreenRange;

                // 松明・ランタンのスクリーン座標を事前計算（カリング付き）
                const screenTorches = [];
                for (let i = 0; i < torches.length; i++) {
                    const t = torches[i];
                    const tsx = (t.x - camX) * currentZoom;
                    // 画面外の光源はスキップ（マージン付き）
                    if (tsx < -maxScrRange || tsx > screenW + maxScrRange) continue;
                    const tsy = (t.y - camY) * currentZoom;
                    const isLamp = t.type === BLOCK_TYPES.HANGING_LAMP;
                    screenTorches.push({ sx: tsx, sy: tsy, range2: isLamp ? lScreenRange2 : tScreenRange2 });
                }

                // 精錬中石窯のスクリーン座標を事前計算
                const screenFurnaces = [];
                const furnaceRange = 200;
                const fScreenRange = furnaceRange * currentZoom;
                for (let i = 0; i < activeFurnaces.length; i++) {
                    const af = activeFurnaces[i];
                    if (!af.block || !af.block.active) continue;
                    const fsx = (af.block.x - camX) * currentZoom;
                    if (fsx < -fScreenRange || fsx > screenW + fScreenRange) continue;
                    const fsy = (af.block.y - camY) * currentZoom;
                    screenFurnaces.push({ sx: fsx, sy: fsy });
                }

                // 事前計算: range² (ループ内でsqrtを使わないための準備)
                const pScreenRange2 = pScreenRange * pScreenRange;
                // tScreenRange2, lScreenRange2 は上で定義済み
                const fScreenRange2 = fScreenRange * fScreenRange;

                for (let y = 0; y < rowsNeeded && y < GRID_ROWS; y++) {
                    for (let x = 0; x < colsNeeded && x < GRID_COLS; x++) {
                        const screenCX = x * LIGHT_TILE_SIZE + LIGHT_TILE_SIZE / 2;
                        const screenCY = y * LIGHT_TILE_SIZE + LIGHT_TILE_SIZE / 2;

                        let minAlpha = baseDarkness;

                        // プレイヤーの光（平方距離で比較 → sqrt不要）
                        const pdx = screenCX - playerScreenX;
                        const pdy = screenCY - playerScreenY;
                        const pDist2 = pdx * pdx + pdy * pdy;
                        if (pDist2 < pScreenRange2) {
                            // lightEffect = (dist/range)² * darkness = dist²/range² * darkness
                            const lightEffect = (pDist2 / pScreenRange2) * baseDarkness;
                            if (lightEffect < minAlpha) minAlpha = lightEffect;
                        }

                        // 松明・ランタンの光（平方距離）
                        for (let i = 0; i < screenTorches.length; i++) {
                            const st = screenTorches[i];
                            const tdx = screenCX - st.sx;
                            const tdy = screenCY - st.sy;
                            const tDist2 = tdx * tdx + tdy * tdy;
                            if (tDist2 < st.range2) {
                                const lightEffect = (tDist2 / st.range2) * baseDarkness;
                                if (lightEffect < minAlpha) minAlpha = lightEffect;
                            }
                        }

                        // 精錬中の石窯の光（平方距離）
                        for (let i = 0; i < screenFurnaces.length; i++) {
                            const sf = screenFurnaces[i];
                            const fdx = screenCX - sf.sx;
                            const fdy = screenCY - sf.sy;
                            const fDist2 = fdx * fdx + fdy * fdy;
                            if (fDist2 < fScreenRange2) {
                                const lightEffect = (fDist2 / fScreenRange2) * baseDarkness;
                                if (lightEffect < minAlpha) minAlpha = lightEffect;
                            }
                        }

                        const cVal = Math.floor(255 * (1 - minAlpha));
                        const color = Phaser.Display.Color.GetColor(cVal, cVal, cVal);
                        lightGraphics.fillStyle(color, 1.0);
                        lightGraphics.fillRect(x * LIGHT_TILE_SIZE, y * LIGHT_TILE_SIZE, LIGHT_TILE_SIZE, LIGHT_TILE_SIZE);
                    }
                }
            }
            // -----------------------------

            // プレイヤーの接地判定
            const onGround = player.body.touching.down || player.body.onFloor();

            // 蔦（つた）との重なり判定（vineBlocks配列のみチェック）
            let onVine = false;
            const px = player.x, py = player.y;
            for (let i = 0; i < vineBlocks.length; i++) {
                const vine = vineBlocks[i];
                if (!vine || !vine.active) continue;
                if (Math.abs(px - vine.x) < 20 && Math.abs(py - vine.y) < 20) {
                    onVine = true;
                    break;
                }
            }

            // 蔦に触れている間の上下移動
            if (onVine) {
                player.body.allowGravity = false;
                const climbSpeed = 180;
                if (wasdKeys.w.isDown || cursors.up.isDown) {
                    player.setVelocityY(-climbSpeed);
                } else if (wasdKeys.s.isDown || cursors.down.isDown) {
                    player.setVelocityY(climbSpeed);
                } else {
                    // 蔦上で何も押していなければ静止
                    if (!onGround) player.setVelocityY(0);
                }
                // 蔦上でスペースでジャンプ離脱
                if (wasdKeys.space.isDown || isJumpPressed) {
                    player.setVelocityY(-200);
                    player.body.allowGravity = true;
                    playSE('jump');
                }
            } else if (inWater) {
                // 水中: 重力を弱め、ジャンプキーで浮上
                player.body.allowGravity = true;
                player.body.gravity.y = -500; // 重力を大幅に軽減
                if (cursors.up.isDown || wasdKeys.space.isDown || isJumpPressed) {
                    // 水面近く（頭上に水が無い）ならブースト付きジャンプで飛び出す
                    let waterAbove = false;
                    {
                        const pgx = Math.round(player.x / BLOCK_SIZE);
                        for (let dy = -1; dy >= -4; dy--) {
                            const pgy = Math.round((player.y + dy * BLOCK_SIZE) / BLOCK_SIZE);
                            const s = bkGetAt(pgx * BLOCK_SIZE, pgy * BLOCK_SIZE);
                            if (s && s.getData('typeId') === BLOCK_TYPES.WATER) { waterAbove = true; break; }
                        }
                    }
                    if (!waterAbove) {
                        // 水面付近: 強めのジャンプで水から飛び出す
                        player.setVelocityY(-175);
                    } else {
                        player.setVelocityY(-100);
                    }
                } else if (cursors.down.isDown || wasdKeys.s.isDown) {
                    player.setVelocityY(120);
                } else {
                    // 水中で何もしなければゆっくり沈む
                    if (player.body.velocity.y > 60) player.setVelocityY(60);
                }
            } else {
                player.body.allowGravity = true;
                player.body.gravity.y = 0; // 通常重力に戻す
                // Y軸（ジャンプ）の制御
                if ((cursors.up.isDown || wasdKeys.space.isDown || isJumpPressed) && onGround) {
                    player.setVelocityY(-225);
                    playSE('jump');
                }
            }

            // 落下ダメージ追跡: 空中で下降中なら落下開始Yを記録
            if (!onGround && !onVine && !inWater) {
                if (!isFalling && player.body.velocity.y > 0) {
                    isFalling = true;
                    fallStartY = player.y;
                }
            }

            // 着地SE: 前フレームで空中→今フレームで接地した瞬間
            if (onGround && !wasOnGround) {
                playSE('land');

                // 落下ダメージ判定
                if (isFalling) {
                    const fallDistance = player.y - fallStartY;
                    const FALL_DAMAGE_THRESHOLD = 288; // 9ブロック分以上で発生
                    if (fallDistance > FALL_DAMAGE_THRESHOLD) {
                        const extraBlocks = Math.floor((fallDistance - FALL_DAMAGE_THRESHOLD) / 128);
                        const damage = 1 + extraBlocks; // 基本1 + 4ブロックごとに+1
                        damagePlayer(this, damage);
                    }
                }
                isFalling = false;
            }
            // 蔦や水に触れたら落下リセット
            if (onVine || inWater) {
                isFalling = false;
            }
            wasOnGround = onGround;

            // X軸（左右）の移動制御とアニメーション
            let animName = 'idle';
            if (cursors.left.isDown || wasdKeys.a.isDown || isLeftPressed) {
                player.setVelocityX(-speed);
                player.setFlipX(false);
                if (onGround) animName = 'walk';
            } else if (cursors.right.isDown || wasdKeys.d.isDown || isRightPressed) {
                player.setVelocityX(speed);
                player.setFlipX(true);
                if (onGround) animName = 'walk';
            } else {
                player.setVelocityX(0);
                if (onGround) animName = 'idle';
            }

            // ===== 階段スロープ補正 =====
            // stairBlocks（物理なし）上を歩くとき、プレイヤーY座標をスロープ面に連続補正する
            // 階段ブロック自体は body.enable=false で vinePassthrough がスキップするため衝突しない
            let onSlope = false;
            if (!onVine && !inWater) {
                const footY   = player.y + 24; // 物理ボディ底面
                const halfW   = 14;            // 物理ボディ半幅

                // 進行方向を判定
                const mvR = cursors.right.isDown || wasdKeys.d.isDown || isRightPressed;
                const mvL = cursors.left.isDown  || wasdKeys.a.isDown || isLeftPressed;

                // inside = プレイヤー中心がブロック範囲内にある階段（実際に乗っている）
                // outside = 検出拡張で引っかかっただけの階段（接近中）
                // inside を優先することで、連続した階段間の乗り移りをスムーズにする
                let bestInsideSurface = Infinity;
                let bestInsideDiff    = Infinity;
                let bestOutsideSurface = Infinity;
                let bestOutsideDiff    = Infinity;

                for (const sb of stairBlocks) {
                    if (!sb.block || !sb.block.active) continue;
                    const sx        = sb.block.x;
                    const sy        = sb.block.y;
                    const leftEdge  = sx - BLOCK_SIZE / 2;
                    const rightEdge = sx + BLOCK_SIZE / 2;

                    // 階段の向きに合わせた検出拡張（登り方向のみ）
                    // flipped=true  → "/" 形（右移動で登る）: 左からの接近を拡張
                    // flipped=false → "\" 形（左移動で登る）: 右からの接近を拡張
                    const stepExtL = (mvR &&  sb.flipped) ? BLOCK_SIZE : 0;
                    const stepExtR = (mvL && !sb.flipped) ? BLOCK_SIZE : 0;

                    if (player.x + halfW + stepExtL <= leftEdge) continue;
                    if (player.x - halfW - stepExtR >= rightEdge) continue;

                    // プレイヤー中心がブロック範囲内か
                    const isInside = (player.x >= leftEdge && player.x <= rightEdge);

                    // スロープ上のX位置でのY表面座標を計算
                    const clampedX = Phaser.Math.Clamp(player.x, leftEdge, rightEdge);
                    const surfaceY = sb.flipped
                        ? sy - (clampedX - sx)   // "/" 形: 右に行くほど高い
                        : sy + (clampedX - sx);  // "\" 形: 左に行くほど高い

                    const diff = footY - surfaceY; // 正 = 足がスロープより下
                    if (diff > -BLOCK_SIZE && diff < BLOCK_SIZE * 2 && player.body.velocity.y >= -50) {
                        const diffAbs = Math.abs(diff);
                        if (isInside) {
                            if (diffAbs < bestInsideDiff) {
                                bestInsideDiff    = diffAbs;
                                bestInsideSurface = surfaceY;
                            }
                        } else {
                            if (diffAbs < bestOutsideDiff) {
                                bestOutsideDiff    = diffAbs;
                                bestOutsideSurface = surfaceY;
                            }
                        }
                    }
                }

                // inside を優先、なければ outside を使用
                const bestSurface = bestInsideSurface < Infinity ? bestInsideSurface : bestOutsideSurface;

                if (bestSurface < Infinity) {
                    player.y = bestSurface - 24; // 足元をスロープ面に合わせる
                    player.setVelocityY(0);
                    player.body.allowGravity = false;
                    // 物理ボディ位置を即座に同期（次フレームの衝突判定で正しい位置を使う）
                    player.body.position.x = player.x - 14;
                    player.body.position.y = player.y - 24;
                    player.body.updateCenter();
                    onSlope = true;
                    isFalling = false;
                }

                // ===== SLOPE_R / SLOPE_L の斜面スナップ（stairBlocksとは独立した新システム）=====
                if (!onSlope) {
                    const footY  = player.y + 24;          // 足元Y（body.bottom と同値）
                    const halfW  = 14;                     // 物理ボディ半幅
                    for (let _si = 0; _si < slopeBlocks.length; _si++) {
                        const sb2 = slopeBlocks[_si];
                        if (!sb2 || !sb2.active) continue;
                        const bLeft = sb2.x - 8, bRight = sb2.x + 8;
                        const bTop  = sb2.y - 8, bBot   = sb2.y + 8;
                        const tid = sb2.getData('typeId');
                        // 登り方向のみ検出を拡張（出口側は拡張しない → 登り切った後でスタックしない）
                        // SLOPE_L(/): 右移動で登る → 左側（接近方向）を拡張
                        // SLOPE_R(\): 左移動で登る → 右側（接近方向）を拡張
                        const stepExtL = (mvR && tid === BLOCK_TYPES.SLOPE_L) ? BLOCK_SIZE : 0;
                        const stepExtR = (mvL && tid === BLOCK_TYPES.SLOPE_R) ? BLOCK_SIZE : 0;
                        if (player.x + halfW + stepExtL <= bLeft) continue;
                        if (player.x - halfW - stepExtR >= bRight) continue;
                        // プレイヤーX座標をブロック範囲内にクランプして斜面Y座標を算出
                        const cx = Phaser.Math.Clamp(player.x, bLeft, bRight);
                        const t  = (cx - bLeft) / 16;
                        // SLOPE_R(/): 左端=頂面、右端=底面（右上がり＝左から登ると上へ）
                        // SLOPE_L(\): 左端=底面、右端=頂面（左上がり＝右から登ると上へ）
                        const surfaceY = (tid === BLOCK_TYPES.SLOPE_R)
                            ? (bTop + t * 16)
                            : (bBot - t * 16);
                        // 階段システムと同じ判定幅: 面より16px上〜32px下
                        const diff = footY - surfaceY;
                        if (diff > -BLOCK_SIZE && diff < BLOCK_SIZE * 2
                                && player.body.velocity.y >= -50) {
                            player.y = surfaceY - 24;
                            player.setVelocityY(0);
                            player.body.allowGravity = false;
                            player.body.position.x = player.x - 14;
                            player.body.position.y = player.y - 24;
                            player.body.updateCenter();
                            onSlope = true;
                            isFalling = false;
                            break;
                        }
                    }
                }
            }
            // ===== ハーフブロック スナップ =====
            // 通常ブロックの半分の高さ（8px）の段差を自動で乗り越える
            if (!onSlope) {
                const hFootY = player.y + 24;
                const hHalfW = 14;
                // 移動方向を取得（スタック防止の方向フィルタ用）
                const hMvR = cursors.right.isDown || wasdKeys.d.isDown || isRightPressed;
                const hMvL = cursors.left.isDown  || wasdKeys.a.isDown || isLeftPressed;

                // 階段スロープと同様に inside/outside を区別して最近接ブロックを選ぶ
                let bestInsideSurface  = Infinity;
                let bestInsideDiff     = Infinity;
                let bestOutsideSurface = Infinity;
                let bestOutsideDiff    = Infinity;

                for (let _hi = 0; _hi < halfBlocks.length; _hi++) {
                    const hb = halfBlocks[_hi];
                    if (!hb || !hb.active) continue;
                    const hLeft = hb.x - 8, hRight = hb.x + 8;

                    // プレイヤー中心がブロックX範囲内かどうか
                    const hIsInside = (player.x >= hLeft && player.x <= hRight);

                    if (!hIsInside) {
                        // ブロックの外側: ブロックに向かう方向のみ許可（逆方向=端から離れるときは無視）
                        // これにより「端でスタック」「横からスタック」を防ぐ
                        const approachFromLeft  = (player.x < hLeft)  && hMvR;
                        const approachFromRight = (player.x > hRight) && hMvL;
                        if (!approachFromLeft && !approachFromRight) continue;

                        // 段差乗り上げ先読み: 接近方向に BLOCK_SIZE 分検出を拡張
                        const stepExtL = approachFromLeft  ? BLOCK_SIZE : 0;
                        const stepExtR = approachFromRight ? BLOCK_SIZE : 0;
                        if (player.x + hHalfW + stepExtL <= hLeft)  continue;
                        if (player.x - hHalfW - stepExtR >= hRight) continue;
                    } else {
                        // ブロックの内側（乗っている状態）: 通常オーバーラップチェック
                        if (player.x + hHalfW <= hLeft)  continue;
                        if (player.x - hHalfW >= hRight) continue;
                    }

                    // ハーフブロック上面 = タイル中央Y（ブロック下半分のみが実体）
                    const hSurfaceY = hb.y;
                    const hDiff = hFootY - hSurfaceY;
                    // 判定幅: 上側 -BLOCK_SIZE（16px上まで） / 下側 BLOCK_SIZE/2+2（約10px下まで）
                    // velocity.y >= -50 によりジャンプ上昇中はすり抜けを維持
                    if (hDiff > -BLOCK_SIZE && hDiff < BLOCK_SIZE / 2 + 2
                            && player.body.velocity.y >= -50) {
                        const diffAbs = Math.abs(hDiff);
                        if (hIsInside) {
                            if (diffAbs < bestInsideDiff) {
                                bestInsideDiff    = diffAbs;
                                bestInsideSurface = hSurfaceY;
                            }
                        } else {
                            if (diffAbs < bestOutsideDiff) {
                                bestOutsideDiff    = diffAbs;
                                bestOutsideSurface = hSurfaceY;
                            }
                        }
                    }
                }

                // inside を優先し、なければ outside を採用
                const bestHSurface = bestInsideSurface < Infinity ? bestInsideSurface : bestOutsideSurface;
                if (bestHSurface < Infinity) {
                    const hTargetY = Math.round(bestHSurface) - 24;
                    // 常に正確な位置にスナップ（閾値なし）
                    // 閾値を設けると物理エンジンとの微小な差分が蓄積し、ライト円がガタつく原因になる
                    // カメラには 4px デッドゾーンがあるため、毎フレームの Y 代入でカメラ揺れは発生しない
                    player.y = hTargetY;
                    player.body.position.y = hTargetY - 24;
                    player.body.updateCenter();
                    player.setVelocityY(0);
                    player.body.allowGravity = false;
                    onSlope = true;
                    isFalling = false;
                }
            }

            if (!onSlope) player.body.allowGravity = true;
            // スナップ後の安定座標をキャッシュ（次フレームのライト計算で使用）
            // ライト計算はスナップより前に実行されるため、1フレーム前の値が「スナップ済み正確値」になる
            if (onSlope) {
                lightStableY = player.y; // スナップ済みY座標を記録
            } else {
                lightStableY = 0;        // スロープ外はリセット（通常の player.y を使用）
            }
            wasOnSlope = onSlope;

            // スロープ上でのジャンプを許可（物理ブロックでないため onGround=false でもジャンプできるように）
            if (onSlope && (cursors.up.isDown || wasdKeys.space.isDown || isJumpPressed)) {
                player.setVelocityY(-225);
                player.body.allowGravity = true;
                onSlope = false;
                playSE('jump');
            }

            // スロープ上でも歩行アニメーションを適用（onGround=false のため上の分岐では設定されない）
            if (onSlope && (cursors.left.isDown || wasdKeys.a.isDown || isLeftPressed ||
                            cursors.right.isDown || wasdKeys.d.isDown || isRightPressed)) {
                animName = 'walk';
            }

            // 空中にいるときはジャンプアニメーション
            if (!onGround && !onSlope) animName = 'jump';

            // 採掘中は振りモーション（地上のみ）
            if (isMining && (onGround || onSlope)) animName = 'swing';

            // レイヤースプライトの同期（位置・向き・アニメーション）
            // スケール1.0(96px高) の下端を物理ボディ下端(player.y+24)に合わせるため -24px オフセット
            const flipped = player.flipX;
            const sprY = player.y - 24;
            playerBodySprite.setPosition(player.x, sprY);
            playerBodySprite.setFlipX(flipped);
            playerBodySprite.anims.play('player_body_' + animName, true);

            playerOutfitSprite.setPosition(player.x, sprY);
            playerOutfitSprite.setFlipX(flipped);
            playerOutfitSprite.anims.play(currentOutfitKey + '_' + animName, true);

            playerHairSprite.setPosition(player.x, sprY);
            playerHairSprite.setFlipX(flipped);
            playerHairSprite.anims.play('player_hair_' + animName, true);

            // 水中エフェクト: プレイヤーに半透明の青みをかける
            if (inWater) {
                const waterTint = 0x6699cc;
                playerBodySprite.setTint(waterTint);
                playerOutfitSprite.setTint(waterTint);
                playerHairSprite.setTint(waterTint);
                playerBodySprite.setAlpha(0.75);
                playerOutfitSprite.setAlpha(0.75);
                playerHairSprite.setAlpha(0.75);
            } else {
                playerBodySprite.clearTint();
                playerOutfitSprite.clearTint();
                playerHairSprite.clearTint();
                playerBodySprite.setAlpha(1);
                playerOutfitSprite.setAlpha(1);
                playerHairSprite.setAlpha(1);
            }

            // バックグラウンド石窯精錬の更新
            updateFurnaces(this, delta);
            updateCookingTables(this, delta);
            updateSaplings(this, delta);
            updateWheatCrops(this, delta);
            updateWaterFlow(this, time);
            updateSlimes(this, time, delta);

            // チェストが開いている場合、距離チェック
            if (isChestOpen && openChestBlock) {
                const cdx = Math.abs(player.x - openChestBlock.x);
                const cdy = Math.abs(player.y - openChestBlock.y);
                if (cdx + cdy > 120) closeStorageChest();
            }

            // ベッド確認パネルが開いている場合、距離チェック
            if (bedConfirmPanel) {
                // 何もしない（距離で閉じるとUX的に不便なのでそのまま）
            }

            // 落下リスポーン: ワールド外に出たら自宅 or デフォルト地点にリスポーン
            if (player.y > 3552 - 10) {
                damagePlayer(this, playerHP); // 即死→リスポーン処理が走る
                isFalling = false;
            }

            // 手持ちアイテム表示更新
            const heldItemNow = inventory[activeSlotIndex];
            if (heldItemNow && heldItemNow.count > 0 && heldItemNow.type !== null && BLOCK_DATA[heldItemNow.type]) {
                const bd = BLOCK_DATA[heldItemNow.type];
                heldItemSprite.setTexture(bd.texture, bd.frame);
                heldItemSprite.setVisible(true);
                const facing = player.flipX ? 1 : -1;
                // プレイヤーの向きに合わせてアイテム画像を反転
                heldItemSprite.setFlipX(!player.flipX);

                // 採掘アニメーション
                if (isMining) {
                    miningAnimTime += delta;
                    const swing = Math.sin(miningAnimTime * 0.015) * 25;
                    heldItemSprite.setRotation(facing * Phaser.Math.DegToRad(swing - 30));
                    heldItemSprite.setPosition(player.x + facing * 18, player.y + 8);
                } else {
                    miningAnimTime = 0;
                    heldItemSprite.setRotation(0);
                    heldItemSprite.setPosition(player.x + facing * 16, player.y + 8);
                }
            } else {
                heldItemSprite.setVisible(false);
            }
            isMining = false; // 毎フレームリセット、採掘中にtrueにセットされる

            // 進行方向に水ブロックがあるか判定するヘルパー
            function hasWaterAhead(entity, dir) {
                const checkX = entity.x + dir * 24;
                const checkY = entity.y + 8;
                const children = platforms.getChildren();
                for (let i = 0; i < children.length; i++) {
                    const blk = children[i];
                    if (!blk.active) continue;
                    if (blk.getData('typeId') !== BLOCK_TYPES.WATER) continue;
                    if (Math.abs(blk.x - checkX) < 20 && Math.abs(blk.y - checkY) < 20) return true;
                }
                return false;
            }

            // りんごを手に持っているか判定
            const holdingApple = inventory[activeSlotIndex] && inventory[activeSlotIndex].type === BLOCK_TYPES.APPLE && inventory[activeSlotIndex].count > 0;

            // うさぎAI更新
            for (const rb of rabbits) {
                if (!rb.active) continue;
                const isTamed = rb.getData('tamed');
                const distToPlayer = Phaser.Math.Distance.Between(player.x, player.y, rb.x, rb.y);

                // === ペット化済み ===
                if (isTamed) {
                    // 店番アイコンを毎フレーム更新
                    const skIcon = rb.getData('shopkeeperIcon');
                    if (skIcon && skIcon.active) {
                        skIcon.setPosition(rb.x, rb.y - 22);
                    }
                    // ♥アイコンを毎フレーム更新（店番中は非表示）
                    const rbTamedIcon = rb.getData('tamedIcon');
                    if (rbTamedIcon && rbTamedIcon.active) {
                        rbTamedIcon.setPosition(rb.x, rb.y - 16);
                        rbTamedIcon.setVisible(!rb.getData('shopkeeper'));
                    }

                    // === 店番モード: OPEN看板の近くに留まる ===
                    if (rb.getData('shopkeeper')) {
                        const shopTarget = rb.getData('shopTarget');
                        if (shopTarget && shopTarget.active && shopTarget.getData('typeId') === BLOCK_TYPES.SIGN_OPEN) {
                            const tx = shopTarget.x;
                            const dist2 = Math.abs(rb.x - tx);
                            if (dist2 > 24) {
                                const dir = tx > rb.x ? 1 : -1;
                                rb.setVelocityX(dir * 60);
                                rb.setFlipX(dir < 0);
                                rb.anims.play('rabbit_walk', true);
                                if (rb.body.touching.down && (rb.body.blocked.left || rb.body.blocked.right)) {
                                    rb.setVelocityY(-420);
                                }
                            } else {
                                rb.setVelocityX(0);
                                rb.anims.play('rabbit_idle', true);
                            }
                        } else {
                            // 看板が消えた or CLOSE になった → 自動解放
                            freeRabbitShopkeeper(rb);
                        }
                        continue;
                    }

                    // === 通常ペット: プレイヤーについていく ===
                    if (distToPlayer > 60) {
                        const followDir = player.x > rb.x ? 1 : -1;
                        const followSpeed = distToPlayer > 200 ? 200 : 100;
                        rb.setVelocityX(followDir * followSpeed);
                        rb.setFlipX(followDir < 0);
                        rb.anims.play('rabbit_walk', true);
                        // 段差をジャンプで追従
                        if (rb.body.touching.down && (rb.body.touching.left || rb.body.touching.right || rb.body.blocked.left || rb.body.blocked.right)) {
                            rb.setVelocityY(-420);
                        }
                        // 離れすぎたらテレポート
                        if (distToPlayer > 400) {
                            rb.setPosition(player.x + (Math.random() < 0.5 ? -40 : 40), player.y - 20);
                        }
                    } else {
                        rb.setVelocityX(0);
                        rb.anims.play('rabbit_idle', true);
                    }
                    continue;
                }

                // === りんごを持っている → 近寄ってくる ===
                if (holdingApple && distToPlayer < 200) {
                    if (distToPlayer > 40) {
                        const approachDir = player.x > rb.x ? 1 : -1;
                        rb.setVelocityX(approachDir * 40);
                        rb.setFlipX(approachDir < 0);
                        rb.anims.play('rabbit_walk', true);
                    } else {
                        rb.setVelocityX(0);
                        rb.anims.play('rabbit_idle', true);
                    }
                    continue;
                }

                // === 通常AI ===
                let t = rb.getData('timer') + delta;
                rb.setData('timer', t);
                if (t > rb.getData('nextChange')) {
                    rb.setData('timer', 0);
                    rb.setData('nextChange', 1500 + Math.random() * 4000);
                    const roll = Math.random();
                    if (roll < 0.3) {
                        rb.setData('paused', true);
                        rb.setData('dir', 0);
                    } else {
                        rb.setData('paused', false);
                        rb.setData('dir', Math.random() < 0.5 ? -1 : 1);
                    }
                }
                // プレイヤーが近づくと逃げる（りんご無し）
                if (distToPlayer < 120) {
                    const fleeDir = rb.x < player.x ? -1 : 1;
                    rb.setData('dir', fleeDir);
                    rb.setData('paused', false);
                    rb.setVelocityX(fleeDir * 120);
                    rb.setFlipX(fleeDir < 0);
                    rb.anims.play('rabbit_walk', true);
                    if (rb.body.touching.down && Math.random() < 0.03) {
                        rb.setVelocityY(-420);
                    }
                    continue;
                }
                const dir = rb.getData('dir');
                if (dir !== 0 && !rb.getData('paused')) {
                    // 水を回避: 進行方向に水があれば方向転換
                    if (hasWaterAhead(rb, dir)) {
                        rb.setData('dir', -dir);
                        rb.setVelocityX(0);
                        rb.anims.play('rabbit_idle', true);
                        continue;
                    }
                    rb.setVelocityX(dir * 50);
                    rb.setFlipX(dir < 0);
                    rb.anims.play('rabbit_walk', true);
                    if (rb.body.touching.left || rb.body.touching.right || rb.body.blocked.left || rb.body.blocked.right) {
                        rb.setData('dir', -dir);
                        // 壁や池の縁にぶつかったらジャンプして乗り越える
                        if (rb.body.touching.down || rb.body.blocked.down) {
                            rb.setVelocityY(-420);
                        }
                    }
                } else {
                    rb.setVelocityX(0);
                    rb.anims.play('rabbit_idle', true);
                }
            }

            // 犬AI更新
            const holdingBone = inventory[activeSlotIndex] && inventory[activeSlotIndex].type === BLOCK_TYPES.BONE && inventory[activeSlotIndex].count > 0;
            for (const dg of dogs) {
                if (!dg.active) continue;
                const isTamed = dg.getData('tamed');
                const distToPlayer = Phaser.Math.Distance.Between(player.x, player.y, dg.x, dg.y);

                // === 仲間化済み: スライムがいれば戦闘、いなければプレイヤーについていく ===
                if (isTamed) {
                    // ♥アイコンを毎フレーム更新
                    const dgTamedIcon = dg.getData('tamedIcon');
                    if (dgTamedIcon && dgTamedIcon.active) {
                        dgTamedIcon.setPosition(dg.x, dg.y - 22);
                    }
                    // 近くのスライムを探す
                    let nearestSlime = null;
                    let nearestSlimeDist = DOG_ATTACK_RANGE;
                    for (const sl of slimes) {
                        if (!sl.active) continue;
                        const d = Phaser.Math.Distance.Between(dg.x, dg.y, sl.x, sl.y);
                        if (d < nearestSlimeDist) {
                            nearestSlimeDist = d;
                            nearestSlime = sl;
                        }
                    }

                    if (nearestSlime) {
                        // スライムに向かって突進（updateSlimes側で攻撃判定を処理）
                        const atkDir = nearestSlime.x > dg.x ? 1 : -1;
                        dg.setVelocityX(atkDir * 250);
                        dg.setFlipX(atkDir < 0);
                        dg.anims.play('dog_walk', true);
                        if (dg.body.touching.down && (dg.body.blocked.left || dg.body.blocked.right)) {
                            dg.setVelocityY(-420);
                        }
                    } else if (distToPlayer > 50) {
                        const followDir = player.x > dg.x ? 1 : -1;
                        const followSpeed = distToPlayer > 180 ? 220 : 110;
                        dg.setVelocityX(followDir * followSpeed);
                        dg.setFlipX(followDir < 0);
                        dg.anims.play('dog_walk', true);
                        if (dg.body.touching.down && (dg.body.touching.left || dg.body.touching.right || dg.body.blocked.left || dg.body.blocked.right)) {
                            dg.setVelocityY(-420);
                        }
                        if (distToPlayer > 400) {
                            dg.setPosition(player.x + (Math.random() < 0.5 ? -40 : 40), player.y - 20);
                        }
                    } else {
                        dg.setVelocityX(0);
                        dg.anims.play('dog_idle', true);
                    }
                    continue;
                }

                // === 骨を持っている → 近寄ってくる ===
                if (holdingBone && distToPlayer < 200) {
                    if (distToPlayer > 35) {
                        const approachDir = player.x > dg.x ? 1 : -1;
                        dg.setVelocityX(approachDir * 50);
                        dg.setFlipX(approachDir < 0);
                        dg.anims.play('dog_walk', true);
                    } else {
                        dg.setVelocityX(0);
                        dg.anims.play('dog_idle', true);
                    }
                    continue;
                }

                // === 通常AI（うさぎより落ち着きがある） ===
                let t = dg.getData('timer') + delta;
                dg.setData('timer', t);
                if (t > dg.getData('nextChange')) {
                    dg.setData('timer', 0);
                    dg.setData('nextChange', 2000 + Math.random() * 4000);
                    const roll = Math.random();
                    if (roll < 0.4) {
                        dg.setData('paused', true);
                        dg.setData('dir', 0);
                    } else {
                        dg.setData('paused', false);
                        dg.setData('dir', Math.random() < 0.5 ? -1 : 1);
                    }
                }
                // プレイヤーが近づいても逃げない（犬は人懐っこい）
                const dir = dg.getData('dir');
                if (dir !== 0 && !dg.getData('paused')) {
                    // 水を回避
                    if (hasWaterAhead(dg, dir)) {
                        dg.setData('dir', -dir);
                        dg.setVelocityX(0);
                        dg.anims.play('dog_idle', true);
                        continue;
                    }
                    dg.setVelocityX(dir * 40);
                    dg.setFlipX(dir < 0);
                    dg.anims.play('dog_walk', true);
                    if (dg.body.touching.left || dg.body.touching.right || dg.body.blocked.left || dg.body.blocked.right) {
                        dg.setData('dir', -dir);
                        // 壁や池の縁にぶつかったらジャンプして乗り越える
                        if (dg.body.touching.down || dg.body.blocked.down) {
                            dg.setVelocityY(-420);
                        }
                    }
                } else {
                    dg.setVelocityX(0);
                    dg.anims.play('dog_idle', true);
                }
            }

            // 鳥AI更新
            updateBirds(this, delta);

            // 商人AI更新
            for (const mc of merchants) {
                if (!mc.active) continue;
                let mt = mc.getData('timer') + delta;
                mc.setData('timer', mt);
                if (mt > mc.getData('nextChange')) {
                    mc.setData('timer', 0);
                    mc.setData('nextChange', 2000 + Math.random() * 5000);
                    const roll = Math.random();
                    if (roll < 0.4) {
                        mc.setData('paused', true);
                        mc.setData('dir', 0);
                    } else {
                        mc.setData('paused', false);
                        mc.setData('dir', Math.random() < 0.5 ? -1 : 1);
                    }
                }
                const mDir = mc.getData('dir');
                const spX = mc.getData('spawnX');
                // スポーン地点から離れすぎたら戻す
                if (Math.abs(mc.x - spX) > 150) {
                    mc.setData('dir', mc.x > spX ? -1 : 1);
                    mc.setData('paused', false);
                }
                if (mDir !== 0 && !mc.getData('paused')) {
                    // 水を回避
                    if (hasWaterAhead(mc, mDir)) {
                        mc.setData('dir', -mDir);
                        mc.setVelocityX(0);
                        mc.anims.play('merchant_idle', true);
                        continue;
                    }
                    mc.setVelocityX(mDir * 30);
                    mc.setFlipX(mDir < 0);
                    mc.anims.play('merchant_walk', true);
                    if (mc.body.blocked.left || mc.body.blocked.right) {
                        mc.setData('dir', -mDir);
                    }
                } else {
                    mc.setVelocityX(0);
                    mc.anims.play('merchant_idle', true);
                }

                // 吹き出し：プレイヤーが近くてショップ未開放のときだけ表示
                if (mc._talkBubble) {
                    const nearPlayer = Phaser.Math.Distance.Between(player.x, player.y, mc.x, mc.y) < 80;
                    const showBubble = nearPlayer && !isShopOpen;
                    mc._talkBubble.setVisible(showBubble);
                    if (showBubble) {
                        const bob = Math.sin(time * 0.003) * 3;
                        mc._talkBubble.setPosition(mc.x, mc.y - 34 + bob);
                    }
                }
            }

            // 商人ショップが開いている場合、距離チェック
            if (isShopOpen) {
                let anyClose = false;
                for (const mc of merchants) {
                    if (mc.active && Phaser.Math.Distance.Between(player.x, player.y, mc.x, mc.y) < 120) {
                        anyClose = true;
                        break;
                    }
                }
                if (!anyClose) closeShop();
            }

            // 客NPC更新
            updateCustomers(this, delta);

            // === レンジNPC更新 ===
            if (renji && renji.active) {
                renji._floatT = (renji._floatT || 0) + delta * 0.001;
                // 目標位置への移動
                if (renjiTargetX !== null && renjiTargetY !== null) {
                    const dx = renjiTargetX - renji._baseX;
                    const dy = renjiTargetY - renji._baseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 4) {
                        const speed = Math.min(dist, 1.5);
                        renji._baseX += (dx / dist) * speed;
                        renji._baseY += (dy / dist) * speed;
                    } else {
                        renji._baseX = renjiTargetX;
                        renji._baseY = renjiTargetY;
                        renjiTargetX = null;
                        renjiTargetY = null;
                    }
                }
                // ふわふわ浮遊
                renji.x = renji._baseX;
                renji.y = renji._baseY + Math.sin(renji._floatT * 2.2) * 4;
                // 吹き出し
                if (renji._talkBubble) {
                    const distToPlayer = Phaser.Math.Distance.Between(renji.x, renji.y, player.x, player.y);
                    const bob = Math.sin(renji._floatT * 2.2) * 4;
                    renji._talkBubble.setPosition(renji.x, renji.y - 36 + bob);
                    renji._talkBubble.setVisible(distToPlayer < 90 && !renjiDialog);
                }
            }

            // プレイヤーとブロックのインタラクション（破壊・設置）
            // ズーム中は新規作成されたオブジェクトもカメラ振り分け
            if (currentZoom !== 1.0 && uiCamera) assignCameraFilters(this);

            updateInteraction(this);
        }

        function updateInteraction(scene) {
            const MINE_RANGE = 150;
            let targetBlock = null;
            let validPointer = null;

            selector.setVisible(false).setDisplaySize(BLOCK_SIZE, BLOCK_SIZE);
            ghostSelector.setVisible(false).setDisplaySize(BLOCK_SIZE, BLOCK_SIZE);
            ghostSelector2.setVisible(false).setDisplaySize(BLOCK_SIZE, BLOCK_SIZE);
            ghostSelector3.setVisible(false).setDisplaySize(BLOCK_SIZE, BLOCK_SIZE);

            // 全てのマウス・タッチ入力を走査
            for (let p of scene.input.manager.pointers) {
                // UI操作エリア（画面下部左右、右上、クラフト）のタッチ判定を除外
                const isUI_Left = p.y > scene.scale.height - 150 && p.x < 300;
                const isUI_Right = p.y > scene.scale.height - 150 && p.x > scene.scale.width - 150;
                const isUI_TopRight = p.y < 150 && p.x > scene.scale.width - 150;
                const isUI_CraftArea = p.x > scene.scale.width - 100 && p.y > scene.scale.height / 2 - 50 && p.y < scene.scale.height / 2 + 50;
                const isUI_CraftPanel = isCraftPanelOpen && p.x > scene.scale.width - 250 && p.y > 100 && p.y < 500;
                const isUI_MenuPanel = isMenuOpen && p.x > scene.scale.width - 280 && p.y > 100 && p.y < 350;
                const isUI_WorkbenchPanel = isWorkbenchPanelOpen || isFurnacePanelOpen || isCookingPanelOpen || isShopOpen;
                // バッグが開いている場合、バッグUI領域のタッチのみブロック
                let isUI_BagPanel = false;
                if (isBagOpen && bagPanel) {
                    const bx = bagPanel.x;
                    const by = bagPanel.y;
                    const cols = 5;
                    const rows = Math.ceil(BAG_SIZE / cols);
                    const bw = cols * 52 + 26;
                    const bh = rows * 52 + 56;
                    isUI_BagPanel = p.x >= bx && p.x <= bx + bw && p.y >= by && p.y <= by + bh;
                }

                if ((isUI_Left || isUI_Right || isUI_TopRight || isUI_CraftArea || isUI_CraftPanel || isUI_MenuPanel || isUI_WorkbenchPanel || isUI_BagPanel) && p.isDown) continue;

                // メニューが開いている時にゲーム画面をタッチしたら閉じる
                if (isMenuOpen && p.isDown && !isUI_MenuPanel && !isUI_TopRight) {
                    isMenuOpen = false;
                    menuPanel.setVisible(false);
                }

                // カメラのズーム・スクロールを反映した正確なワールド座標を取得
                const cam = scene.cameras.main;
                const worldPt = cam.getWorldPoint(p.x, p.y);
                p._worldPtX = worldPt.x;
                p._worldPtY = worldPt.y;
                const dist = Phaser.Math.Distance.Between(player.x, player.y, worldPt.x, worldPt.y);
                if (dist <= MINE_RANGE) {
                    validPointer = p;
                    break;
                }
            }

            if (!validPointer) return;

            // === プレイヤー自身をクリック → 食べ物を食べる ===
            if (validPointer.isDown && validPointer.getDuration() < 300) {
                const pDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, player.x, player.y);
                if (pDist < 40) {
                    const item = inventory[activeSlotIndex];
                    if (item && item.type !== null && FOOD_ITEMS[item.type]) {
                        if (scene.time.now - lastActionTime > 500) {
                            lastActionTime = scene.time.now;
                            tryEatFood(scene);
                        }
                        return;
                    }
                }
            }

            // === 商人クリック判定 ===
            if (validPointer.isDown && validPointer.getDuration() < 300) {
                for (const mc of merchants) {
                    if (!mc.active) continue;
                    const mcDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, mc.x, mc.y);
                    const playerMcDist = Phaser.Math.Distance.Between(player.x, player.y, mc.x, mc.y);
                    if (mcDist < 30 && playerMcDist < 80) {
                        if (scene.time.now - lastActionTime > 400) {
                            lastActionTime = scene.time.now;
                            if (isShopOpen) {
                                closeShop();
                            } else {
                                openShop(scene, mc);
                            }
                        }
                        return;
                    }
                }
            }

            // === レンジクリック判定 ===
            if (validPointer.isDown && validPointer.getDuration() < 300 && renji && renji.active) {
                const rDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, renji.x, renji.y);
                const playerRDist = Phaser.Math.Distance.Between(player.x, player.y, renji.x, renji.y);
                if (rDist < 36 && playerRDist < 100) {
                    if (scene.time.now - lastActionTime > 400) {
                        lastActionTime = scene.time.now;
                        if (renjiDialog) {
                            closeRenjiDialog();
                        } else {
                            playSE('ui_click');
                            openRenjiDialog(scene);
                        }
                    }
                    return;
                }
            }

            // === 客NPCクリック判定 ===
            if (validPointer.isDown && validPointer.getDuration() < 300) {
                for (const c of customers) {
                    if (!c.sprite || !c.sprite.active || c.state !== 'hovering') continue;
                    const cDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, c.sprite.x, c.sprite.y);
                    const playerCDist = Phaser.Math.Distance.Between(player.x, player.y, c.sprite.x, c.sprite.y);
                    if (cDist < 30 && playerCDist < 100) {
                        if (scene.time.now - lastActionTime > 400) {
                            lastActionTime = scene.time.now;
                            openCustomerBuyPanel(scene, c);
                        }
                        return;
                    }
                }
            }

            // === 仲間うさぎクリック → 店番メニュー ===
            if (validPointer.isDown && validPointer.getDuration() < 300) {
                for (const rb of rabbits) {
                    if (!rb.active || !rb.getData('tamed')) continue;
                    const rbDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, rb.x, rb.y);
                    const playerRbDist = Phaser.Math.Distance.Between(player.x, player.y, rb.x, rb.y);
                    if (rbDist < 30 && playerRbDist < 100) {
                        // クリック位置に操作可能なブロックがある場合はブロック操作を優先
                        const _csx = Math.floor(validPointer._worldPtX / BLOCK_SIZE) * BLOCK_SIZE + BLOCK_SIZE / 2;
                        const _csy = Math.floor(validPointer._worldPtY / BLOCK_SIZE) * BLOCK_SIZE + BLOCK_SIZE / 2;
                        const _cb = bkGetAt(_csx, _csy);
                        if (_cb) {
                            const _cbt = _cb.getData('typeId');
                            // テーブル・チェスト・作業台・炉・看板・ドア・ベッドがあれば素通し
                            if (_cbt === BLOCK_TYPES.TABLE     || _cbt === BLOCK_TYPES.TABLE_L   ||
                                _cbt === BLOCK_TYPES.TABLE_R   || _cbt === BLOCK_TYPES.STORAGE_CHEST ||
                                _cbt === BLOCK_TYPES.WORKBENCH || _cbt === BLOCK_TYPES.FURNACE   ||
                                _cbt === BLOCK_TYPES.COOKING_TABLE ||
                                _cbt === BLOCK_TYPES.SIGN_OPEN || _cbt === BLOCK_TYPES.SIGN_CLOSE ||
                                _cbt === BLOCK_TYPES.STRAW_BED_L || _cbt === BLOCK_TYPES.STRAW_BED_R ||
                                _cbt === BLOCK_TYPES.DOOR_B    || _cbt === BLOCK_TYPES.DOOR_M    ||
                                _cbt === BLOCK_TYPES.DOOR_T) {
                                break; // ブロック操作に処理を渡す
                            }
                        }
                        if (scene.time.now - lastActionTime > 400) {
                            lastActionTime = scene.time.now;
                            showRabbitShopMenu(scene, rb);
                        }
                        return;
                    }
                }
            }

            // === うさぎへのりんご餌やり判定 ===
            if (validPointer.isDown) {
                const holdingAppleNow = inventory[activeSlotIndex] && inventory[activeSlotIndex].type === BLOCK_TYPES.APPLE && inventory[activeSlotIndex].count > 0;
                if (holdingAppleNow) {
                    for (const rb of rabbits) {
                        if (!rb.active || rb.getData('tamed')) continue;
                        const rbDist = Phaser.Math.Distance.Between(validPointer._worldPtX, validPointer._worldPtY, rb.x, rb.y);
                        const playerRbDist = Phaser.Math.Distance.Between(player.x, player.y, rb.x, rb.y);
                        if (rbDist < 30 && playerRbDist < 60) {
                            // りんごを1つ消費
                            inventory[activeSlotIndex].count--;
                            if (inventory[activeSlotIndex].count <= 0) {
                                inventory[activeSlotIndex] = { type: null, count: 0, texture: null };
                            }
                            updateInventoryUI();

                            // 友好度アップ
