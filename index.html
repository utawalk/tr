        // === 石窯クラフトUI ===
        let furnacePanel = null;
        let isFurnacePanelOpen = false;
        let activeFurnaceBlock = null; // 現在開いている石窯ブロック
        let activeFurnaces = [];       // バックグラウンド精錬中の石窯リスト

        // バックグラウンド精錬を更新（update内から毎フレーム呼ばれる）
        function updateFurnaces(scene, delta) {
            for (let i = activeFurnaces.length - 1; i >= 0; i--) {
                const af = activeFurnaces[i];
                if (!af.block || !af.block.active) { activeFurnaces.splice(i, 1); continue; }
                af.progress += delta;
                af.block.setData('furnaceProgress', af.progress);
                if (af.progress >= af.recipe.time) {
                    // 精錬完了
                    const ore = af.block.getData('furnaceOre');
                    const fuel = af.block.getData('furnaceFuel');
                    if (ore) {
                        ore.count -= af.recipe.inputCount;
                        if (ore.count <= 0) af.block.setData('furnaceOre', null);
                    }
                    if (fuel) {
                        fuel.count -= 1;
                        if (fuel.count <= 0) af.block.setData('furnaceFuel', null);
                    }
                    // 完成品をストックに追加
                    let result = af.block.getData('furnaceResult');
                    if (!result) result = { type: af.recipe.resultId, count: 0 };
                    result.count += af.recipe.resultCount;
                    af.block.setData('furnaceResult', result);
                    playSE('furnace_done');

                    // まだ鉱石と燃料が残っていれば次の精錬を自動開始
                    const oreLeft = af.block.getData('furnaceOre');
                    const fuelLeft = af.block.getData('furnaceFuel');
                    if (oreLeft && oreLeft.count >= af.recipe.inputCount && fuelLeft && fuelLeft.count > 0) {
                        af.progress = 0;
                        af.block.setData('furnaceProgress', 0);
                    } else {
                        af.block.setData('furnaceSmelting', false);
                        af.block.setData('furnaceProgress', 0);
                        activeFurnaces.splice(i, 1);
                    }
                }
            }
        }

        // 苗木の成長を更新（update内から毎フレーム呼ばれる）
        const SAPLING_GROW_TIME = 30000; // 30秒で木に成長
        function updateSaplings(scene, delta) {
            for (let i = saplings.length - 1; i >= 0; i--) {
                const sap = saplings[i];
                if (!sap.sprite || !sap.sprite.active) { saplings.splice(i, 1); continue; }
                sap.elapsed += delta;

                // 成長段階の視覚表現（スケールが徐々に大きくなる）
                const progress = Math.min(sap.elapsed / SAPLING_GROW_TIME, 1);
                const scale = 0.6 + progress * 0.4; // 0.6→1.0
                sap.sprite.setScale(scale);

                // 成長完了 → 木に変化
                if (sap.elapsed >= SAPLING_GROW_TIME) {
                    const sapX = sap.sprite.x;
                    const sapY = sap.sprite.y;

                    // 苗木を削除
                    sap.sprite.destroy();
                    saplings.splice(i, 1);

                    // 木を生成（幹3〜5ブロック）
                    const blockSize = 16;
                    const trunkHeight = 3 + Math.floor(Math.random() * 3);
                    const baseX = sapX;
                    const baseY = sapY;

                    for (let h = 1; h <= trunkHeight; h++) {
                        const bData = BLOCK_DATA[BLOCK_TYPES.WOOD];
                        const trunk = platforms.create(baseX, baseY - h * blockSize, bData.texture, bData.frame);
                        trunk.setData('typeId', BLOCK_TYPES.WOOD);
                        trunk.setData('hp', bData.hp);
                    }

                    const topY = baseY - trunkHeight * blockSize;
                    const leafPositions = [
                        [-1, -2], [0, -2], [1, -2],
                        [-2, -1], [-1, -1], [0, -1], [1, -1], [2, -1],
                        [-2,  0], [-1,  0], [0,  0], [1,  0], [2,  0],
                        [-1,  1], [0,  1], [1,  1]
                    ];
                    for (const [dx, dy] of leafPositions) {
                        const lx = baseX + dx * blockSize;
                        const ly = topY + dy * blockSize;
                        // 既に別ブロックがある位置はスキップ（blockMap衝突を汎用的に防ぐ）
                        if (bkGetAt(lx, ly)) continue;
                        const bData = BLOCK_DATA[BLOCK_TYPES.LEAF];
                        const leaf = platforms.create(lx, ly, bData.texture, bData.frame);
                        leaf.setData('typeId', BLOCK_TYPES.LEAF);
                        leaf.setData('hp', bData.hp);

                        // りんごも付ける（apple位置も空きチェック）
                        if (dy >= 0 && dx !== 0 && Math.random() < 0.20) {
                            const ay = ly + blockSize;
                            if (!bkGetAt(lx, ay)) {
                                const aData = BLOCK_DATA[BLOCK_TYPES.APPLE];
                                const apple = platforms.create(lx, ay, aData.texture, aData.frame);
                                apple.setData('typeId', BLOCK_TYPES.APPLE);
                                apple.setData('hp', aData.hp);
                            }
                        }
                    }
                    playSE('place');
                }
            }
        }

        // 小麦の成長を更新（update内から毎フレーム呼ばれる）
        const WHEAT_STAGE1_TIME = 15000; // 15秒で第2段階
        const WHEAT_STAGE2_TIME = 30000; // 30秒で成熟
        function updateWheatCrops(scene, delta) {
            for (let i = wheatCrops.length - 1; i >= 0; i--) {
                const crop = wheatCrops[i];
                if (!crop.sprite || !crop.sprite.active) { wheatCrops.splice(i, 1); continue; }
                crop.elapsed += delta;

                const typeId = crop.sprite.getData('typeId');
                if (typeId === BLOCK_TYPES.WHEAT_STAGE1 && crop.elapsed >= WHEAT_STAGE1_TIME) {
                    // 第2段階に成長
                    const s2 = BLOCK_DATA[BLOCK_TYPES.WHEAT_STAGE2];
                    crop.sprite.setFrame(s2.frame);
                    crop.sprite.setData('typeId', BLOCK_TYPES.WHEAT_STAGE2);
                } else if (typeId === BLOCK_TYPES.WHEAT_STAGE2 && crop.elapsed >= WHEAT_STAGE2_TIME) {
                    // 成熟
                    const s3 = BLOCK_DATA[BLOCK_TYPES.WHEAT];
                    crop.sprite.setFrame(s3.frame);
                    crop.sprite.setData('typeId', BLOCK_TYPES.WHEAT);
                    wheatCrops.splice(i, 1); // 成熟したら成長管理から外す
                }
            }
        }

        function openFurnacePanel(scene, block) {
            if (isFurnacePanelOpen) return;
            isFurnacePanelOpen = true;
            activeFurnaceBlock = block;

            // ブロックから状態を読み取る
            let oreItem = block.getData('furnaceOre') || null;
            let fuelItem = block.getData('furnaceFuel') || null;
            let resultItem = block.getData('furnaceResult') || null;
            let smelting = block.getData('furnaceSmelting') || false;
            let smeltProgress = block.getData('furnaceProgress') || 0;
            let currentRecipe = null;
            if (smelting && oreItem) {
                currentRecipe = FURNACE_RECIPES.find(r => r.inputId === oreItem.type);

        // バックグラウンド調理更新
        function updateCookingTables(scene, delta) {
            for (let i = activeCookingTables.length - 1; i >= 0; i--) {
                const ac = activeCookingTables[i];
                if (!ac.block || !ac.block.active) { activeCookingTables.splice(i, 1); continue; }
                ac.progress += delta;
                ac.block.setData('cookingProgress', ac.progress);
                if (ac.progress >= ac.recipe.time) {
                    // 調理完了
                    const wheat = ac.block.getData('cookingWheat');
                    const fuel  = ac.block.getData('cookingFuel');
                    if (wheat) {
                        wheat.count -= ac.recipe.inputCount;
                        if (wheat.count <= 0) ac.block.setData('cookingWheat', null);
                    }
                    if (fuel) {
                        fuel.count -= 1;
                        if (fuel.count <= 0) ac.block.setData('cookingFuel', null);
                    }
                    let result = ac.block.getData('cookingResult');
                    if (!result) result = { type: ac.recipe.resultId, count: 0 };
                    result.count += ac.recipe.resultCount;
                    ac.block.setData('cookingResult', result);
                    playSE('furnace_done');

                    const wheatLeft = ac.block.getData('cookingWheat');
                    const fuelLeft  = ac.block.getData('cookingFuel');
                    if (wheatLeft && wheatLeft.count >= ac.recipe.inputCount && fuelLeft && fuelLeft.count > 0) {
                        ac.progress = 0;
                        ac.block.setData('cookingProgress', 0);
                    } else {
                        ac.block.setData('cookingSmelting', false);
                        ac.block.setData('cookingProgress', 0);
                        activeCookingTables.splice(i, 1);
                    }
                }
            }
        }

        function craftItem(recipe, btnBox, scene) {
            let canCraft = true;
            for (const mat of recipe.materials) {
                let totalMatCount = 0;
                for (let i = 0; i < INVENTORY_SIZE; i++) {
                    if (inventory[i].type === mat.id) totalMatCount += inventory[i].count;
                }
                if (totalMatCount < mat.count) {
                    canCraft = false;
                    break;
                }
            }
            
            if (!canCraft) {
                // 素材不足を視覚的に伝えるため赤く瞬かせる
                playSE('ui_error');
                btnBox.setFillStyle(0xff0000);
                scene.time.delayedCall(150, () => { btnBox.setFillStyle(0x444444); });
                return;
            }

            // 成功を視覚的に伝えるため緑に瞬かせる
            playSE('ui_success');
            btnBox.setFillStyle(0x00ff00);
            scene.time.delayedCall(150, () => { btnBox.setFillStyle(0x444444); });

            for (const mat of recipe.materials) {
                let remaining = mat.count;
                for (let i = 0; i < INVENTORY_SIZE; i++) {
                    if (inventory[i].type === mat.id && inventory[i].count > 0) {
                        if (inventory[i].count >= remaining) {
                            inventory[i].count -= remaining;
                            remaining = 0;
                        } else {
                            remaining -= inventory[i].count;
                            inventory[i].count = 0;
                        }
                        if (inventory[i].count === 0) {
                            inventory[i].type = null;
                            inventory[i].texture = null;
                        }
                        if (remaining <= 0) break;
                    }
                }
            }

            // BLOCK_DATA → WALL_DATA → DECO_DEFS の順でテクスチャを取得
            const _rBData = BLOCK_DATA[recipe.resultId];
            const _rWData = WALL_DATA[recipe.resultId];
            const _rDData = DECO_DEFS[recipe.resultId];
            const resultTexture = _rBData ? _rBData.texture : (_rWData ? _rWData.texture : (_rDData ? _rDData.texture : 'tileset'));
            const resultFrame   = _rBData ? _rBData.frame   : undefined;
            addInventoryItem(recipe.resultId, recipe.resultCount, resultTexture, resultFrame);
            updateInventoryUI();
        }

                const cat = ENCYCLOPEDIA_CATEGORIES[catIndex];
                const entries = ENCYCLOPEDIA.filter(e => cat.types.has(e.type));

                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    // BLOCK_DATA → WALL_DATA → DECO_DEFS の順で参照
                    const bData = BLOCK_DATA[entry.type] || null;
                    const wData = WALL_DATA[entry.type] || null;
                    const dData = DECO_DEFS[entry.type] || null;
                    const iconTexture = bData ? (bData.iconTexture || bData.texture) : (wData ? wData.texture : (dData ? dData.texture : null));
                    const iconFrame = (bData && bData.iconTexture) ? undefined : (bData ? bData.frame : undefined);
                    const yPos = listTop + i * rowH;

                    const rowBg = scene.add.rectangle(panelX, yPos + rowH / 2 - 5, panelW - 30, rowH - 4,

                        fontSize: '15px', color: '#ffffff', fontStyle: 'bold'
                    }).setScrollFactor(0);
                    listContainer.add(nameText);

                        fontSize: '11px', color: '#aaaacc', wordWrap: { width: panelW - 100 }

                    listContainer.add(descText);

                const totalH = entries.length * rowH;
                maxScroll = Math.max(0, totalH - visibleH);

                const cat = ENCYCLOPEDIA_CATEGORIES[t];

                tBg.on('pointerdown', () => {
                    if (activeTab === t) return;

                    renderList(t);
                });

                encyclopediaOverlay.add(tBg);
                encyclopediaOverlay.add(tTxt);
                tabBgs.push(tBg);
                tabTexts.push(tTxt);

                scrollY = Phaser.Math.Clamp(dragScrollStart + delta, 0, maxScroll);

            });

            encyclopediaOverlay.setData('wheelHandler', wheelHandler);
            encyclopediaOverlay.setData('maskShape', maskShape);
            if (uiCamera) assignCameraFilters(scene);
        }

            const tabStartX = panelX - panelW / 2 + 10;

            let tabBgs = [];
            let tabTexts = [];
            let activeTab = 0;

            // リスト表示エリア
            const listTop = tabY + tabH + 8;
            const rowH = 50;
            const listLeft = panelX - panelW / 2 + 20;
            const visibleH = (panelY + panelH / 2 - 10) - listTop;

            const maskShape = scene.make.graphics();
            maskShape.setScrollFactor(0);
            maskShape.fillRect(panelX - panelW / 2, listTop, panelW, visibleH);
            const mask = maskShape.createGeometryMask();

            let listContainer = scene.add.container(0, 0).setScrollFactor(0);
            listContainer.setMask(mask);
            creatureBookOverlay.add(listContainer);

            let scrollY = 0;
            let maxScroll = 0;

            function renderList(catIndex) {
                listContainer.removeAll(true);
                scrollY = 0;
                listContainer.setY(0);

                const cat = CREATURE_BOOK_CATEGORIES[catIndex];
                const entries = CREATURE_BOOK.filter(e => e.category === cat.key);

                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    const yPos = listTop + i * rowH;

                    const rowBg = scene.add.rectangle(panelX, yPos + rowH / 2 - 5, panelW - 30, rowH - 4,
                        i % 2 === 0 ? 0x223322 : 0x1a2a1a, 0.7).setScrollFactor(0);
                    listContainer.add(rowBg);

                    const icon = scene.add.image(listLeft + 16, yPos + rowH / 2 - 5, entry.texture, entry.frame)
                        .setDisplaySize(32, 32).setScrollFactor(0);
                    listContainer.add(icon);

                    const nameText = scene.add.text(listLeft + 42, yPos + 2, entry.name, {
                        fontSize: '15px', color: '#ffffff', fontStyle: 'bold'
                    }).setScrollFactor(0);
                    listContainer.add(nameText);

                    const descText = scene.add.text(listLeft + 42, yPos + 22, entry.desc, {
                        fontSize: '11px', color: '#aaccaa', wordWrap: { width: panelW - 100 }
                    }).setScrollFactor(0);
                    listContainer.add(descText);
                }

                const totalH = entries.length * rowH;
                maxScroll = Math.max(0, totalH - visibleH);
            }

            // タブUI
            for (let t = 0; t < tabCount; t++) {
                const cat = CREATURE_BOOK_CATEGORIES[t];
                const tx = tabStartX + t * tabW + tabW / 2;

                const tBg = scene.add.rectangle(tx, tabY, tabW - 4, tabH, 0x223322, 0.8)
                    .setScrollFactor(0).setInteractive({ useHandCursor: true }).setStrokeStyle(1, 0x446644);
                const tTxt = scene.add.text(tx, tabY, cat.name, {
                    fontSize: '12px', color: '#aaccaa', fontStyle: 'bold'
                }).setOrigin(0.5).setScrollFactor(0);

                tBg.on('pointerdown', () => {
                    if (activeTab === t) return;
                    playSE('ui_click');
                    activeTab = t;
                    updateTabVisuals();
                    renderList(t);
                });

                creatureBookOverlay.add(tBg);
                creatureBookOverlay.add(tTxt);
                tabBgs.push(tBg);
                tabTexts.push(tTxt);
            }

            function updateTabVisuals() {
                for (let t = 0; t < tabCount; t++) {
                    const cat = CREATURE_BOOK_CATEGORIES[t];
                    if (t === activeTab) {
                        tabBgs[t].setFillStyle(0x336633, 1);
                        tabBgs[t].setStrokeStyle(2, cat.color);
                        tabTexts[t].setColor('#ffffff');
                    } else {
                        tabBgs[t].setFillStyle(0x223322, 0.8);
                        tabBgs[t].setStrokeStyle(1, 0x446644);
                        tabTexts[t].setColor('#aaccaa');
                    }
                }
            }

            updateTabVisuals();
            renderList(0);

            // スクロール処理
            const doScroll = (deltaY) => {
                scrollY = Phaser.Math.Clamp(scrollY + deltaY, 0, maxScroll);
                listContainer.setY(-scrollY);
            };

            const wheelHandler = (pointer, gameObjects, dx, dy) => {
                if (!isCreatureBookOpen) return;
                doScroll(dy > 0 ? 40 : -40);
            };
            scene.input.on('wheel', wheelHandler);

            let dragStartY = 0;
            let dragScrollStart = 0;
            dimBg.on('pointerdown', (pointer) => {
                dragStartY = pointer.y;
                dragScrollStart = scrollY;
            });
            dimBg.on('pointermove', (pointer) => {
                if (!pointer.isDown) return;
                const delta = dragStartY - pointer.y;
                scrollY = Phaser.Math.Clamp(dragScrollStart + delta, 0, maxScroll);
                listContainer.setY(-scrollY);
            });

            creatureBookOverlay.setData('wheelHandler', wheelHandler);
            creatureBookOverlay.setData('maskShape', maskShape);
            if (uiCamera) assignCameraFilters(scene);
        }

        function saveGame(scene) {
            const blocks = platforms.getChildren();
            const savedBlocks = blocks
                .filter(b => b.active)
                .map(b => {
                    const entry = {
                        x: b.x,
                        y: b.y,
                        typeId: b.getData('typeId'),
                        hp: b.getData('hp'),
                        doorOpen: b.getData('doorOpen') || false
                    };
                    if (b.getData('typeId') === BLOCK_TYPES.STAIR) {
                        entry.stairFlipped = b.getData('stairFlipped') || false;
                    }
                    return entry;
                });

            const savedTorches = torches.map(t => ({ x: t.x, y: t.y, type: t.type || BLOCK_TYPES.TORCH }));

            const savedInventory = inventory.map(item => ({
                type: item.type,
                count: item.count,
                texture: item.texture,
                frame: item.frame !== undefined ? item.frame : null
            }));
            const savedBag = bag.map(item => ({
                type: item.type,
                count: item.count,
                texture: item.texture,
                frame: item.frame !== undefined ? item.frame : null
            }));

            const savedSaplings = saplings
                .filter(s => s.sprite && s.sprite.active)
                .map(s => ({ x: s.sprite.x, y: s.sprite.y, elapsed: s.elapsed }));

            const savedWheatCrops = wheatCrops
                .filter(c => c.sprite && c.sprite.active)
                .map(c => ({ x: c.sprite.x, y: c.sprite.y, elapsed: c.elapsed }));

            const savedTableItems = tableItems
                .filter(ti => ti.tableBlock && ti.tableBlock.active)
                .map(ti => ({ tx: ti.tableBlock.x, ty: ti.tableBlock.y, itemType: ti.itemType, itemCount: ti.itemCount }));

            // チェスト中身を保存
            const savedChests = {};
            for (const key in chestContents) {
                const items = chestContents[key];
                const hasItems = items.some(it => it.type !== null && it.count > 0);
                if (hasItems) {
                    savedChests[key] = items.map(it => ({ type: it.type, count: it.count, texture: it.texture, frame: it.frame }));
                }
            }

            // 商人を保存
            const savedMerchants = merchants
                .filter(mc => mc.active)
                .map(mc => ({
                    x: Math.round(mc.x),
                    y: Math.round(mc.y),
                    spawnX: mc.getData('spawnX'),
                    shopItems: mc.getData('shopItems')
                }));

            // うさぎを保存
            const savedRabbits = rabbits
                .filter(rb => rb.active)
                .map(rb => ({
                    x: Math.round(rb.x),
                    y: Math.round(rb.y),
                    tamed: rb.getData('tamed'),
                    friendship: rb.getData('friendship') || 0,
                    colorIndex: rb.getData('colorIndex') !== undefined ? rb.getData('colorIndex') : 0
                }));

            // 犬を保存
            const savedDogs = dogs
                .filter(dg => dg.active)
                .map(dg => ({
                    x: Math.round(dg.x),
                    y: Math.round(dg.y),
                    tamed: dg.getData('tamed'),
                    colorIndex: dg.getData('colorIndex') !== undefined ? dg.getData('colorIndex') : 0
                }));

            // 壁紙を保存
            const savedWalls = [];
            for (const [key, wall] of wallMap) {
                if (wall && wall.sprite && wall.sprite.active) {
                    savedWalls.push({ x: wall.sprite.x, y: wall.sprite.y, type: wall.type });
                }
            }

            // 装飾を保存（アンカー座標とタイプのみ保存、cellsは復元時に再計算）
            const savedDecos = [];
            for (const [key, deco] of decoMap) {
                if (deco && deco.sprite && deco.sprite.active) {
                    savedDecos.push({ anchorX: deco.anchorX, anchorY: deco.anchorY, type: deco.type });
                }
            }

            const saveData = {
                blocks: savedBlocks,
                torches: savedTorches,
                walls: savedWalls,
                decos: savedDecos,
                inventory: savedInventory,
                bag: savedBag,
                saplings: savedSaplings,
                wheatCrops: savedWheatCrops,
                tableItems: savedTableItems,
                chests: savedChests,
                merchants: savedMerchants,
                rabbits: savedRabbits,
                dogs: savedDogs,
                homePosition: homePosition,
                money: playerMoney,
                activeSlot: activeSlotIndex,
                playerX: Math.round(player.x),
                playerY: Math.round(player.y),
                playerHP: playerHP,
                playerMaxHearts: playerMaxHearts
            };

            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
                const saveText = scene.add.text(scene.scale.width / 2, scene.scale.height / 2 - 50, 'SAVED!', {
                    fontSize: '36px', color: '#00ff00', fontStyle: 'bold',
                    stroke: '#000', strokeThickness: 5
                }).setOrigin(0.5).setScrollFactor(0).setDepth(300);
                scene.tweens.add({
                    targets: saveText,
                    y: saveText.y - 60,
                    alpha: 0,
                    duration: 1500,
                    onComplete: () => saveText.destroy()
                });
            } catch (e) {
                console.error('Save failed:', e);
            }
        }

        // ドラッグ＆ドロップ用
        let dragSlotIndex = -1;
        let dragIcon = null;
        let isDragging = false;

        function createInventoryUI(scene) {
            const slotSize = 50;
            const padding = 10;
            const startX = scene.scale.width / 2 - (INVENTORY_SIZE * (slotSize + padding)) / 2 + slotSize / 2;
            const y = 40;

            // ドラッグ用アイコン（1度だけ作成）
            dragIcon = scene.add.image(0, 0, 'tileset', 0)
                .setDisplaySize(36, 36).setScrollFactor(0).setDepth(160).setVisible(false).setAlpha(0.8);

            for (let i = 0; i < INVENTORY_SIZE; i++) {
                const x = startX + i * (slotSize + padding);

                const bg = scene.add.rectangle(x, y, slotSize, slotSize, 0x000000, 0.5)
                    .setScrollFactor(0).setDepth(100).setInteractive();

                const border = scene.add.rectangle(x, y, slotSize, slotSize)
                    .setStrokeStyle(2, 0x888888).setScrollFactor(0).setDepth(101);

                const icon = scene.add.image(x, y, 'dirt')
                    .setDisplaySize(32, 32).setScrollFactor(0).setDepth(102).setVisible(false);

                const text = scene.add.text(x + slotSize/2 - 5, y + slotSize/2 - 5, '0',
                    { fontSize: '18px', color: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 })
                    .setOrigin(1, 1).setScrollFactor(0).setDepth(103).setVisible(false);

                bg.on('pointerdown', (pointer, localX, localY, event) => {
                    setActiveSlot(i);
                    // ドラッグ開始
                    if (inventory[i].count > 0) {
                        dragSlotIndex = i;
                        isDragging = false; // まだ移動していない
                    }
                    event.stopPropagation();
                });

                bg.on('pointerover', () => {
                    const item = inventory[i];
                    if (item && item.type !== null && item.count > 0 && !isDragging) {
                        const name = ITEM_NAMES[item.type] || '???';
                        if (!tooltipText) {
                            tooltipText = scene.add.text(0, 0, '', {
                                fontSize: '13px', color: '#fff', backgroundColor: '#000000cc',
                                padding: { x: 6, y: 3 }
                            }).setScrollFactor(0).setDepth(150).setOrigin(0.5, 0);
                        }
                        tooltipText.setText(name);
                        tooltipText.setPosition(x, y + slotSize / 2 + 4);
                        tooltipText.setVisible(true);
                    }
                });

                bg.on('pointerout', () => {
                    if (tooltipText) tooltipText.setVisible(false);
                });

                inventoryUI.push({ bg, border, icon, text, slotSize, padding });
            }

            // ドラッグ中のマウス移動
            scene.input.on('pointermove', (pointer) => {
                if (dragSlotIndex < 0) return;
                const item = inventory[dragSlotIndex];
                if (!item || item.count <= 0) { dragSlotIndex = -1; return; }
                // 一定距離動いたらドラッグ開始
                if (!isDragging) {
                    isDragging = true;
                    const bd = BLOCK_DATA[item.type];
                    if (bd) {
                        dragIcon.setTexture(bd.texture, bd.frame).setVisible(true);
                    }
                    if (tooltipText) tooltipText.setVisible(false);
                }
                dragIcon.setPosition(pointer.x, pointer.y);
            });

            // ドロップ
            scene.input.on('pointerup', (pointer) => {
                if (dragSlotIndex < 0 || !isDragging) {
                    dragSlotIndex = -1;
                    isDragging = false;
                    dragIcon.setVisible(false);
                    return;
                }
                // ドロップ先のスロットを判定
                let dropIndex = -1;
                for (let j = 0; j < INVENTORY_SIZE; j++) {
                    const ui = inventoryUI[j];
                    const half = slotSize / 2;
                    if (pointer.x >= ui.bg.x - half && pointer.x <= ui.bg.x + half &&
                        pointer.y >= ui.bg.y - half && pointer.y <= ui.bg.y + half) {
                        dropIndex = j;
                        break;
                    }
                }
                if (dropIndex >= 0 && dropIndex !== dragSlotIndex) {
                    // スロット入れ替え
                    const tmp = { ...inventory[dragSlotIndex] };
                    inventory[dragSlotIndex] = { ...inventory[dropIndex] };
                    inventory[dropIndex] = tmp;
                    playSE('ui_click');
                    updateInventoryUI();
                }
                dragSlotIndex = -1;
                isDragging = false;
                dragIcon.setVisible(false);
            });

            updateInventoryUI();
            
            // 数字キー(1-5)での選択
            scene.input.keyboard.on('keydown', (event) => {
                // ESCで図鑑・ダイアログを閉じる
                if (event.key === 'Escape' && renjiDialog) {
                    closeRenjiDialog();
                    return;
                }
                if (event.key === 'Escape' && isCreatureBookOpen) {
                    closeCreatureBook(scene);
                    return;
                }
                if (event.key === 'Escape' && isEncyclopediaOpen) {
                    closeEncyclopedia(scene);
                    return;
                }
                if (event.key === '0') {
                    setActiveSlot(9); // 0キー = 10番目のスロット
                } else if (event.key === 'e' || event.key === 'E') {
                    tryEatFood(scene);
                } else {
                    const key = parseInt(event.key);
                    if (key >= 1 && key <= 9) {
                        setActiveSlot(key - 1);
                    }
                }
            });

            // マウスホイールでの選択 / Ctrl+ホイールでズーム
            scene.input.on('wheel', (pointer, gameObjects, deltaX, deltaY) => {
                if (pointer.event.ctrlKey || pointer.event.metaKey) {
                    pointer.event.preventDefault();
                    if (deltaY < 0) {
                        applyZoom(scene, Math.min(ZOOM_MAX, currentZoom + ZOOM_STEP));
                    } else if (deltaY > 0) {
                        applyZoom(scene, Math.max(ZOOM_MIN, currentZoom - ZOOM_STEP));
                    }
                    return;
                }
                if (deltaY > 0) {
                    setActiveSlot((activeSlotIndex + 1) % INVENTORY_SIZE);
                } else if (deltaY < 0) {
                    setActiveSlot((activeSlotIndex - 1 + INVENTORY_SIZE) % INVENTORY_SIZE);
                }
            });
        }

        function setActiveSlot(index) {
            if (index >= 0 && index < INVENTORY_SIZE) {
                activeSlotIndex = index;
                updateInventoryUI();
            }
        }

        function updateInventoryUI() {
            for (let i = 0; i < INVENTORY_SIZE; i++) {
                const ui = inventoryUI[i];
                const item = inventory[i];

                if (i === activeSlotIndex) {
                    ui.border.setStrokeStyle(4, 0xffff00);
                } else {
                    ui.border.setStrokeStyle(2, 0x888888);
                }

                if (item.count > 0 && item.texture) {
                    ui.icon.setTexture(item.texture);
                    if (item.frame !== undefined) ui.icon.setFrame(item.frame);
                    ui.icon.setVisible(true);
                    ui.text.setText(item.count.toString());
                    ui.text.setVisible(true);
                } else {
                    ui.icon.setVisible(false);
                    ui.text.setVisible(false);
                }
            }
        }

        // テーブル上の個数テキストを更新するヘルパー
        function updateTableItemCountText(ti) {
            if (!ti.countText) return;
            ti.countText.setText(String(ti.itemCount));
            ti.countText.setVisible(ti.itemCount > 1);
        }

        function addInventoryItem(type, amount, texture, frame) {
            // iconTextureが定義されているブロックはアイコン用テクスチャを使用
            const _iconBData = BLOCK_DATA[type];
            if (_iconBData && _iconBData.iconTexture) {
                texture = _iconBData.iconTexture;
                frame = undefined;
            }
            // まずインベントリで同種スタック
            for (let i = 0; i < INVENTORY_SIZE; i++) {
                if (inventory[i].type === type) {
                    inventory[i].count += amount;
                    updateInventoryUI();
                    return;
                }
            }
            // バッグで同種スタック
            for (let i = 0; i < BAG_SIZE; i++) {
                if (bag[i].type === type) {
                    bag[i].count += amount;
                    updateInventoryUI();
                    if (isBagOpen) updateBagUI();
                    return;
                }
            }
            // インベントリの空きスロット
            for (let i = 0; i < INVENTORY_SIZE; i++) {
                if (inventory[i].count === 0) {
                    inventory[i].type = type;
                    inventory[i].texture = texture;
                    inventory[i].frame = frame;
                    inventory[i].count = amount;
                    updateInventoryUI();
                    return;
                }
            }
            // バッグの空きスロット
            for (let i = 0; i < BAG_SIZE; i++) {
                if (bag[i].count === 0) {
                    bag[i].type = type;
                    bag[i].texture = texture;
                    bag[i].frame = frame;
                    bag[i].count = amount;
                    if (isBagOpen) updateBagUI();
                    return;
                }
            }
        }

            if (inventoryUI.length === 0) return;
            const slotSize = inventoryUI[0].slotSize;
            const padding = inventoryUI[0].padding;
            const startX = width / 2 - (INVENTORY_SIZE * (slotSize + padding)) / 2 + slotSize / 2;
            const y = 40;

            for (let i = 0; i < INVENTORY_SIZE; i++) {
                const x = startX + i * (slotSize + padding);
                const ui = inventoryUI[i];
                ui.bg.setPosition(x, y);
                ui.border.setPosition(x, y);
                ui.icon.setPosition(x, y);
                ui.text.setPosition(x + slotSize/2 - 5, y + slotSize/2 - 5);
            }

            if (tooltipText) tooltipText.setVisible(false);
        }

        // === ミニマップ ===
        const MINIMAP_W = 180, MINIMAP_H = 134;
        const MINIMAP_X = 10, MINIMAP_Y = 30;

        // ブロックタイプ→色マッピング
        const MINIMAP_COLORS = {
            [BLOCK_TYPES.GRASS]: [76, 153, 0],

            [BLOCK_TYPES.IRON]: [200, 200, 210],

            [BLOCK_TYPES.CHEST]: [180, 140, 50],
            [BLOCK_TYPES.CHEST_OPEN]: [180, 140, 50],
            [BLOCK_TYPES.STORAGE_CHEST]: [160, 120, 40],

            [BLOCK_TYPES.FURNACE]: [180, 80, 40],
            [BLOCK_TYPES.TABLE]: [140, 100, 60],

            [BLOCK_TYPES.HALF_BLOCK]:    [139,  90,  43],
            [BLOCK_TYPES.COOKING_TABLE]: [180, 120,  60],
            [BLOCK_TYPES.BREAD]:         [210, 170,  80],
            [BLOCK_TYPES.TABLE_L]:       [160, 110,  55],
            [BLOCK_TYPES.TABLE_R]:       [160, 110,  55],

        const MINIMAP_DEFAULT_COLOR = [110, 80, 50];

        function createMinimap(scene) {
            // オフスクリーンキャンバスでミニマップ描画
            minimapCanvas = document.createElement('canvas');
            minimapCanvas.width = MINIMAP_W;
            minimapCanvas.height = MINIMAP_H;

            // Phaserテクスチャとして登録
            if (scene.textures.exists('minimap_tex')) scene.textures.remove('minimap_tex');
            minimapTexture = scene.textures.createCanvas('minimap_tex', MINIMAP_W, MINIMAP_H);

            // 背景（半透明の暗い矩形）
            const mmBg = scene.add.rectangle(
                MINIMAP_X + MINIMAP_W / 2, MINIMAP_Y + MINIMAP_H / 2,
                MINIMAP_W + 4, MINIMAP_H + 4, 0x000000, 0.65
            ).setScrollFactor(0).setDepth(101);

            // ミニマップ画像
            minimapImage = scene.add.image(MINIMAP_X + MINIMAP_W / 2, MINIMAP_Y + MINIMAP_H / 2, 'minimap_tex')
                .setScrollFactor(0).setDepth(102);

            // 枠線
            minimapBorder = scene.add.rectangle(
                MINIMAP_X + MINIMAP_W / 2, MINIMAP_Y + MINIMAP_H / 2,
                MINIMAP_W + 2, MINIMAP_H + 2
            ).setScrollFactor(0).setDepth(103).setFillStyle(0x000000, 0).setStrokeStyle(2, 0x8888aa);

            // カメラ範囲表示用の矩形
            minimapViewRect = scene.add.rectangle(0, 0, 10, 10)
                .setScrollFactor(0).setDepth(104).setFillStyle(0xffffff, 0.12).setStrokeStyle(1, 0xffffff, 0.6);

            // プレイヤードット
            minimapPlayerDot = scene.add.circle(0, 0, 3, 0xff3333)
                .setScrollFactor(0).setDepth(105).setStrokeStyle(1, 0xffffff);

            // 初回描画
            redrawMinimapTerrain(scene);
        }

        function redrawMinimapTerrain(scene) {
            if (!minimapCanvas) return;
            const ctx = minimapCanvas.getContext('2d');
            const ww = 6000, wh = 3552;
            const scaleX = MINIMAP_W / ww;
            const scaleY = MINIMAP_H / wh;

            // 背景: 空は青系、地下は暗い茶色
            const groundPixelY = Math.floor(768 * scaleY);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, MINIMAP_W, MINIMAP_H);
            ctx.fillStyle = '#334466';
            ctx.fillRect(0, 0, MINIMAP_W, groundPixelY);

            // ブロックを描画
            const children = platforms.getChildren();
            for (let i = 0; i < children.length; i++) {
                const blk = children[i];
                if (!blk.active) continue;
                const tid = blk.getData('typeId');
                const col = MINIMAP_COLORS[tid] || MINIMAP_DEFAULT_COLOR;
                const mx = Math.floor(blk.x * scaleX);
                const my = Math.floor(blk.y * scaleY);
                ctx.fillStyle = 'rgb(' + col[0] + ',' + col[1] + ',' + col[2] + ')';
                ctx.fillRect(mx, my, Math.max(1, Math.ceil(32 * scaleX)), Math.max(1, Math.ceil(32 * scaleY)));
            }

            // 松明・ランタンも描画
            for (let i = 0; i < torches.length; i++) {
                const t = torches[i];
                const mx = Math.floor(t.x * scaleX);
                const my = Math.floor(t.y * scaleY);
                ctx.fillStyle = t.type === BLOCK_TYPES.HANGING_LAMP ? 'rgb(255,220,100)' : 'rgb(255,200,50)';
                ctx.fillRect(mx, my, 1, 1);
            }

            // テクスチャに反映
            minimapTexture.getContext().drawImage(minimapCanvas, 0, 0);
            minimapTexture.refresh();
        }

        function updateMinimap(scene, time) {
            if (!minimapImage) return;
            const ww = 6000, wh = 3552;
            const scaleX = MINIMAP_W / ww;
            const scaleY = MINIMAP_H / wh;

            // 地形を定期的に再描画（5秒ごと — ブロック数増加によりコストが高いため間隔を拡大）
            if (time - lastMinimapUpdate > 5000) {
                lastMinimapUpdate = time;
                redrawMinimapTerrain(scene);
            }

            // プレイヤードット更新
            const px = MINIMAP_X + player.x * scaleX;
            const py = MINIMAP_Y + player.y * scaleY;
            minimapPlayerDot.setPosition(px, py);

            // カメラ範囲表示更新
            const cam = scene.cameras.main;
            const vx = MINIMAP_X + cam.scrollX * scaleX;
            const vy = MINIMAP_Y + cam.scrollY * scaleY;
            const vw = cam.width / cam.zoom * scaleX;
            const vh = cam.height / cam.zoom * scaleY;
            minimapViewRect.setPosition(vx + vw / 2, vy + vh / 2);
            minimapViewRect.setSize(vw, vh);
        }

        // === 体力（ハート）UI ===
        const HEART_UI_X = 12;
        const HEART_UI_Y = 225;
        const HEART_SIZE = 22;
        const HEART_SPACING = 26;

        // HTMLキャンバスでハート形を描画するヘルパー
        function drawHeartOnCanvas(ctx, cx, cy, s) {
            const hw = s / 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy + hw * 0.85);
            ctx.bezierCurveTo(
                cx - hw * 1.1, cy + hw * 0.2,
                cx - hw * 1.1, cy - hw * 0.6,
                cx - hw * 0.55, cy - hw * 0.75
            );
            ctx.bezierCurveTo(
                cx - hw * 0.1, cy - hw * 1.0,
                cx, cy - hw * 0.55,
                cx, cy - hw * 0.25
            );
            ctx.bezierCurveTo(
                cx, cy - hw * 0.55,
                cx + hw * 0.1, cy - hw * 1.0,
                cx + hw * 0.55, cy - hw * 0.75
            );
            ctx.bezierCurveTo(
                cx + hw * 1.1, cy - hw * 0.6,
                cx + hw * 1.1, cy + hw * 0.2,
                cx, cy + hw * 0.85
            );
            ctx.closePath();
        }

        function createHeartTextures(scene) {
            // heart_full.png / heart_empty.png を preload() で読み込み済み
            // ※ PNGファイルを差し替えることでハートの見た目を変更できます
        }

        function createHeartUI(scene) {
            // テクスチャ生成
            createHeartTextures(scene);

            // ダメージ時の画面フラッシュ用オーバーレイ
            hpDamageOverlay = scene.add.rectangle(
                scene.scale.width / 2, scene.scale.height / 2,
                scene.scale.width, scene.scale.height,
                0xff0000, 0
            ).setScrollFactor(0).setDepth(400);
            updateHeartUI(scene);
        }

        function updateHeartUI(scene) {
            // 既存のハートを破棄
            heartSprites.forEach(h => {
                if (h.bg) h.bg.destroy();
                if (h.fg) h.fg.destroy();
            });
            heartSprites = [];

            const pad = 4;
            const tw = HEART_SIZE + pad * 2;
            const th = HEART_SIZE + pad * 2;

            for (let i = 0; i < playerMaxHearts; i++) {
                const hx = HEART_UI_X + i * HEART_SPACING;
                const hy = HEART_UI_Y;

                // 背景（空のハート）
                const bg = scene.add.image(hx, hy, 'heart_empty')
                    .setOrigin(0, 0).setScrollFactor(0).setDepth(102);

                // 前景（赤いハート）
                const fg = scene.add.image(hx, hy, 'heart_full')
                    .setOrigin(0, 0).setScrollFactor(0).setDepth(103);

                // このハートに対応するHP割合を計算
                const heartHPStart = i * HP_PER_HEART;
                const heartHP = Math.max(0, Math.min(HP_PER_HEART, playerHP - heartHPStart));
                const ratio = heartHP / HP_PER_HEART;

                // setCropで左からratio分だけ表示（部分表示）
                if (ratio <= 0) {
                    fg.setCrop(0, 0, 0, th);
                } else if (ratio < 1) {
                    fg.setCrop(0, 0, Math.ceil(tw * ratio), th);
                }
                // ratio === 1 ならクロップなし（全表示）

                heartSprites.push({ bg, fg });
            }
        }

        function damagePlayer(scene, amount) {
            if (amount <= 0) return;
            playerHP = Math.max(0, playerHP - amount);
            updateHeartUI(scene);
            playSE('player_hurt');

            // --- ダメージ数値ポップアップ ---
            const dmgText = scene.add.text(player.x, player.y - 40, '-' + amount, {
                fontSize: '22px', color: '#ff2222', fontStyle: 'bold',
                stroke: '#000000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(200);
            scene.tweens.add({
                targets: dmgText,
                y: dmgText.y - 50,
                alpha: 0,
                duration: 1200,
                ease: 'Power2',
                onComplete: () => dmgText.destroy()
            });

            // --- プレイヤー赤フラッシュ（点滅） ---
            const flashTint = 0xff0000;
            playerBodySprite.setTint(flashTint);
            playerOutfitSprite.setTint(flashTint);
            playerHairSprite.setTint(flashTint);

            let flashCount = 0;
            const flashTimer = scene.time.addEvent({
                delay: 100,
                repeat: 5,
                callback: () => {
                    flashCount++;
                    if (flashCount % 2 === 0) {
                        playerBodySprite.setTint(flashTint);
                        playerOutfitSprite.setTint(flashTint);
                        playerHairSprite.setTint(flashTint);
                    } else {
                        playerBodySprite.clearTint();
                        playerOutfitSprite.clearTint();
                        playerHairSprite.clearTint();
                    }
                    if (flashCount >= 5) {
                        playerBodySprite.clearTint();
                        playerOutfitSprite.clearTint();
                        playerHairSprite.clearTint();
                    }
                }
            });

            // --- 画面フラッシュ ---
            if (hpDamageOverlay) {
                hpDamageOverlay.setAlpha(0.35);
                scene.tweens.add({
                    targets: hpDamageOverlay,
                    alpha: 0,
                    duration: 500,
                    ease: 'Power2'
                });
            }

            // --- ノックバック（少し後ろに弾く） ---
            const knockDir = player.flipX ? -1 : 1;
            player.setVelocityX(-knockDir * 150);
            player.setVelocityY(-120);

            // 体力0 → リスポーン
            if (playerHP <= 0) {
                respawnPlayer(scene);
            }
        }

        function healPlayer(scene, amount) {
            if (amount <= 0) return;
            const maxHP = playerMaxHearts * HP_PER_HEART;
            const oldHP = playerHP;
            playerHP = Math.min(maxHP, playerHP + amount);
            if (playerHP !== oldHP) {
                updateHeartUI(scene);
            }
        }

        function respawnPlayer(scene) {
            // 体力全回復
            playerHP = playerMaxHearts * HP_PER_HEART;
            updateHeartUI(scene);

            // リスポーン位置
            if (homePosition) {
                player.setPosition(homePosition.x, homePosition.y);
            } else {
                player.setPosition(3000, 668);
            }
            player.setVelocity(0, 0);
            isFalling = false;

            // リスポーン演出テキスト
            const respText = scene.add.text(scene.scale.width / 2, scene.scale.height / 2 - 50, 'やられた...', {
                fontSize: '32px', color: '#ff4444', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 5
            }).setOrigin(0.5).setScrollFactor(0).setDepth(300);
            scene.tweens.add({
                targets: respText,
                y: respText.y - 60,
                alpha: 0,
                duration: 2000,
                onComplete: () => respText.destroy()
            });
        }

        function increaseMaxHearts(scene, amount) {
            playerMaxHearts += amount;
            playerHP = playerMaxHearts * HP_PER_HEART; // 最大HP増加時は全回復
            updateHeartUI(scene);
        }

        // 食べ物定義: type → 回復量
        const FOOD_ITEMS = {
            [BLOCK_TYPES.APPLE]: 2,  // りんご: HP2回復
            [BLOCK_TYPES.WHEAT]: 1,  // 小麦: HP1回復
            [BLOCK_TYPES.BREAD]: 3,  // パン: HP3回復
        };

        let lastEatTime = 0;
        function tryEatFood(scene) {
            if (scene.time.now - lastEatTime < 500) return false; // 連打防止
            const item = inventory[activeSlotIndex];
            if (!item || item.type === null || item.count <= 0) return false;

            const healAmount = FOOD_ITEMS[item.type];
            if (!healAmount) return false; // 食べ物じゃない

            const maxHP = playerMaxHearts * HP_PER_HEART;
            if (playerHP >= maxHP) {
                // HP満タン時は食べない
                const fullText = scene.add.text(player.x, player.y - 40, '体力は満タン！', {
                    fontSize: '14px', color: '#88ff88', fontStyle: 'bold',
                    stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5).setDepth(200);
                scene.tweens.add({
                    targets: fullText, y: fullText.y - 30, alpha: 0,
                    duration: 1200, onComplete: () => fullText.destroy()
                });
                return false;
            }

            lastEatTime = scene.time.now;

            // 食べ物の名前を取得
            const foodName = ITEM_NAMES[item.type] || '食べ物';

            // アイテムを1つ消費
            item.count--;
            if (item.count <= 0) {
                inventory[activeSlotIndex] = { type: null, count: 0, texture: null, frame: null };
            }
            updateInventoryUI();

            // HP回復
            healPlayer(scene, healAmount);

            // 効果音（もぐもぐ感）: 2回鳴らして食べてる感じを出す
            playSE('eat');
            scene.time.delayedCall(120, () => playSE('eat'));

            // 食べた物の名前テキスト
            const nameText = scene.add.text(player.x, player.y - 30, foodName + ' を食べた！', {
                fontSize: '13px', color: '#ffffff', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(200);
            scene.tweens.add({
                targets: nameText, y: nameText.y - 35, alpha: 0,
                duration: 1500, onComplete: () => nameText.destroy()
            });

            // 回復量テキスト（少し遅れて表示）
            scene.time.delayedCall(200, () => {
                const healText = scene.add.text(player.x, player.y - 50, '♥ +' + healAmount, {
                    fontSize: '20px', color: '#44ff44', fontStyle: 'bold',
                    stroke: '#005500', strokeThickness: 3
                }).setOrigin(0.5).setDepth(200);
                scene.tweens.add({
                    targets: healText, y: healText.y - 40, alpha: 0,
                    duration: 1200, onComplete: () => healText.destroy()
                });
            });

            // プレイヤーが緑に光る回復演出
            const healTint = 0x66ff66;
            playerBodySprite.setTint(healTint);
            playerOutfitSprite.setTint(healTint);
            playerHairSprite.setTint(healTint);
            scene.time.delayedCall(300, () => {
                playerBodySprite.clearTint();
                playerOutfitSprite.clearTint();
                playerHairSprite.clearTint();
            });

            // パーティクル風の小さな緑の粒を散らす
            for (let p = 0; p < 5; p++) {
                const px = player.x + (Math.random() - 0.5) * 30;
                const py = player.y - 10 + (Math.random() - 0.5) * 20;
                const particle = scene.add.circle(px, py, 3, 0x66ff88, 0.8).setDepth(200);
                scene.tweens.add({
                    targets: particle,
                    x: px + (Math.random() - 0.5) * 40,
                    y: py - 20 - Math.random() * 30,
                    alpha: 0,
                    scaleX: 0.2,
                    scaleY: 0.2,
                    duration: 600 + Math.random() * 400,
                    onComplete: () => particle.destroy()
                });
            }

            return true;
        }

        function pickShopItems() {
            // プールからランダムに3つ選ぶ（重複なし）
            const pool = [...SHOP_ITEM_POOL];
            const items = [];
            for (let i = 0; i < 3 && pool.length > 0; i++) {

        // === 鳥システム ===
        function spawnBird(scene, worldW, groundY, speciesId) {
            // 空中のランダム位置に生成
            if (speciesId === undefined) speciesId = Math.floor(Math.random() * 5);
            const bx = Math.random() * worldW;
            const by = 80 + Math.random() * (groundY - 250); // 空〜地表付近
            const bk = 'bird' + speciesId;
            const bd = scene.add.sprite(bx, by, bk, 1).setDepth(4);
            bd.setData('species', speciesId);   // 鳥の種類 (0-4)
            bd.setData('state', 'flying');      // flying | landing | perched | takeoff
            bd.setData('vx', (Math.random() < 0.5 ? -1 : 1) * (40 + Math.random() * 60));
            bd.setData('vy', 0);
            bd.setData('timer', 0);
            bd.setData('stateTimer', 5000 + Math.random() * 10000); // 次の状態変更まで
            bd.setData('perchY', 0);
            bd.setData('worldW', worldW);
            bd.setData('groundY', groundY);
            bd.setFlipX(bd.getData('vx') < 0);
            bd.anims.play(bk + '_fly', true);
            birds.push(bd);
            return bd;
        }

        function updateBirds(scene, delta) {
            for (let i = 0; i < birds.length; i++) {
                const bd = birds[i];
                if (!bd.active) continue;
                const state = bd.getData('state');
                const bk = 'bird' + bd.getData('species');
                let timer = bd.getData('timer') + delta;
                bd.setData('timer', timer);
                const worldW = bd.getData('worldW');
                const groundY = bd.getData('groundY');

                if (state === 'flying') {
                    let vx = bd.getData('vx');
                    let vy = bd.getData('vy');
                    // ゆるやかな上下波動
                    vy = Math.sin(timer / 800) * 15;
                    bd.x += vx * (delta / 1000);
                    bd.y += vy * (delta / 1000);
                    bd.setFlipX(vx < 0);
                    bd.anims.play(bk + '_fly', true);
                    bd.setData('vy', vy);

                    // 画面端でワープ（消えないように）
                    if (bd.x < -50) bd.x = worldW + 40;
                    if (bd.x > worldW + 50) bd.x = -40;
                    // 空から出ないように
                    if (bd.y < 40) bd.y = 40;
                    if (bd.y > groundY - 80) bd.y = groundY - 80;

                    // たまに休憩しに降りる
                    if (timer > bd.getData('stateTimer')) {
                        bd.setData('state', 'landing');
                        bd.setData('timer', 0);
                        // 着地先を探す: 一番近い足場の上面
                        let landY = groundY - 16; // デフォルト: 地表
                        const allBlocks = platforms.getChildren();
                        let bestDist = 9999;
                        for (let j = 0; j < allBlocks.length; j++) {
                            const blk = allBlocks[j];
                            if (!blk.active) continue;
                            const tid = blk.getData('typeId');
                            // 木の葉の上面 or 地表ブロック
                            if (tid === BLOCK_TYPES.LEAF || tid === BLOCK_TYPES.GRASS || tid === BLOCK_TYPES.WOOD) {
                                if (Math.abs(blk.x - bd.x) < 120) {
                                    const topY = blk.y - 16;
                                    if (topY < groundY && topY > 50) {
                                        const dist = Math.abs(blk.x - bd.x) + Math.abs(topY - bd.y) * 0.5;
                                        if (dist < bestDist) {
                                            bestDist = dist;
                                            landY = topY;
                                        }
                                    }
                                }
                            }
                        }
                        bd.setData('perchY', landY);
                    }
                } else if (state === 'landing') {
                    // 着地先に向かって降下
                    const targetY = bd.getData('perchY');
                    const dy = targetY - bd.y;
                    if (Math.abs(dy) < 3) {
                        // 着地完了
                        bd.y = targetY;
                        bd.setData('state', 'perched');
                        bd.setData('timer', 0);
                        bd.setData('stateTimer', 3000 + Math.random() * 8000);
                        bd.anims.play(bk + '_perch', true);
                        bd.setData('vx', 0);
                    } else {
                        // ゆっくり降下
                        bd.y += Math.sign(dy) * 60 * (delta / 1000);
                        // 少し前進も
                        const vx = bd.getData('vx');
                        bd.x += vx * 0.3 * (delta / 1000);
                        bd.anims.play(bk + '_fly', true);
                    }
                } else if (state === 'perched') {
                    // 休憩中 — ときどきアニメ切替
                    if (Math.floor(timer / 2000) % 2 === 0) {
                        bd.anims.play(bk + '_perch', true);
                    } else {
                        bd.anims.play(bk + '_perch2', true);
                    }

                    // プレイヤーが近づくと驚いて飛び立つ
                    const distP = Phaser.Math.Distance.Between(player.x, player.y, bd.x, bd.y);
                    if (distP < 80) {
                        bd.setData('state', 'takeoff');
                        bd.setData('timer', 0);
                        bd.setData('vx', (player.x > bd.x ? -1 : 1) * (60 + Math.random() * 40));
                    }

                    // 休憩時間経過で自然に飛び立つ
                    if (timer > bd.getData('stateTimer')) {
                        bd.setData('state', 'takeoff');
                        bd.setData('timer', 0);
                        bd.setData('vx', (Math.random() < 0.5 ? -1 : 1) * (40 + Math.random() * 60));
                    }
                } else if (state === 'takeoff') {
                    // 上昇して飛行状態へ
                    bd.y -= 80 * (delta / 1000);
                    const vx = bd.getData('vx');
                    bd.x += vx * (delta / 1000);
                    bd.setFlipX(vx < 0);
                    bd.anims.play(bk + '_fly', true);

                    if (timer > 1500) {
                        bd.setData('state', 'flying');
                        bd.setData('timer', 0);
                        bd.setData('stateTimer', 8000 + Math.random() * 15000);
                    }
                }
            }
        }

        // === レンジのヒント生成 ===
        function getRenjiHint() {
            // ゲーム進行状況に応じてヒントを返す
            const hints = [];
            if (!homePosition) {
                hints.push('まずはベッドを作って、ここを自宅に設定してみよう！ベッドはクラフトメニューから作れるよ。');
            }
            // 作業台チェック
            const hasWorkbench = platforms.getChildren().some(b => b.active && b.getData('typeId') === BLOCK_TYPES.WORKBENCH);
            if (!hasWorkbench) {
                hints.push('作業台を設置すると、いろんなアイテムを作れるようになるよ！木材と石材があれば作れるよ。');
            }
            // 所持金チェック
            if (playerMoney < 10) {
                hints.push('コインが少ないね。アイテムをテーブルに置いておくと、お客さんが買いに来てくれるよ！');
            }
            // HPチェック
            if (playerHP < playerMaxHearts * HP_PER_HEART * 0.5) {
                hints.push('体力が減ってるよ！ご飯を食べると回復するよ。小麦から作れるパンがオススメ！');
            }
            // 汎用ヒント
            hints.push('地下には鉄鉱石や石炭が眠ってるよ。深く掘り進んでみよう！');
            hints.push('商人に話しかけると、いろんなアイテムを買えるよ。');
            hints.push('犬に骨をあげると仲間になってくれるよ！');
            hints.push('夜になると危険が増すから、早めに帰宅しよう！');
            hints.push('ブロックの素材を集めて、自分だけの家を建ててみよう！');
            // 未解決のヒントを優先、なければランダム
            const priority = hints.slice(0, Math.max(1, hints.length - 5));
            if (priority.length > 0) return priority[Math.floor(Math.random() * priority.length)];
            return hints[Math.floor(Math.random() * hints.length)];
        }

        // === スライム（モンスター）システム ===
        const SLIME_MAX = 8;              // 同時に存在できる最大数
        const SLIME_SPAWN_INTERVAL = 8000; // スポーン間隔 (ms)
        const SLIME_HP = 3;               // スライムの体力
        const SLIME_DETECT_RANGE = 200;   // プレイヤー検知距離
        const SLIME_SPEED = 80;           // 移動速度
        const SLIME_DAMAGE = 1;           // プレイヤーへのダメージ
        const SLIME_DAMAGE_COOLDOWN = 1000; // ダメージのクールダウン (ms)
        const DOG_ATTACK_RANGE = 100;     // 犬がスライムを検知する距離
        const DOG_ATTACK_DAMAGE = 2;      // 犬の攻撃力
        const DOG_ATTACK_COOLDOWN = 800;  // 犬の攻撃間隔 (ms)
        let lastSlimeSpawn = 0;
        let lastSlimeDamageTime = 0;      // プレイヤーへのダメージクールダウン

        // スライムドロップテーブル
        const SLIME_DROPS = [
            { type: BLOCK_TYPES.GOLD,        count: 1, weight: 25, texture: 'tileset', frame: 8 },
            { type: BLOCK_TYPES.IRON,         count: 1, weight: 15, texture: 'tileset', frame: 12 },
            { type: BLOCK_TYPES.APPLE,        count: 1, weight: 20, texture: 'tileset', frame: 13 },
            { type: BLOCK_TYPES.TORCH,        count: 2, weight: 15, texture: 'tileset', frame: 5 },
            { type: BLOCK_TYPES.STONE,        count: 3, weight: 15, texture: 'tileset', frame: 2 },
            { type: null,                     count: 0, weight: 10 }, // ドロップなし
        ];

        function spawnSlime(scene, x, y) {
            const sl = scene.physics.add.sprite(x, y, 'slime');
            sl.setCollideWorldBounds(true);
            sl.body.setSize(24, 20);
            sl.body.setOffset(4, 12);
            sl.setDepth(5);
            sl.setBounce(0.2);
            scene.physics.add.collider(sl, platforms, null, vinePassthrough);
            sl.setData('hp', SLIME_HP);
            sl.setData('dir', Math.random() < 0.5 ? -1 : 1);
            sl.setData('timer', 0);
            sl.setData('nextChange', 1500 + Math.random() * 2000);
            sl.setData('state', 'wander'); // wander / chase
            sl.setData('lastAttackTime', 0);
            slimes.push(sl);
            return sl;
        }

        function trySpawnSlime(scene, time) {
            if (time - lastSlimeSpawn < SLIME_SPAWN_INTERVAL) return;
            if (slimes.length >= SLIME_MAX) return;
            lastSlimeSpawn = time;

            const groundY = 768;
            // プレイヤーが地下にいるときのみスポーン
            if (player.y < groundY + 64) return;

            // プレイヤーの近く（画面外ぎりぎり）にスポーン
            const cam = scene.cameras.main;
            const spawnSide = Math.random() < 0.5 ? -1 : 1;
            const spawnX = player.x + spawnSide * (cam.width / 2 + 50 + Math.random() * 100);
            const spawnY = player.y - 32 + Math.random() * 64;

            // ワールド境界チェック
            if (spawnX < 50 || spawnX > 5950 || spawnY < groundY || spawnY > 4430) return;

            spawnSlime(scene, spawnX, spawnY);
        }

        function updateSlimes(scene, time, delta) {
            trySpawnSlime(scene, time);

            for (let i = slimes.length - 1; i >= 0; i--) {
                const sl = slimes[i];
                if (!sl.active) { slimes.splice(i, 1); continue; }

                // プレイヤーから離れすぎたら消去
                const distToPlayer = Phaser.Math.Distance.Between(player.x, player.y, sl.x, sl.y);
                if (distToPlayer > 1200) {
                    sl.destroy();
                    slimes.splice(i, 1);
                    continue;
                }

                // ぷるぷるアニメーション（scaleで簡易表現）
                const wobble = 1 + Math.sin(time / 150 + i * 2) * 0.06;
                sl.setScale(1, wobble);

                // AI: プレイヤー検知 → 追尾
                const state = sl.getData('state');
                if (distToPlayer < SLIME_DETECT_RANGE) {
                    sl.setData('state', 'chase');
                } else if (distToPlayer > SLIME_DETECT_RANGE * 1.5) {
                    sl.setData('state', 'wander');
                }

                if (sl.getData('state') === 'chase') {
                    // 追尾
                    const chaseDir = player.x > sl.x ? 1 : -1;
                    sl.setVelocityX(chaseDir * SLIME_SPEED * 1.3);
                    sl.setFlipX(chaseDir < 0);
                    // ジャンプ（壁にぶつかったら or ランダムで）
                    if (sl.body.touching.down) {
                        if (sl.body.blocked.left || sl.body.blocked.right) {
                            sl.setVelocityY(-280);
                        } else if (Math.random() < 0.02) {
                            sl.setVelocityY(-250);
                        }
                    }
                } else {
                    // うろうろ
                    let t = sl.getData('timer') + delta;
                    sl.setData('timer', t);
                    if (t > sl.getData('nextChange')) {
                        sl.setData('timer', 0);
                        sl.setData('nextChange', 1500 + Math.random() * 2000);
                        sl.setData('dir', Math.random() < 0.3 ? 0 : (Math.random() < 0.5 ? -1 : 1));
                    }
                    const dir = sl.getData('dir');
                    sl.setVelocityX(dir * SLIME_SPEED * 0.5);
                    if (dir !== 0) sl.setFlipX(dir < 0);
                    if (sl.body.touching.down && (sl.body.blocked.left || sl.body.blocked.right)) {
                        sl.setVelocityY(-250);
                    }
                }

                // --- プレイヤーとの接触ダメージ ---
                if (distToPlayer < 28 && time - lastSlimeDamageTime > SLIME_DAMAGE_COOLDOWN) {
                    lastSlimeDamageTime = time;
                    damagePlayer(scene, SLIME_DAMAGE);
                    playSE('slime_hit');
                }

                // --- ペット犬による攻撃判定 ---
                for (const dg of dogs) {
                    if (!dg.active || !dg.getData('tamed')) continue;
                    const distDogSlime = Phaser.Math.Distance.Between(dg.x, dg.y, sl.x, sl.y);

                    if (distDogSlime < DOG_ATTACK_RANGE) {
                        // 犬がスライムに向かって突進
                        const atkDir = sl.x > dg.x ? 1 : -1;
                        dg.setVelocityX(atkDir * 250);
                        dg.setFlipX(atkDir < 0);
                        dg.anims.play('dog_walk', true);

                        // 攻撃判定（近距離 + クールダウン）
                        if (distDogSlime < 35) {
                            const lastDogAtk = dg.getData('lastSlimeAtk') || 0;
                            if (time - lastDogAtk > DOG_ATTACK_COOLDOWN) {
                                dg.setData('lastSlimeAtk', time);
                                const hp = sl.getData('hp') - DOG_ATTACK_DAMAGE;
                                sl.setData('hp', hp);
                                playSE('slime_hit');

                                // ダメージ演出
                                sl.setTint(0xff0000);
                                scene.time.delayedCall(150, () => {
                                    if (sl.active) sl.clearTint();
                                });

                                // ダメージ数値表示
                                const atkText = scene.add.text(sl.x, sl.y - 20, '-' + DOG_ATTACK_DAMAGE, {
                                    fontSize: '16px', color: '#ffaa00', fontStyle: 'bold',
                                    stroke: '#000', strokeThickness: 3
                                }).setOrigin(0.5).setDepth(200);
                                scene.tweens.add({
                                    targets: atkText, y: atkText.y - 30, alpha: 0,
                                    duration: 800, onComplete: () => atkText.destroy()
                                });

                                // ノックバック
                                sl.setVelocityX(atkDir * 200);
                                sl.setVelocityY(-150);

                                if (hp <= 0) {
                                    killSlime(scene, sl, i);
                                    break;
                                }
                            }
                        }
                    }
                }
            }
        }

        function killSlime(scene, sl, index) {
            playSE('slime_die');

            // 消滅パーティクル演出
            for (let p = 0; p < 8; p++) {
                const px = sl.x + (Math.random() - 0.5) * 20;
                const py = sl.y + (Math.random() - 0.5) * 20;
                const particle = scene.add.circle(px, py, 4, 0x33cc55, 0.9).setDepth(200);
                scene.tweens.add({
                    targets: particle,
                    x: px + (Math.random() - 0.5) * 60,
                    y: py - 20 - Math.random() * 40,
                    alpha: 0, scaleX: 0.1, scaleY: 0.1,
                    duration: 500 + Math.random() * 300,
                    onComplete: () => particle.destroy()
                });
            }

            // 倒したテキスト
            const killText = scene.add.text(sl.x, sl.y - 20, 'スライムを倒した！', {
                fontSize: '13px', color: '#44ff88', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(200);
            scene.tweens.add({
                targets: killText, y: killText.y - 40, alpha: 0,
                duration: 1500, onComplete: () => killText.destroy()
            });

            // アイテムドロップ
            const totalWeight = SLIME_DROPS.reduce((s, d) => s + d.weight, 0);
            let roll = Math.random() * totalWeight;
            let drop = SLIME_DROPS[SLIME_DROPS.length - 1];
            for (const d of SLIME_DROPS) {
                roll -= d.weight;
                if (roll <= 0) { drop = d; break; }
            }
            if (drop.type !== null) {
                addInventoryItem(drop.type, drop.count, drop.texture, drop.frame);
                const itemName = ITEM_NAMES[drop.type] || 'アイテム';
                const dropText = scene.add.text(sl.x, sl.y - 5, itemName + ' x' + drop.count + ' GET!', {
                    fontSize: '14px', color: '#ffdd44', fontStyle: 'bold',
                    stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5).setDepth(200);
                scene.tweens.add({
                    targets: dropText, y: dropText.y - 35, alpha: 0,
                    duration: 1800, onComplete: () => dropText.destroy()
                });
                updateInventoryUI();
            }

            sl.destroy();
            if (index !== undefined) {
                slimes.splice(index, 1);
            } else {
                const idx = slimes.indexOf(sl);
                if (idx !== -1) slimes.splice(idx, 1);
            }
        }

        // 店番を解除して通常のペット状態に戻す
        function freeRabbitShopkeeper(rb) {
            rb.setData('shopkeeper', false);
            rb.setData('shopTarget', null);
            const icon = rb.getData('shopkeeperIcon');
            if (icon && icon.active) { icon.destroy(); }
            rb.setData('shopkeeperIcon', null);

        // うさぎを店番に任命する（最寄りの OPEN 看板を自動検索）
        function assignRabbitShopkeeper(scene, rb) {
            const blocks = platforms.getChildren();
            let nearestSign = null;
            let nearestDist = 500;
            for (const b of blocks) {
                if (!b.active || b.getData('typeId') !== BLOCK_TYPES.SIGN_OPEN) continue;
                const d = Phaser.Math.Distance.Between(rb.x, rb.y, b.x, b.y);
                if (d < nearestDist) { nearestDist = d; nearestSign = b; }
            }
            if (!nearestSign) return false;
            rb.setData('shopkeeper', true);
            rb.setData('shopTarget', nearestSign);
            // 店番アイコンを作成（🏪 看板アイコン）
            const icon = scene.add.text(rb.x, rb.y - 22, '🏪', { fontSize: '13px' })
                .setOrigin(0.5).setDepth(22);
            rb.setData('shopkeeperIcon', icon);
            return true;
        }

        // テーブルのある開店ゾーンを担当している店番うさぎを返す
        function getShopkeeperRabbitForTable(table) {
            for (const rb of rabbits) {
                if (!rb.active || !rb.getData('shopkeeper')) continue;
                const target = rb.getData('shopTarget');
                if (!target || !target.active) continue;
                if (target.getData('typeId') !== BLOCK_TYPES.SIGN_OPEN) continue;
                // テーブルがこの OPEN 看板のゾーン内かチェック
                if (Math.abs(table.x - target.x) < 200 && Math.abs(table.y - target.y) < 200) return rb;
            }
            return null;
        }

        // うさぎ店番による自動売却処理
        function doAutoSell(scene, customer, shopRabbit) {
            const ti = tableItems.find(t => t.tableBlock === customer.targetTable);
            if (!ti) { customer.state = 'leaving'; return; }

            const wantCount = Math.min(customer.desiredCount || 1, ti.itemCount);
            const unitPrice = getItemPrice(ti.itemType);
            const totalPrice = unitPrice * wantCount;

            addMoney(totalPrice);
            ti.itemCount -= wantCount;
            if (ti.itemCount <= 0) {
                if (ti.itemSprite) ti.itemSprite.destroy();
                if (ti.countText) ti.countText.destroy();
                const idx = tableItems.indexOf(ti);
                if (idx !== -1) tableItems.splice(idx, 1);
            } else {
                updateTableItemCountText(ti);
            }

            // 売上フロートテキスト（うさぎの頭上）
            const ft = scene.add.text(shopRabbit.x, shopRabbit.y - 20,
                '+' + totalPrice + '💰', {
                fontSize: '14px', color: '#ffdd44', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(200);
            scene.tweens.add({ targets: ft, y: ft.y - 40, alpha: 0, duration: 1500,
                onComplete: () => ft.destroy() });

            // うさぎのセリフ
            const msgs = ['いらっしゃい！', 'まいどあり！', 'ありがとう♪', 'またきてね！'];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            const mt = scene.add.text(shopRabbit.x, shopRabbit.y - 38, msg, {
                fontSize: '11px', color: '#ffffff', fontStyle: 'bold',
                stroke: '#442200', strokeThickness: 3
            }).setOrigin(0.5).setDepth(201);
            scene.tweens.add({ targets: mt, y: mt.y - 20, alpha: 0, duration: 1800,
                onComplete: () => mt.destroy() });

            playSE('ui_success');
